<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>AI Vault · Members Only</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500;600&family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" href="/ai-vault/assets/favicon.svg">
<link rel="stylesheet" href="/ai-vault/assets/css/vault.css?v=12">
<style>
  .loginplate .wordmark { font-family: var(--font-head); font-weight: 600; font-size: 22px; letter-spacing: 0.42em; text-transform: uppercase; margin: 18px 0 6px; padding-left: 0.42em; }
  .loginplate .keybig { width: 44px; height: 44px; margin: 0 auto; }
  #welcomeStage { position: fixed; inset: 0; z-index: 3; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; opacity: 0; }
</style>
</head>
<body>

<div class="doorstage textured" id="doorstage">
  <!-- behind the panels: the welcome glimpse -->
  <div id="welcomeStage">
    <svg class="keybig" viewBox="0 0 24 24" fill="none" stroke="#C9A227" stroke-width="1.2"><circle cx="9" cy="9" r="5.2"/><circle cx="9" cy="9" r="1.8"/><path d="M13 13l7.2 7.2M17.4 17.6l2.2-2.2M15 15.2l1.6-1.6"/></svg>
    <div class="micro gold" id="welcomeName">WELCOME</div>
    <div class="micro" id="welcomeNo"></div>
  </div>

  <div class="doorpanel left" id="panelL"></div>
  <div class="doorpanel right" id="panelR"></div>
  <div class="seam" id="seam"></div>

  <!-- the login plate sits on the closed door -->
  <div class="loginplate plate" id="loginplate" style="opacity:0">
    <svg class="keybig" viewBox="0 0 24 24" fill="none" stroke="#C9A227" stroke-width="1.2" aria-hidden="true"><circle cx="9" cy="9" r="5.2"/><circle cx="9" cy="9" r="1.8"/><path d="M13 13l7.2 7.2M17.4 17.6l2.2-2.2M15 15.2l1.6-1.6"/></svg>
    <div class="wordmark">AI Vault</div>
    <div class="micro" style="margin-bottom:30px">Members only</div>
    <button class="btn gold wide" id="googleBtn">
      <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true"><path fill="#EA4335" d="M12 5.04c1.62 0 3.06.56 4.2 1.64l3.12-3.12C17.46 1.8 14.96.8 12 .8 7.4.8 3.44 3.44 1.52 7.28l3.64 2.82C6.08 7.16 8.8 5.04 12 5.04z"/><path fill="#4285F4" d="M23.2 12.26c0-.94-.08-1.62-.26-2.34H12v4.44h6.42c-.14 1.08-.84 2.7-2.4 3.78l3.56 2.76c2.14-1.98 3.62-4.9 3.62-8.64z"/><path fill="#FBBC05" d="M5.18 14.02A7.2 7.2 0 0 1 4.78 12c0-.7.12-1.38.38-2.02L1.52 7.28A11.9 11.9 0 0 0 .8 12c0 1.94.46 3.76 1.28 5.36l3.1-3.34z"/><path fill="#34A853" d="M12 23.2c3.24 0 5.96-1.06 7.94-2.9l-3.56-2.76c-.96.66-2.24 1.12-4.38 1.12-3.2 0-5.92-2.12-6.86-5.04l-3.62 2.8C3.44 20.42 7.4 23.2 12 23.2z"/></svg>
      Continue with Google
    </button>
    <div class="micro" style="margin-top:26px; font-size:9.5px;">VLT · EST 2025 · JAYGPTPRO</div>
    <div style="margin-top:14px"><a class="micro" href="/ai-vault/join.html" style="color:#9A9A94">Not a member yet? <span class="gold micro">Get your key</span></a></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/ai-vault/assets/js/demo-data.js?v=12"></script>
<script src="/ai-vault/assets/js/vault.js?v=12"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
(function () {
  var reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  var today = new Date().toDateString();
  var skipRequested = false;

  function go() { location.replace("/ai-vault/home.html"); }

  /* The Seam: dial draws + 3 detents, gold seam, panels split, welcome glimpse, enter. */
  function playDoor(access, full) {
    if (reduced || !window.gsap) { localStorage.setItem("vault_seen_door", today); go(); return; }
    localStorage.setItem("vault_seen_door", today);
    document.getElementById("loginplate").style.display = "none";

    var name = (access && access.name ? access.name.split(" ")[0] : "").toUpperCase();
    document.getElementById("welcomeName").textContent = name ? "WELCOME, " + name : "WELCOME BACK";
    if (access && access.member_number) document.getElementById("welcomeNo").textContent = VAULT.memberNo(access.member_number);

    /* dial */
    var dial = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    dial.setAttribute("viewBox", "0 0 120 120");
    dial.setAttribute("class", "dial");
    dial.style.cssText = "position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:8;";
    dial.innerHTML =
      '<circle cx="60" cy="60" r="46" fill="none" stroke-width="1.5" stroke-dasharray="289" stroke-dashoffset="289" id="dialRing"/>' +
      '<g id="dialTicks">' +
      Array.from({ length: 24 }, function (_, i) {
        var a = (i / 24) * Math.PI * 2, r1 = 46, r2 = i % 6 === 0 ? 38 : 42;
        return '<line x1="' + (60 + r1 * Math.cos(a)) + '" y1="' + (60 + r1 * Math.sin(a)) + '" x2="' + (60 + r2 * Math.cos(a)) + '" y2="' + (60 + r2 * Math.sin(a)) + '" stroke-width="1" opacity="0.55"/>';
      }).join("") +
      "</g>" +
      '<line x1="60" y1="14" x2="60" y2="26" stroke-width="2" id="dialNeedle"/>';
    document.getElementById("doorstage").appendChild(dial);

    var tl = gsap.timeline({ onComplete: go });
    tl.to("#dialRing", { strokeDashoffset: 0, duration: full ? 0.5 : 0.2, ease: "power2.out" });
    var turns = full ? [-120, 75, -190] : [-140];
    turns.forEach(function (deg) {
      tl.to("#dialTicks", { rotation: "+=" + deg, transformOrigin: "50% 50%", duration: full ? 0.34 : 0.22, ease: "back.out(3)" });
    });
    tl.to(dial, { scale: 0.86, opacity: 0, duration: 0.18, ease: "power2.in" }, "+=0.05");
    tl.to("#seam", { opacity: 1, duration: 0.16 }, "<");
    tl.to("#welcomeStage", { opacity: 1, duration: 0.2 }, "<");
    tl.to("#panelL", { xPercent: -101, duration: full ? 0.62 : 0.4, ease: "power3.inOut" }, "+=0.08");
    tl.to("#panelR", { xPercent: 101, duration: full ? 0.62 : 0.4, ease: "power3.inOut" }, "<");
    tl.to("#seam", { opacity: 0, duration: 0.3 }, "<");
    tl.to({}, { duration: full ? 0.55 : 0.25 }); /* hold the glimpse */
    tl.to("#welcomeStage", { opacity: 0, duration: 0.22 });

    function skip() { if (skipRequested) return; skipRequested = true; tl.progress(1); }
    window.addEventListener("pointerdown", skip, { once: true });
    window.addEventListener("keydown", skip, { once: true });
  }

  function showLogin() {
    var lp = document.getElementById("loginplate");
    lp.style.opacity = 0; lp.style.display = "";
    if (window.gsap && !reduced) gsap.to(lp, { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" });
    else lp.style.opacity = 1;
  }

  document.getElementById("googleBtn").addEventListener("click", async function () {
    if (VAULT.DEMO) {
      var a = await VAULT.getAccess();
      playDoor(a, true);
    } else {
      VAULT.signIn();
    }
  });

  (async function init() {
    var a = await VAULT.getAccess();
    if (VAULT.DEMO) { showLogin(); return; }             /* demo always shows the door first */
    if (!a.session) { showLogin(); return; }
    if (!a.has_access) { location.replace("/ai-vault/locked.html"); return; }
    var full = localStorage.getItem("vault_seen_door") !== today;
    playDoor(a, full);
  })();
})();
</script>
</body>
</html>
