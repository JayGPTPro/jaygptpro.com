<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>try{if(localStorage.getItem("vault_theme")==="light")document.documentElement.dataset.theme="light"}catch(e){}</script>
<meta name="robots" content="noindex, nofollow">
<title>The Viewing Room · AI Vault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500;600&family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/ai-vault/assets/css/vault.css?v=4">
<style>
  body { opacity: 0; transition: opacity 300ms var(--ease); } body.in { opacity: 1; }
  .room { display: grid; grid-template-columns: minmax(0, 1fr) 320px; gap: 28px; }
  @media (max-width: 900px) { .room { grid-template-columns: 1fr; } }
  .titlebar { display: flex; align-items: flex-start; justify-content: space-between; gap: 18px; margin: 18px 0 4px; flex-wrap: wrap; }
</style>
</head>
<body>
<main class="wrap" id="main"></main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://player.vimeo.com/api/player.js"></script>
<script src="/ai-vault/assets/js/demo-data.js?v=4"></script>
<script src="/ai-vault/assets/js/vault.js?v=4"></script>
<script>
(async function () {
  var access = await VAULT.requireMember();
  if (!access) return;
  VAULT.renderChrome("episodes", access);

  var $ = VAULT.$, esc = VAULT.esc;
  var slug = new URLSearchParams(location.search).get("ep");
  var main = $("#main");
  var results = await Promise.all([slug ? VAULT.getEpisode(slug) : null, VAULT.getEpisodes(), VAULT.getProgressMap(), VAULT.getSocial()]);
  var ep = results[0], episodes = results[1], prog = results[2], social = results[3];
  if (!ep) { main.innerHTML = '<div class="notice">Episode not found. <a href="/ai-vault/episodes.html" style="color:var(--gold-glint)">Back to Episodes</a></div>'; document.body.classList.add("in"); return; }
  document.title = ep.title + " · AI Vault";
  VAULT.track("page_view", "episode:" + ep.slug);

  var myProg = prog[ep.slug] || { position: 0, completed: false };
  var soc = social[ep.slug] || { likes: 0 };
  var idx = episodes.findIndex(function (e) { return e.slug === ep.slug; });
  var next = idx >= 0 ? episodes[idx + 1] : null;

  var playerHtml = ep.vimeo_id
    ? '<iframe id="vplayer" src="https://player.vimeo.com/video/' + esc(ep.vimeo_id) + (ep.vimeo_hash ? "?h=" + esc(ep.vimeo_hash) + "&" : "?") + 'dnt=1&pip=1" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen title="' + esc(ep.title) + '"></iframe>'
    : '<div class="player-poster"><img src="' + esc(ep.thumbnail_url || "") + '" alt="" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0.45"><span class="micro" style="position:relative">VIDEO CONNECTS AFTER VIMEO SETUP</span></div>';

  var kindIcon = { prompt: "❯", link: "↗", file: "▼", slides: "▼", tool: "↗" };
  var caseRows = (ep.resources || []).map(function (r, i) {
    return '<div class="row" data-res="' + i + '"><div><div style="font-size:13.5px">' + esc(r.title) + '</div><div class="micro">' + esc(r.kind).toUpperCase() + "</div></div><span class=\"micro gold\">" + (kindIcon[r.kind] || "↗") + "</span></div>";
  }).join("");
  var chapterRows = (ep.chapters || []).map(function (c) {
    return '<div class="row" data-seek="' + c.starts_at + '"><span style="font-size:13px">' + esc(c.title) + '</span><span class="t">' + VAULT.fmtTime(c.starts_at) + "</span></div>";
  }).join("");

  main.innerHTML =
    '<div class="micro" style="margin-bottom:14px"><a href="/ai-vault/episodes.html" style="color:var(--text-dim)">← All episodes</a></div>' +
    '<div class="room">' +
      '<div>' +
        '<div class="player-shell">' + playerHtml + "</div>" +
        '<div class="titlebar">' +
          '<div>' +
            '<div class="micro gold">' + VAULT.fmtMonth(ep.published_at) + " EPISODE" + (ep.guest_name ? " · WITH " + esc(ep.guest_name).toUpperCase() : "") + (ep.updated_note ? ' · <span style="color:var(--gold-glint)">UPDATED: ' + esc(ep.updated_note).toUpperCase() + "</span>" : "") + "</div>" +
            '<h1 style="margin:8px 0 6px;font-size:24px">' + esc(ep.title) + "</h1>" +
            '<div class="micro">' + VAULT.fmtDate(ep.published_at) + " · " + VAULT.fmtDuration(ep.duration_seconds) + "</div>" +
          "</div>" +
          '<div class="toggle" id="completeToggle" role="switch" tabindex="0" aria-checked="false"><span class="micro">Mark complete</span><span class="track"><span class="knob"></span></span></div>' +
        "</div>" +

        '<div class="reactions">' +
          '<button class="rbtn" id="rLike">♥ <span class="n" id="likeN">' + soc.likes + "</span></button>" +
          '<button class="rbtn" id="rLater">🔖 Watch later</button>' +
          '<button class="rbtn" id="rMore">⚡ More like this</button>' +
        "</div>" +

        (ep.description ? '<p style="color:var(--text-dim);font-size:14.5px;max-width:640px;margin-top:10px">' + esc(ep.description) + "</p>" : "") +

        '<div class="plate pad" style="margin-top:26px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap">' +
          '<div><div class="micro">RATE THIS EPISODE</div><div class="micro" style="font-size:9px;margin-top:3px;color:#55554F">PRIVATE. ONLY JAY SEES RATINGS, THEY SHAPE FUTURE EPISODES</div></div>' +
          '<div class="stars" id="stars">' + [1, 2, 3, 4, 5].map(function (i) { return '<button data-s="' + i + '" aria-label="' + i + ' stars">★</button>'; }).join("") + "</div>" +
        "</div>" +

        (next ? '<div class="band" style="margin-top:30px"><div class="band-head"><span class="micro">Next episode</span></div><div class="ep-grid" style="grid-template-columns:minmax(0,340px)">' + VAULT.epCard(next, prog, social) + "</div></div>" : "") +
      "</div>" +
      '<aside>' +
        (chapterRows ? '<div class="band"><div class="band-head"><span class="micro">Chapters</span></div><div class="chapters plate" style="padding:4px 16px">' + chapterRows + "</div></div>" : "") +
        (caseRows ? '<div class="band"><div class="band-head"><span class="micro">In the case</span></div><div class="case plate" style="padding:4px 16px">' + caseRows + "</div></div>" : "") +
        '<div class="notice" style="font-size:12.5px">Questions on this episode? <a href="/ai-vault/ask.html?ctx=' + encodeURIComponent(ep.slug) + '" style="color:var(--gold-glint)">Ask Jay</a> or bring them to the next session.</div>' +
      "</aside>" +
    "</div>";

  /* ---------- reactions ---------- */
  function setBtn(id, on) { $(id).classList.toggle("on", !!on); }
  setBtn("#rLike", soc.my_like); setBtn("#rLater", soc.my_watch_later); setBtn("#rMore", soc.my_more);
  $("#rLike").addEventListener("click", function () {
    soc.my_like = !soc.my_like; soc.likes += soc.my_like ? 1 : -1;
    $("#likeN").textContent = soc.likes; setBtn("#rLike", soc.my_like);
    VAULT.react(ep.slug, "like", soc.my_like); VAULT.track("like", ep.slug);
  });
  $("#rLater").addEventListener("click", function () {
    soc.my_watch_later = !soc.my_watch_later; setBtn("#rLater", soc.my_watch_later);
    VAULT.react(ep.slug, "watch_later", soc.my_watch_later);
  });
  $("#rMore").addEventListener("click", function () {
    soc.my_more = !soc.my_more; setBtn("#rMore", soc.my_more);
    VAULT.react(ep.slug, "more_please", soc.my_more); VAULT.track("more_please", ep.slug);
  });

  /* ---------- private rating ---------- */
  function paintStars(n) { $("#stars").querySelectorAll("button").forEach(function (b) { b.classList.toggle("on", Number(b.dataset.s) <= n); }); }
  paintStars(soc.my_stars || 0);
  $("#stars").addEventListener("click", function (ev) {
    var b = ev.target.closest("button"); if (!b) return;
    var n = Number(b.dataset.s); paintStars(n); VAULT.rate(ep.slug, n); VAULT.track("rate", ep.slug + ":" + n);
  });

  /* ---------- complete toggle ---------- */
  var toggle = $("#completeToggle");
  function setToggle(on) { toggle.classList.toggle("on", on); toggle.setAttribute("aria-checked", on); }
  setToggle(!!myProg.completed);
  function flip() {
    var on = !toggle.classList.contains("on");
    setToggle(on);
    VAULT.saveProgress(ep, myProg.position || 0, on);
    if (on) VAULT.track("complete", ep.slug);
  }
  toggle.addEventListener("click", flip);
  toggle.addEventListener("keydown", function (e) { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); flip(); } });

  /* ---------- resources ---------- */
  main.addEventListener("click", function (ev) {
    var row = ev.target.closest("[data-res]");
    if (!row) return;
    var r = ep.resources[Number(row.dataset.res)];
    if (!r) return;
    VAULT.track("resource", ep.slug + ":" + r.title);
    if (r.url) { window.open(r.url, "_blank", "noopener"); return; }
    if (r.body) { navigator.clipboard.writeText(r.body); row.querySelector(".gold").textContent = "COPIED"; setTimeout(function () { row.querySelector(".gold").textContent = "❯"; }, 1400); return; }
    if (VAULT.DEMO) alert("Demo mode. Files connect after setup.");
    else VAULT.callFn("signed-url", { episode: ep.slug, title: r.title }).then(function (d) { if (d && d.url) window.open(d.url, "_blank", "noopener"); });
  });

  /* ---------- Vimeo progress tracking ---------- */
  if (ep.vimeo_id && window.Vimeo) {
    var player = new Vimeo.Player($("#vplayer"));
    var last = 0, completed = !!myProg.completed;
    if (myProg.position > 30 && !completed) {
      player.on("loaded", function () { player.setCurrentTime(myProg.position).catch(function () {}); });
    }
    player.on("play", function () { VAULT.track("play", ep.slug); });
    player.on("timeupdate", function (d) {
      myProg.position = d.seconds;
      if (d.seconds - last >= 15) { last = d.seconds; VAULT.saveProgress(ep, d.seconds, completed); }
      if (!completed && ep.duration_seconds && d.seconds / ep.duration_seconds >= 0.9) {
        completed = true; setToggle(true); VAULT.saveProgress(ep, d.seconds, true); VAULT.track("complete", ep.slug);
      }
    });
    player.on("pause", function (d) { VAULT.saveProgress(ep, d.seconds, completed); });
    window.addEventListener("pagehide", function () { VAULT.saveProgress(ep, myProg.position || 0, completed); });
    main.addEventListener("click", function (ev) {
      var row = ev.target.closest("[data-seek]");
      if (row) player.setCurrentTime(Number(row.dataset.seek)).then(function () { player.play(); }).catch(function () {});
    });
  } else {
    main.addEventListener("click", function (ev) {
      var row = ev.target.closest("[data-seek]");
      if (row) { myProg.position = Number(row.dataset.seek); VAULT.saveProgress(ep, myProg.position, false); }
    });
  }

  document.body.classList.add("in");
})();
</script>
</body>
</html>
