<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>document.documentElement.classList.add("js");try{if(localStorage.getItem("vault_theme")==="light")document.documentElement.dataset.theme="light"}catch(e){}</script>
<meta name="robots" content="noindex, nofollow">
<title>The Ledger · AI Vault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500;600&family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" href="/ai-vault/assets/favicon.svg">
<link rel="stylesheet" href="/ai-vault/assets/css/vault.css?v=30">
<style>
  html.js body { opacity: 0; transition: opacity 300ms var(--ease); } html.js body.in { opacity: 1; }
  .ledger-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
  @media (max-width: 760px) { .ledger-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<main class="wrap" id="main"></main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/ai-vault/assets/js/demo-data.js?v=30"></script>
<script src="/ai-vault/assets/js/vault.js?v=30"></script>
<script>
(async function () {
  var access = await VAULT.requireMember();
  if (!access) return;
  VAULT.renderChrome("account", access);
  VAULT.track("page_view", "account");

  var $ = VAULT.$, esc = VAULT.esc;
  var episodes = await VAULT.getEpisodes();
  var prog = await VAULT.getProgressMap();
  /* "watch history" means most recently WATCHED, not most recently published */
  var watched = episodes.filter(function (e) { return prog[e.slug]; })
    .sort(function (a, b) { return (prog[b.slug].t || 0) - (prog[a.slug].t || 0); });
  var completed = watched.filter(function (e) { return prog[e.slug].completed; });
  var since = access.member_since ? new Date(access.member_since) : null;
  /* comped members have no Stripe customer: get_my_access reports plan "Guest access" */
  var comped = /guest access/i.test(access.plan || "");

  var historyRows = watched.slice(0, 12).map(function (e) {
    var p = prog[e.slug];
    /* an episode published without a duration has no percentage to show: report
       the timecode instead of dividing by 1 and printing something like 75100% */
    var state = p.completed
      ? '<span style="color:var(--gold)">✓ COMPLETE</span>'
      : (e.duration_seconds ? Math.min(100, Math.round((p.position / e.duration_seconds) * 100)) + "%" : VAULT.fmtTime(p.position || 0) + " IN");
    return '<div class="ledger-line"><span><a href="/ai-vault/episode.html?ep=' + encodeURIComponent(e.slug) + '" style="color:var(--text)">' + esc(e.title) + '</a></span><span class="v">' + state + "</span></div>";
  }).join("") || (VAULT.readFailed("episodes")
    /* a failed read must never be reported as "you have watched nothing" */
    ? '<div class="ledger-line"><span class="micro" style="color:var(--live)">Your history did not load. Reload the page to try again.</span></div>'
    : '<div class="ledger-line"><span class="micro">Nothing watched yet. The Reserve is waiting.</span></div>');
  /* the list is capped: say so rather than silently dropping older activity */
  if (watched.length > 12) {
    historyRows += '<div class="ledger-line"><span class="micro">' + (watched.length - 12) + ' MORE EPISODES IN YOUR HISTORY</span><span class="v"><a href="/ai-vault/episodes.html" style="color:var(--gold-glint)">All episodes →</a></span></div>';
  }

  $("#main").innerHTML =
    '<h1>The Ledger</h1><div class="micro" style="margin-top:6px">Your account</div>' +
    '<div class="nameplate" style="margin-top:22px">' +
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:14px">' +
        '<div>' +
          '<div class="micro gold">' + VAULT.memberNo(access.member_number) + "</div>" +
          '<h2 style="margin:10px 0 4px">' + esc(access.name || "") + "</h2>" +
          '<div class="micro">' + esc(access.email || "") + (since ? " · MEMBER SINCE " + since.toLocaleDateString("en-US", { month: "short", year: "numeric" }).toUpperCase() : "") + "</div>" +
        "</div>" +
        '<div style="text-align:right">' +
          /* a zeroed counter on a failed read reads as "the portal lost my progress" */
          '<div class="mono" style="font-size:30px;font-weight:500">' + (VAULT.readFailed("episodes")
            ? '<span style="font-size:15px;color:var(--text-dim)">NOT LOADED</span>'
            : completed.length + '<span style="color:var(--text-dim);font-size:16px"> / ' + episodes.length + "</span>") + "</div>" +
          '<div class="micro">Episodes complete</div>' +
        "</div>" +
      "</div>" +
    "</div>" +
    '<div class="ledger-grid">' +
      '<div class="plate pad">' +
        '<div class="micro" style="margin-bottom:8px">Subscription</div>' +
        '<div class="ledger-line" style="border-top:0"><span>Plan</span><span class="v">' + esc(access.plan || "AI Vault") + "</span></div>" +
        '<div class="ledger-line"><span>Status</span><span class="v" style="color:var(--gold-glint)">' + esc((access.status || "active").toUpperCase()) + "</span></div>" +
        '<div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap">' +
          /* a comped member has no Stripe customer, so the billing portal would
             404 forever behind a "try again" label. Say the truth instead. */
          (comped ? "" : '<button class="btn" id="portalBtn">Manage billing</button>') +
          '<button class="btn quiet" id="signoutBtn">Sign out</button>' +
        "</div>" +
        '<div class="micro" style="margin-top:14px;font-size:9.5px">' + (comped
          ? "Guest access, nothing to pay and nothing to cancel. Jay set this up for you."
          : 'Cancel anytime · 30-day guarantee · <a href="/ai-vault/refunds.html" style="color:var(--text-dim);text-decoration:underline">Refund policy</a>') + "</div>" +
        '<div id="savingsLedger"></div>' +
      "</div>" +
      '<div class="plate pad">' +
        '<div class="micro" style="margin-bottom:8px">Watch history</div>' + historyRows +
      "</div>" +
    "</div>" +
    '<div class="plate pad" style="margin-top:20px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap">' +
      '<div><div class="micro gold">Private consultation</div><div style="font-size:14px;margin-top:4px">Quarterly 1-on-1 strategy call with Jay. Included in your membership.</div></div>' +
      /* the 1-on-1 page owns this decision: it knows which quarters are already
         used and makes its own button inert. A raw "Book" link here would let a
         member book a second call for a quarter they already spent. */
      '<a class="btn quiet" href="/ai-vault/consultation.html">See your sessions</a>' +
    "</div>";

  if ($("#portalBtn")) $("#portalBtn").addEventListener("click", async function () {
    var btn = this;
    btn.disabled = true; btn.textContent = "Opening billing...";
    try {
      var d = await VAULT.callFn("create-portal-session", {});
      if (d && d.url) { location.href = d.url; return; }
      throw new Error("no url");
    } catch (e) {
      btn.textContent = "Could not open billing. Try again";
    } finally {
      btn.disabled = false;
      setTimeout(function () { btn.textContent = "Manage billing"; }, 3500);
    }
  });
  $("#signoutBtn").addEventListener("click", VAULT.signOut);

  /* member savings, makes the membership value a number */
  VAULT.getDealSavings().then(function (mo) {
    if (!mo) return;
    $("#savingsLedger").innerHTML =
      '<a href="/ai-vault/tools.html" style="display:block;margin-top:14px;padding-top:14px;border-top:1px solid var(--hairline)">' +
        '<div class="micro gold">MEMBER DEALS SAVING YOU</div>' +
        '<div class="v" style="font-size:20px;margin-top:4px">$' + mo + '<span style="color:var(--text-dim);font-size:13px"> / mo · view all →</span></div>' +
      "</a>";
  });

  document.body.classList.add("in");
})();
</script>
</body>
</html>
