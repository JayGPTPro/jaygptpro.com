<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>try{if(localStorage.getItem("vault_theme")==="light")document.documentElement.dataset.theme="light"}catch(e){}</script>
<meta name="robots" content="noindex, nofollow">
<title>Member Deals · AI Vault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500;600&family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/ai-vault/assets/css/vault.css?v=7">
<style>
  body { opacity: 0; transition: opacity 300ms var(--ease); } body.in { opacity: 1; }
  .dealwrap { max-width: 720px; }
  .dealcard { padding: 24px; margin-bottom: 14px; display: flex; justify-content: space-between; gap: 18px; flex-wrap: wrap; }
  .couponchip { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.1em; border: 1px dashed var(--gold); color: var(--gold-glint); border-radius: 6px; padding: 8px 14px; cursor: pointer; user-select: none; transition: all 160ms var(--ease); }
  .couponchip:hover { background: rgba(201,162,39,0.08); }
</style>
</head>
<body>
<main class="wrap dealwrap">
  <div class="micro gold">TOOLS JAY ACTUALLY USES · PRICES MEMBERS ACTUALLY GET</div>
  <h1 style="margin-top:8px">Member Deals</h1>
  <p style="color:var(--text-dim);margin-top:10px;font-size:14.5px">Special pricing negotiated for Vault members. Click a coupon to copy it.</p>

  <div id="deals" style="margin-top:22px"></div>

  <div class="plate rv" style="padding:24px;border-style:dashed;text-align:center">
    <div class="micro">MORE DEALS LANDING HERE · JAY IS NEGOTIATING</div>
    <div class="micro" style="margin-top:6px;color:var(--dim-2)">GOT A TOOL YOU PAY FOR THAT THE VAULT SHOULD GET A DEAL ON? <a href="/ai-vault/ask.html" style="color:var(--gold-glint)">TELL JAY</a></div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/ai-vault/assets/js/demo-data.js?v=7"></script>
<script src="/ai-vault/assets/js/vault.js?v=7"></script>
<script>
(async function () {
  var access = await VAULT.requireMember();
  if (!access) return;
  VAULT.renderChrome("", access);
  VAULT.track("page_view", "deals");

  var esc = VAULT.esc;
  var deals = await VAULT.getDeals();
  document.getElementById("deals").innerHTML = deals.map(function (d) {
    return '<div class="plate dealcard rv">' +
      '<div style="flex:1;min-width:240px">' +
        '<h2 style="font-size:18px">' + esc(d.name) + "</h2>" +
        (d.deal_note ? '<div class="micro gold" style="margin:6px 0 10px">' + esc(d.deal_note).toUpperCase() + "</div>" : "") +
        '<p style="color:var(--text-dim);font-size:14px">' + esc(d.description || "") + "</p>" +
      "</div>" +
      '<div style="display:flex;flex-direction:column;gap:10px;align-items:flex-end;justify-content:center">' +
        (d.coupon ? '<span class="couponchip" data-coupon="' + esc(d.coupon) + '" title="Click to copy">COUPON: ' + esc(d.coupon) + "</span>" : "") +
        (d.url ? '<a class="btn" href="' + esc(d.url) + '" target="_blank" rel="noopener">Get the deal ↗</a>' : "") +
      "</div>" +
    "</div>";
  }).join("");

  document.body.addEventListener("click", function (ev) {
    var chip = ev.target.closest("[data-coupon]");
    if (!chip) return;
    navigator.clipboard.writeText(chip.dataset.coupon);
    var orig = chip.textContent;
    chip.textContent = "COPIED ✓";
    setTimeout(function () { chip.textContent = orig; }, 1200);
    VAULT.track("deal_coupon", chip.dataset.coupon);
  });

  document.body.classList.add("in");
  VAULT.reveal();
})();
</script>
</body>
</html>
