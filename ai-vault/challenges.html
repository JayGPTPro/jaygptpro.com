<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>document.documentElement.classList.add("js");try{if(localStorage.getItem("vault_theme")==="light")document.documentElement.dataset.theme="light"}catch(e){}</script>
<meta name="robots" content="noindex, nofollow">
<title>Challenges & Courses · AI Vault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500;600&family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" href="/ai-vault/assets/favicon.svg">
<link rel="stylesheet" href="/ai-vault/assets/css/vault.css?v=30">
<style>
  html.js body { opacity: 0; transition: opacity 300ms var(--ease); } html.js body.in { opacity: 1; }
  .dayrail { max-width: 760px; }
  .dayplate { margin-bottom: 14px; overflow: hidden; }
  .dayhead { display: flex; align-items: center; gap: 18px; padding: 18px 22px; cursor: pointer; }
  .dayplate.locked .dayhead { cursor: default; }
  .dayplate.locked { opacity: 0.55; }
  .dayplate.open-day { border-color: var(--gold); }
  .daynum { font-family: var(--font-mono); font-size: 13px; color: var(--text-dim); flex: 0 0 52px; }
  .dayplate.open-day .daynum, .dayplate.done .daynum { color: var(--gold-glint); }
  .daystate { margin-left: auto; flex: 0 0 auto; }
  .daybody { display: none; padding: 0 22px 22px 92px; }
  .dayplate.expanded .daybody { display: block; }
  @media (max-width: 640px) { .daybody { padding-left: 22px; } .daynum { flex-basis: 40px; } }
  .mission { color: var(--text-dim); font-size: 14px; white-space: pre-line; margin: 10px 0 16px; }
  .challenge-progress { height: 3px; background: var(--hairline); border-radius: 2px; overflow: hidden; margin: 18px 0 30px; }
  .challenge-progress span { display: block; height: 100%; background: var(--gold); transition: width 400ms var(--ease); }
  .completeplate { text-align: center; padding: 40px 24px; border-color: var(--gold); }
</style>
</head>
<body>
<main class="wrap" id="main"></main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/ai-vault/assets/js/demo-data.js?v=30"></script>
<script src="/ai-vault/assets/js/vault.js?v=30"></script>
<script>
(async function () {
  var access = await VAULT.requireMember();
  if (!access) return;
  VAULT.renderChrome("challenges", access);
  VAULT.track("page_view", "challenges");

  var $ = VAULT.$, esc = VAULT.esc, pad = VAULT.pad;
  var main = $("#main");
  main.innerHTML = '<div id="challengeBox"></div><div id="catalog"></div>';
  var box = $("#challengeBox");
  var ch = await VAULT.getChallenge();

  /* ---------- programs catalog (challenges + courses, member pricing) ---------- */
  var programs = await VAULT.getPrograms();
  $("#catalog").innerHTML =
    '<div class="band-head" style="margin-top:40px"><h2>Challenges &amp; Courses</h2><span class="micro">MEMBER PRICING ON EVERYTHING</span></div>' +
    '<div class="ep-grid" style="grid-template-columns:repeat(auto-fill,minmax(300px,1fr))">' +
    programs.map(function (p) {
      var badge = p.badge === "free_members"
        ? '<span class="kindtag mastermind">FREE FOR VAULT MEMBERS</span>'
        : '<span class="kindtag">' + esc((p.price_note || "MEMBER DEAL")).toUpperCase() + "</span>";
      return '<div class="plate rv" style="overflow:hidden">' +
        '<div class="ep-thumb">' + (p.image_url ? '<img src="' + esc(p.image_url) + '" alt="" loading="lazy">' : "") + "</div>" +
        '<div style="padding:18px 20px">' +
          badge +
          '<h3 style="margin:10px 0 6px">' + esc(p.title) + "</h3>" +
          '<p style="color:var(--text-dim);font-size:13.5px;margin-bottom:14px">' + esc(p.description || "") + "</p>" +
          '<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">' +
            /* no link yet: a live-looking button that goes nowhere is worse than
               saying the link is not open, so show the state instead */
            (p.url && p.url !== "#"
              ? '<a class="btn ' + (p.badge === "free_members" ? "gold" : "") + '" href="' + esc(p.url) + '"' + (/^https?:/.test(p.url) ? ' target="_blank" rel="noopener"' : "") + '>' + (p.badge === "free_members" ? "Start now" : "Get the member deal") + "</a>"
              : '<span class="micro">LINK OPENS WHEN THIS ONE GOES LIVE</span>') +
            (p.coupon ? '<span class="micro gold mono">COUPON: ' + esc(p.coupon) + "</span>" : "") +
          "</div>" +
        "</div>" +
      "</div>";
    }).join("") + "</div>" +
    '<div class="notice rv" style="margin-top:18px">Every future challenge, bootcamp, or seminar Jay releases outside the Vault comes with a special member price. Worth watching this page.</div>';

  if (!ch) {
    box.innerHTML = '<h1>Challenges &amp; Courses</h1><div class="micro" style="margin:8px 0 22px">CHALLENGES AND FULL COURSES, WITH MEMBER PRICING</div>' +
      '<div class="notice">No challenge is running right now. The next one gets announced on the WhatsApp group and the schedule board.</div>';
    document.body.classList.add("in");
    VAULT.reveal();
    return;
  }

  var now = Date.now();
  var done = ch.my_done || [];
  var expandedDay = null;   /* the day the member has open, preserved across renders */

  function render() {
    var openDays = ch.days.filter(function (d) { return now >= VAULT.dayUnlockAt(ch, d.day_number); });
    /* a challenge can exist with zero days while Jay is still building it in the
       admin: never celebrate completion of an empty board, and never divide by 0 */
    var pct = ch.days.length ? Math.round((done.length / ch.days.length) * 100) : 0;
    var allDone = ch.days.length > 0 && done.length >= ch.days.length;
    var todayDay = openDays.length && VAULT.dayUnlockAt(ch, openDays[openDays.length - 1].day_number) > now - 86400000 ? openDays[openDays.length - 1].day_number : null;

    var html =
      '<div class="hero-strip rv" style="margin-bottom:8px">' +
        '<img class="bgimg" src="' + esc(ch.hero_url || "/ai-vault/assets/img/dial-macro.jpg") + '" alt=""><span class="shade"></span>' +
        '<div class="inner">' +
          '<span class="kindtag mastermind">ACTIVE CHALLENGE' + (todayDay ? " · DAY " + pad(todayDay) + " UNLOCKED TODAY" : "") + "</span>" +
          '<h1 style="margin:12px 0 4px">' + esc(ch.title) + "</h1>" +
          '<div class="micro">' + esc(ch.description || "") + "</div>" +
        "</div>" +
      "</div>" +
      '<div class="dayrail">' +
        (ch.days.length
          ? '<div style="display:flex;justify-content:space-between;align-items:baseline"><span class="micro gold">' + done.length + '/' + ch.days.length + ' DAYS COMPLETE</span><span class="micro">' + (ch.starts_at > Date.now() ? 'STARTS ' : 'STARTED ') + VAULT.fmtDate(ch.starts_at) + '</span></div>' +
            '<div class="challenge-progress"><span style="width:' + pct + '%"></span></div>'
          /* days not published yet. Only promise a start date that is still ahead:
             openCount is 0 here because there are no days, not because it is early */
          : '<div class="notice">' + (ch.starts_at > Date.now()
              ? "The days for this challenge are not published yet. They land here before it starts on " + VAULT.fmtDate(ch.starts_at) + "."
              : "The days for this challenge are being posted. They land on this page as Jay publishes them.") + "</div>");

    if (allDone) {
      html += '<div class="plate completeplate rv" style="margin-bottom:20px">' +
        '<svg style="width:40px;height:40px;margin:0 auto 12px" viewBox="0 0 24 24" fill="none" stroke="#C9A227" stroke-width="1.4"><circle cx="12" cy="12" r="10"/><path d="M7 12.5l3.2 3.2L17 9"/></svg>' +
        '<h2>Challenge complete</h2>' +
        '<div class="micro" style="margin-top:6px">POST YOUR RESULT IN THE WHATSAPP GROUP. JAY IS WATCHING</div>' +
      "</div>";
    }

    html += ch.days.map(function (d) {
      var unlockAt = VAULT.dayUnlockAt(ch, d.day_number);
      var isOpen = now >= unlockAt;
      var isDone = done.indexOf(d.day_number) >= 0;
      var stateCls = isDone ? "done" : isOpen ? "open-day" : "locked";
      var lockSvg = '<svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.8" style="vertical-align:-1px"><rect x="5" y="11" width="14" height="9" rx="1.5"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>';
      var state = isDone
        ? '<span class="micro gold">✓ DONE</span>'
        : isOpen
          ? '<span class="micro gold">OPEN</span>'
          /* a bare weekday is ambiguous once the unlock is more than a week out */
          : '<span class="micro">' + lockSvg + " OPENS " + new Date(unlockAt).toLocaleDateString("en-US",
              unlockAt - now > 6 * 86400000 ? { month: "short", day: "numeric" } : { weekday: "short" }).toUpperCase() + "</span>";
      var video = d.vimeo_id
        ? '<div class="player-shell" style="margin-bottom:14px"><iframe src="https://player.vimeo.com/video/' + esc(d.vimeo_id) + (d.vimeo_hash ? "?h=" + esc(d.vimeo_hash) + "&" : "?") + 'dnt=1" allow="fullscreen" allowfullscreen title="Day ' + d.day_number + '"></iframe></div>'
        : "";
      return '<div class="plate dayplate rv ' + stateCls + '" data-day="' + d.day_number + '">' +
        '<div class="dayhead"' + (isOpen ? ' role="button" tabindex="0" aria-expanded="false"' : "") + ">" +
          '<span class="daynum">DAY ' + pad(d.day_number) + "</span>" +
          '<h3 style="font-size:15px;flex:1">' + esc(d.title) + "</h3>" +
          '<span class="daystate">' + state + "</span>" +
        "</div>" +
        (isOpen ? '<div class="daybody">' + video +
          '<div class="mission">' + esc(d.body || "") + "</div>" +
          '<button class="btn ' + (isDone ? "quiet" : "gold") + '" data-complete="' + d.day_number + '">' + (isDone ? "Completed ✓" : "Mark day " + d.day_number + " complete") + "</button>" +
        "</div>" : "") +
      "</div>";
    }).join("");

    html += "</div>";
    box.innerHTML = html;

    /* keep the day the member is actually reading open across re-renders; only
       fall back to the heuristic (first open-not-done, else last open) on load */
    var target = expandedDay;
    if (!target) {
      var current = ch.days.find(function (d) { return now >= VAULT.dayUnlockAt(ch, d.day_number) && done.indexOf(d.day_number) < 0; });
      target = current ? current.day_number : (openDays.length ? openDays[openDays.length - 1].day_number : null);
    }
    if (target) {
      var n = box.querySelector('[data-day="' + target + '"]');
      if (n) {
        n.classList.add("expanded");
        /* the markup ships aria-expanded="false", so the opened day must be
           corrected here or screen readers announce it as collapsed */
        var h = n.querySelector(".dayhead[aria-expanded]");
        if (h) h.setAttribute("aria-expanded", "true");
      }
    }

    VAULT.reveal();
  }

  main.addEventListener("click", async function (ev) {
    var btn = ev.target.closest("[data-complete]");
    if (btn) {
      var dn = Number(btn.dataset.complete);
      if (done.indexOf(dn) < 0) {
        /* optimistic paint, rolled back if the Vault refuses: otherwise the day
           shows Completed and the guard above blocks every retry. The acted-on
           day stays expanded so any failure message lands where the member looks */
        expandedDay = dn;
        done.push(dn); render();
        try {
          await VAULT.completeChallengeDay(ch.slug, dn);
          VAULT.track("challenge_day", ch.slug + ":" + dn);
        } catch (e) {
          var i = done.indexOf(dn); if (i >= 0) done.splice(i, 1);
          /* force the failed day open even if the member browsed elsewhere while
             the write was in flight: otherwise the retry button lands in a
             collapsed body and the rollback looks like nothing happened */
          expandedDay = dn;
          render();
          var again = main.querySelector('[data-complete="' + dn + '"]');
          if (again) {
            again.textContent = "Could not save. Try again";
            again.scrollIntoView({ block: "nearest" });
            setTimeout(function () { if (again.parentNode) again.textContent = "Mark day " + dn + " complete"; }, 3200);
          }
        }
      }
      /* an already-done day needs no re-render: doing one would collapse the day
         the member is reading and expand a different one */
      return;
    }
    var head = ev.target.closest(".dayhead");
    if (head) {
      var plate = head.parentElement;
      if (!plate.classList.contains("locked")) {
        var open = plate.classList.toggle("expanded");
        if (head.hasAttribute("aria-expanded")) head.setAttribute("aria-expanded", open);
        expandedDay = open ? Number(plate.dataset.day) : null;   /* remember for re-renders */
      }
    }
  });
  main.addEventListener("keydown", function (ev) {
    if (ev.key !== "Enter" && ev.key !== " ") return;
    var head = ev.target.closest(".dayhead[role='button']");
    if (head) { ev.preventDefault(); head.click(); }
  });

  render();
  document.body.classList.add("in");
})();
</script>
</body>
</html>
