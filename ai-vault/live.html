<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>try{if(localStorage.getItem("vault_theme")==="light")document.documentElement.dataset.theme="light"}catch(e){}</script>
<meta name="robots" content="noindex, nofollow">
<title>Upcoming · AI Vault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500;600&family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" href="/ai-vault/assets/favicon.svg">
<link rel="stylesheet" href="/ai-vault/assets/css/vault.css?v=13">
<style>
  body { opacity: 0; transition: opacity 300ms var(--ease); } body.in { opacity: 1; }
</style>
</head>
<body>
<main class="wrap">
  <div class="hero-strip rv" style="margin-bottom:30px">
    <img class="bgimg" src="/ai-vault/assets/img/corridor.jpg" alt="">
    <span class="shade"></span>
    <div class="inner">
      <div class="micro gold">THE SCHEDULE BOARD · ALL TIMES SHOWN IN YOUR LOCAL TIME</div>
      <h1 style="margin-top:8px">Upcoming</h1>
    </div>
  </div>

  <section class="band rv">
    <div class="band-head">
      <h2>Upcoming AI Episodes</h2>
      <span class="micro">ONE DEEP DIVE EVERY MONTH · REPLAYS LAND IN <a href="/ai-vault/episodes.html" style="color:var(--gold-glint)">EPISODES</a> THE SAME DAY</span>
    </div>
    <div id="episodeSessions"></div>
  </section>

  <section class="band rv">
    <div class="band-head">
      <h2>Monthly Masterminds</h2>
      <a class="more" href="/ai-vault/masterminds.html">Details + enroll →</a>
    </div>
    <div id="mastermindSessions"></div>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/ai-vault/assets/js/demo-data.js?v=13"></script>
<script src="/ai-vault/assets/js/vault.js?v=13"></script>
<script>
(async function () {
  var access = await VAULT.requireMember();
  if (!access) return;
  VAULT.renderChrome("live", access);
  VAULT.track("page_view", "upcoming");

  var esc = VAULT.esc;
  var sessions = await VAULT.getSessions();
  var firstTs = sessions.length ? sessions[0].starts_at : null;

  function card(s) {
    var d = new Date(s.starts_at);
    var when = d.toLocaleString("en-US", { weekday: "long", month: "short", day: "numeric", hour: "numeric", minute: "2-digit" });
    var soon = s.starts_at - Date.now() < 86400000;
    return '<div class="plate sessioncard rv" style="margin-bottom:12px">' +
      '<div>' +
        (soon ? '<span class="kindtag live-now">STARTS SOON</span>' : "") +
        '<h3 style="margin:' + (soon ? "8px" : "0") + ' 0 2px">' + esc(s.title) + "</h3>" +
        '<div class="micro gold">' + esc(when.toUpperCase()) + (s.guest_name ? " · WITH " + esc(s.guest_name).toUpperCase() : "") + "</div>" +
      "</div>" +
      '<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">' +
        (s.starts_at === firstTs ? '<div class="board" data-count="' + s.starts_at + '" style="margin-right:6px"></div>' : "") +
        '<button class="btn quiet" data-ics="' + s.starts_at + '" data-title="' + esc(s.title) + '">Add to calendar</button>' +
        (s.zoom_url ? '<a class="btn" href="' + esc(s.zoom_url) + '" target="_blank" rel="noopener">Zoom link</a>' : "") +
      "</div>" +
    "</div>";
  }

  var eps = sessions.filter(function (s) { return s.kind !== "mastermind"; });
  var mms = sessions.filter(function (s) { return s.kind === "mastermind"; });

  document.getElementById("episodeSessions").innerHTML = eps.length
    ? eps.map(card).join("")
    : '<div class="notice">The next episode date lands here as soon as it is set.</div>';
  document.getElementById("mastermindSessions").innerHTML = mms.length
    ? mms.map(card).join("")
    : '<div class="notice">The next Mastermind date lands here as soon as it is set.</div>';

  var cd = document.querySelector("[data-count]");
  if (cd) VAULT.mountCountdown(cd, Number(cd.dataset.count));

  document.body.addEventListener("click", function (ev) {
    var b = ev.target.closest("[data-ics]");
    if (!b) return;
    var ts = Number(b.dataset.ics);
    var dt = function (t) { return new Date(t).toISOString().replace(/[-:]|\.\d{3}/g, ""); };
    var ics = "BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//AI Vault//EN\nBEGIN:VEVENT\nUID:" + ts + "@aivault\nDTSTAMP:" + dt(Date.now()) + "\nDTSTART:" + dt(ts) + "\nDTEND:" + dt(ts + 3600000) + "\nSUMMARY:AI Vault · " + b.dataset.title.replace(/[,;]/g, " ") + "\nDESCRIPTION:Zoom link inside the Vault: https://jaygptpro.com/ai-vault/live.html\nEND:VEVENT\nEND:VCALENDAR";
    var a = document.createElement("a");
    a.href = "data:text/calendar;charset=utf-8," + encodeURIComponent(ics);
    a.download = "ai-vault-session.ics"; a.click();
  });

  document.body.classList.add("in");
  VAULT.reveal();
})();
</script>
</body>
</html>
