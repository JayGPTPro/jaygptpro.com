<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>try{if(localStorage.getItem("vault_theme")==="light")document.documentElement.dataset.theme="light"}catch(e){}</script>
<meta name="robots" content="noindex, nofollow">
<title>The Vault Floor · AI Vault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500;600&family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/ai-vault/assets/css/vault.css?v=8">
<style>
  body { opacity: 0; transition: opacity 300ms var(--ease); } body.in { opacity: 1; }
  .session-plate { display: flex; align-items: center; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
  .duo { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 720px) { .duo { grid-template-columns: 1fr; } }
  .compartment { display: flex; align-items: center; justify-content: space-between; padding: 20px 22px; }
  .starthere { display: flex; align-items: center; gap: 20px; padding: 18px 22px; flex-wrap: wrap; }
  .starthere .bar { flex: 1; min-width: 160px; height: 3px; background: var(--hairline); border-radius: 2px; overflow: hidden; }
  .starthere .bar span { display: block; height: 100%; background: var(--gold); }
</style>
</head>
<body>
<main class="wrap" id="main"></main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/ai-vault/assets/js/demo-data.js?v=8"></script>
<script src="/ai-vault/assets/js/vault.js?v=8"></script>
<script>
(async function () {
  var access = await VAULT.requireMember();
  if (!access) return;
  VAULT.renderChrome("home", access);
  VAULT.track("page_view", "home");

  var $ = VAULT.$, esc = VAULT.esc;
  var main = $("#main");
  var results = await Promise.all([VAULT.getEpisodes(), VAULT.getProgressMap(), VAULT.getSocial(), VAULT.getNextSession(), VAULT.getLessons(), VAULT.getLessonDone(), VAULT.memberCount(), VAULT.getChallenge()]);
  var episodes = results[0], prog = results[1], social = results[2], session = results[3], lessons = results[4], lessonsDone = results[5], members = results[6], challenge = results[7];

  var html = "";
  var first = (access.name || "").split(" ")[0];

  /* greeting */
  html += '<div class="band" style="margin-bottom:30px;display:flex;justify-content:space-between;align-items:flex-end;gap:14px;flex-wrap:wrap">' +
    '<div><div class="micro gold">' + VAULT.fmtDate(Date.now()) + "</div>" +
    '<h1 style="margin-top:6px">The Vault Floor</h1></div>' +
    VAULT.avatarStack(members) + "</div>";

  /* since your last visit (returning members only) */
  var lastVisit = VAULT.getLastVisit();
  var sinceItems = [];
  if (lastVisit) {
    episodes.filter(function (e) { return e.published_at > lastVisit; }).slice(0, 2).forEach(function (e) {
      sinceItems.push({ label: "NEW EPISODE", text: e.title, href: "/ai-vault/episode.html?ep=" + encodeURIComponent(e.slug) });
    });
    if (challenge) {
      var opened = challenge.days.filter(function (d) { var u = VAULT.dayUnlockAt(challenge, d.day_number); return u > lastVisit && u <= Date.now(); });
      if (opened.length) {
        var od = opened[opened.length - 1];
        sinceItems.push({ label: "CHALLENGE", text: "Day " + od.day_number + " unlocked: " + od.title, href: "/ai-vault/challenges.html" });
      }
    }
    if (session && session.starts_at - Date.now() < 3 * 86400000) {
      sinceItems.push({ label: "COMING UP", text: session.title, href: "/ai-vault/live.html" });
    }
  }
  if (sinceItems.length) {
    html += '<section class="band rv" style="margin-bottom:26px"><div class="plate" style="padding:16px 22px">' +
      '<div class="micro gold" style="margin-bottom:6px">SINCE YOUR LAST VISIT</div>' +
      sinceItems.slice(0, 3).map(function (it) {
        return '<a href="' + it.href + '" style="display:flex;gap:12px;align-items:baseline;padding:9px 0;border-top:1px solid var(--hairline)">' +
          '<span class="micro" style="flex:0 0 104px;color:var(--gold-glint)">' + it.label + "</span>" +
          '<span style="font-size:14px">' + esc(it.text) + '</span><span class="micro" style="margin-left:auto">→</span></a>';
      }).join("") + "</div></section>";
  }

  /* Start Here progress (first thing new members see, disappears when finished) */
  var doneCount = lessonsDone.length, totalLessons = lessons.length;
  if (doneCount < totalLessons) {
    var lpct = Math.round((doneCount / totalLessons) * 100);
    html += '<section class="band rv"><a class="plate starthere click" href="/ai-vault/induction.html">' +
      '<span class="micro gold" style="flex:0 0 auto">START HERE · ' + doneCount + "/" + totalLessons + "</span>" +
      '<div class="bar"><span style="width:' + lpct + '%"></span></div>' +
      '<span class="micro">' + (doneCount === 0 ? "YOUR FIRST 10 MINUTES ARE MAPPED OUT →" : "CONTINUE THE INDUCTION →") + "</span>" +
    "</a></section>";
  }

  /* next live session */
  if (session) {
    var when = new Date(session.starts_at).toLocaleString("en-US", { weekday: "short", month: "short", day: "numeric", hour: "numeric", minute: "2-digit" });
    html += '<section class="band rv">' +
      '<div class="band-head"><span class="micro"><span class="livedot"></span>Next session · Schedule board</span><a class="more" href="/ai-vault/live.html">All upcoming →</a></div>' +
      '<div class="plate pad session-plate">' +
        '<div>' +
          '<span class="kindtag ' + (session.kind === "mastermind" ? "mastermind" : "") + '">' + esc(session.kind || "episode") + "</span>" +
          '<h2 style="margin:10px 0 4px">' + esc(session.title) + "</h2>" +
          '<div class="micro gold">' + esc(when) + " · YOUR LOCAL TIME" + (session.guest_name ? " · WITH " + esc(session.guest_name).toUpperCase() : "") + "</div>" +
          '<div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap">' +
            '<a class="btn quiet" href="/ai-vault/live.html">Details + calendar</a>' +
            (session.zoom_url ? '<a class="btn quiet" href="' + esc(session.zoom_url) + '" target="_blank" rel="noopener">Zoom link</a>' : "") +
          "</div>" +
        "</div>" +
        '<div class="board" id="countdown"></div>' +
      "</div></section>";
  }

  /* active challenge */
  if (challenge) {
    var chDone = (challenge.my_done || []).length;
    var openCount = challenge.days.filter(function (d) { return Date.now() >= VAULT.dayUnlockAt(challenge, d.day_number); }).length;
    var todayNew = challenge.days.some(function (d) { var u = VAULT.dayUnlockAt(challenge, d.day_number); return u <= Date.now() && u > Date.now() - 86400000; });
    html += '<section class="band rv"><a class="plate click" style="display:flex;align-items:center;gap:18px;padding:18px 22px;flex-wrap:wrap" href="/ai-vault/challenges.html">' +
      '<span class="glint-edge"></span>' +
      '<span class="kindtag mastermind">CHALLENGE' + (todayNew ? " · NEW DAY TODAY" : "") + "</span>" +
      '<h3 style="flex:1;min-width:200px">' + esc(challenge.title) + "</h3>" +
      '<span class="micro gold">' + chDone + "/" + challenge.days.length + " DAYS DONE · DAY " + openCount + " IS OPEN →</span>" +
    "</a></section>";
  }

  /* this month's episode (feature) */
  var latest = episodes[0];
  if (latest) {
    html += '<section class="band rv">' +
      '<div class="band-head"><h2>This Month’s AI Episode</h2><span class="micro gold">' + VAULT.fmtMonth(latest.published_at) + "</span></div>" +
      '<a class="plate feature-ep click" href="/ai-vault/episode.html?ep=' + encodeURIComponent(latest.slug) + '">' +
        '<div class="fthumb"><img src="' + esc(latest.thumbnail_url || "") + '" alt=""></div>' +
        '<div class="fbody">' +
          '<div class="micro gold">' + (latest.guest_name ? "WITH " + esc(latest.guest_name).toUpperCase() : "MONTHLY DEEP DIVE") + "</div>" +
          '<h2>' + esc(latest.title) + "</h2>" +
          '<p style="color:var(--text-dim);font-size:14px">' + esc(latest.description || "") + "</p>" +
          '<div class="ep-meta micro"><span>' + VAULT.fmtDuration(latest.duration_seconds) + "</span><span class=\"likecount\">♥ " + ((social[latest.slug] || {}).likes || 0) + "</span></div>" +
          '<div><span class="btn gold" style="margin-top:6px">Watch now</span></div>' +
        "</div>" +
      "</a></section>";
  }

  /* continue watching */
  var unfinished = episodes.filter(function (e) {
    var p = prog[e.slug]; return p && !p.completed && p.position > 30;
  }).sort(function (a, b) { return ((prog[b.slug] || {}).t || 0) - ((prog[a.slug] || {}).t || 0); });
  if (unfinished.length) {
    var ep = unfinished[0], p = prog[ep.slug];
    var pct = ep.duration_seconds ? Math.min(100, Math.round((p.position / ep.duration_seconds) * 100)) : 0;
    html += '<section class="band rv">' +
      '<div class="band-head"><span class="micro">Continue watching</span></div>' +
      '<a class="plate click" style="display:flex;align-items:center;gap:20px;padding:16px 22px;overflow:hidden" href="/ai-vault/episode.html?ep=' + encodeURIComponent(ep.slug) + '">' +
        '<div style="flex:1;min-width:200px">' +
          '<div class="micro">' + VAULT.fmtMonth(ep.published_at) + " · " + pct + "% WATCHED</div>" +
          '<h3 style="margin:6px 0">' + esc(ep.title) + "</h3>" +
          '<div class="micro gold">Resume from ' + VAULT.fmtTime(p.position) + " →</div>" +
        "</div>" +
        '<span class="ep-hairline" style="width:' + pct + '%"></span>' +
      "</a></section>";
  }

  /* saved for later */
  var saved = episodes.filter(function (e) { return (social[e.slug] || {}).my_watch_later; });
  if (saved.length) {
    html += '<section class="band rv">' +
      '<div class="band-head"><span class="micro">Saved for later</span><span class="micro mono">' + saved.length + "</span></div>" +
      '<div class="ep-grid">' + saved.slice(0, 3).map(function (e) { return VAULT.epCard(e, prog, social); }).join("") + "</div></section>";
  }

  /* latest episodes */
  html += '<section class="band rv">' +
    '<div class="band-head"><h2>Latest AI Episodes</h2><a class="more" href="/ai-vault/episodes.html">All episodes →</a></div>' +
    '<div class="ep-grid">' + episodes.slice(latest ? 1 : 0, latest ? 4 : 3).map(function (e) { return VAULT.epCard(e, prog, social); }).join("") + "</div></section>";

  /* 1-on-1 spotlight */
  html += '<section class="band rv"><a class="hero-strip click" href="/ai-vault/consultation.html" style="display:flex">' +
    '<img class="bgimg" src="/ai-vault/assets/img/lounge.jpg" alt=""><span class="shade"></span>' +
    '<div class="inner" style="display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap">' +
      '<div><span class="value-tag">A $400 SESSION · INCLUDED</span>' +
      '<h2 style="margin:12px 0 4px">Your private 1-on-1 with Jay</h2>' +
      '<div class="micro">ONE STRATEGY CALL, EVERY QUARTER. YOURS.</div></div>' +
      '<span class="btn gold">Claim your session</span>' +
    "</div></a></section>";

  /* the compartments directory */
  html += '<section class="band rv"><div class="band-head"><span class="micro">Compartments</span></div><div class="duo">' +
    '<a class="plate compartment" href="https://prompt.jaygptpro.com" target="_blank" rel="noopener"><span class="glint-edge"></span><div><div class="micro gold">01</div><h3 style="margin-top:4px">Prompt Vault</h3><div class="micro" style="margin-top:4px">Save, organize, reuse</div></div><span class="micro">OPEN ↗</span></a>' +
    '<a class="plate compartment" href="https://jaygptpro.com/ai-toolbox" target="_blank" rel="noopener"><span class="glint-edge"></span><div><div class="micro gold">02</div><h3 style="margin-top:4px">AI Toolbox</h3><div class="micro" style="margin-top:4px">The tools that work right now</div></div><span class="micro">OPEN ↗</span></a>' +
    '<a class="plate compartment" href="/ai-vault/tools.html"><span class="glint-edge"></span><div><div class="micro gold">03</div><h3 style="margin-top:4px">Member Deals</h3><div class="micro" style="margin-top:4px">Special tool pricing + coupons</div></div><span class="micro">OPEN →</span></a>' +
    '<a class="plate compartment" href="/ai-vault/whatsapp.html"><span class="glint-edge"></span><div><div class="micro gold">04</div><h3 style="margin-top:4px">WhatsApp Groups</h3><div class="micro" style="margin-top:4px">Community + updates, join one or both</div></div><span class="micro">JOIN →</span></a>' +
    '<a class="plate compartment" href="/ai-vault/faq.html"><span class="glint-edge"></span><div><div class="micro gold">05</div><h3 style="margin-top:4px">AI Vault FAQ\'s</h3><div class="micro" style="margin-top:4px">Everything members ask, answered once</div></div><span class="micro">READ →</span></a>' +
    '<a class="plate compartment" href="/ai-vault/ask.html"><span class="glint-edge"></span><div><div class="micro gold">06</div><h3 style="margin-top:4px">Ask the AI Experts</h3><div class="micro" style="margin-top:4px">Members helping members, daily</div></div><span class="micro">ASK →</span></a>' +
    '<a class="plate compartment" href="/ai-vault/masterminds.html"><span class="glint-edge"></span><div><div class="micro gold">07</div><h3 style="margin-top:4px">Monthly Masterminds</h3><div class="micro" style="margin-top:4px">Small groups, real challenges, first Wednesday</div></div><span class="micro">ENROLL →</span></a>' +
  "</div></section>";

  main.innerHTML = html;
  if (session) VAULT.mountCountdown($("#countdown"), session.starts_at);
  document.body.classList.add("in");
  VAULT.reveal();
  VAULT.stampVisit();
})();
</script>
</body>
</html>
