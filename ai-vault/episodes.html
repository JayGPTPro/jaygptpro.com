<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>The Reserve · AI Vault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500;600&family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/ai-vault/assets/css/vault.css">
<style>
  body { opacity: 0; transition: opacity 300ms var(--ease); }
  body.in { opacity: 1; }
  .controls { display: flex; gap: 12px; margin: 18px 0 26px; flex-wrap: wrap; }
  .controls .search { flex: 1; min-width: 220px; }
</style>
</head>
<body>
<main class="wrap">
  <div class="band-head" style="margin-bottom:4px">
    <div>
      <h1>Episodes</h1>
      <div class="micro" style="margin-top:6px">The Reserve · One deposit every month</div>
    </div>
    <span class="micro mono" id="count"></span>
  </div>
  <div class="controls">
    <input class="search" id="search" type="search" placeholder="Search episodes, guests, topics..." autocomplete="off">
    <div class="segments" id="segments"></div>
  </div>
  <div class="ep-grid" id="grid"></div>
  <div class="notice" id="empty" style="display:none;margin-top:14px">Nothing in this drawer. Try another filter.</div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/ai-vault/assets/js/demo-data.js"></script>
<script src="/ai-vault/assets/js/vault.js"></script>
<script>
(async function () {
  var access = await VAULT.requireMember();
  if (!access) return;
  VAULT.renderChrome("episodes", access);
  VAULT.track("page_view", "episodes");

  var $ = VAULT.$;
  var episodes = await VAULT.getEpisodes();
  var prog = await VAULT.getProgressMap();

  /* build tag list from data (problem-first tags come from the DB) */
  var tags = ["All"];
  episodes.forEach(function (e) { (e.tags || []).forEach(function (t) { if (tags.indexOf(t) < 0) tags.push(t); }); });

  var state = { tag: "All", q: "" };

  function render() {
    var q = state.q.toLowerCase();
    var list = episodes.filter(function (e) {
      var tagOk = state.tag === "All" || (e.tags || []).indexOf(state.tag) >= 0;
      var qOk = !q || (e.title + " " + (e.guest_name || "") + " " + (e.tags || []).join(" ")).toLowerCase().indexOf(q) >= 0;
      return tagOk && qOk;
    });
    $("#grid").innerHTML = list.map(function (e) { return VAULT.epCard(e, prog); }).join("");
    $("#empty").style.display = list.length ? "none" : "";
    $("#count").textContent = String(list.length).padStart(2, "0") + " / " + String(episodes.length).padStart(2, "0");
  }

  $("#segments").innerHTML = tags.map(function (t) {
    return '<button data-tag="' + VAULT.esc(t) + '" class="' + (t === "All" ? "active" : "") + '">' + VAULT.esc(t) + "</button>";
  }).join("");
  $("#segments").addEventListener("click", function (ev) {
    var b = ev.target.closest("button"); if (!b) return;
    state.tag = b.dataset.tag;
    $("#segments").querySelectorAll("button").forEach(function (x) { x.classList.toggle("active", x === b); });
    render();
  });
  $("#search").addEventListener("input", function (ev) { state.q = ev.target.value; render(); });

  render();
  document.body.classList.add("in");
})();
</script>
</body>
</html>
