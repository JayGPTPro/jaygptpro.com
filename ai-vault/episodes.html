<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>try{if(localStorage.getItem("vault_theme")==="light")document.documentElement.dataset.theme="light"}catch(e){}</script>
<meta name="robots" content="noindex, nofollow">
<title>AI Episodes · AI Vault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500;600&family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/ai-vault/assets/css/vault.css?v=6">
<style>
  body { opacity: 0; transition: opacity 300ms var(--ease); } body.in { opacity: 1; }
  .controls { display: flex; gap: 12px; margin: 22px 0 26px; flex-wrap: wrap; }
  .controls .search { flex: 1; min-width: 220px; }
</style>
</head>
<body>
<main class="wrap">
  <div class="hero-strip rv" style="margin-bottom:26px">
    <img class="bgimg" src="/ai-vault/assets/img/deposit-wall.jpg" alt="">
    <span class="shade"></span>
    <div class="inner" style="display:flex;justify-content:space-between;align-items:flex-end;gap:14px;flex-wrap:wrap">
      <div>
        <div class="micro gold">THE RESERVE · ONE NEW EPISODE EVERY MONTH</div>
        <h1 style="margin-top:8px">AI Episodes</h1>
      </div>
      <span class="micro mono" id="count"></span>
    </div>
  </div>
  <div class="controls">
    <input class="search" id="search" type="search" placeholder="Search episodes, guests, topics..." autocomplete="off">
    <div class="segments" id="segments"></div>
  </div>
  <div class="ep-grid" id="grid"></div>
  <div class="notice" id="empty" style="display:none;margin-top:14px">Nothing in this drawer. Try another filter.</div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/ai-vault/assets/js/demo-data.js?v=6"></script>
<script src="/ai-vault/assets/js/vault.js?v=6"></script>
<script>
(async function () {
  var access = await VAULT.requireMember();
  if (!access) return;
  VAULT.renderChrome("episodes", access);
  VAULT.track("page_view", "episodes");

  var $ = VAULT.$;
  var results = await Promise.all([VAULT.getEpisodes(), VAULT.getProgressMap(), VAULT.getSocial()]);
  var episodes = results[0], prog = results[1], social = results[2];

  var tags = ["All"];
  episodes.forEach(function (e) { (e.tags || []).forEach(function (t) { if (tags.indexOf(t) < 0) tags.push(t); }); });
  tags.push("Saved ★");

  var state = { tag: "All", q: "" };

  function render() {
    var q = state.q.toLowerCase();
    var list = episodes.filter(function (e) {
      var tagOk = state.tag === "All" ? true
        : state.tag === "Saved ★" ? !!(social[e.slug] || {}).my_watch_later
        : (e.tags || []).indexOf(state.tag) >= 0;
      var qOk = !q || (e.title + " " + (e.guest_name || "") + " " + (e.tags || []).join(" ")).toLowerCase().indexOf(q) >= 0;
      return tagOk && qOk;
    });
    $("#grid").innerHTML = list.map(function (e) { return VAULT.epCard(e, prog, social); }).join("");
    $("#empty").style.display = list.length ? "none" : "";
    $("#count").textContent = String(list.length).padStart(2, "0") + " / " + String(episodes.length).padStart(2, "0");
    VAULT.reveal();
  }

  $("#segments").innerHTML = tags.map(function (t) {
    return '<button data-tag="' + VAULT.esc(t) + '" class="' + (t === "All" ? "active" : "") + '">' + VAULT.esc(t) + "</button>";
  }).join("");
  $("#segments").addEventListener("click", function (ev) {
    var b = ev.target.closest("button"); if (!b) return;
    state.tag = b.dataset.tag;
    $("#segments").querySelectorAll("button").forEach(function (x) { x.classList.toggle("active", x === b); });
    render();
  });
  $("#search").addEventListener("input", function (ev) { state.q = ev.target.value; render(); });

  render();
  document.body.classList.add("in");
})();
</script>
</body>
</html>
