  {
    id: 'advanced', icon: '\u{1F680}', css: 'cat-advanced',
    name: { en: 'Advanced Features', he: '\u05EA\u05DB\u05D5\u05E0\u05D5\u05EA \u05DE\u05EA\u05E7\u05D3\u05DE\u05D5\u05EA' },
    terms: [
      { term: 'CLAUDE.md',
        en: 'A file you place in your project folder that gives Claude permanent instructions. Instead of repeating yourself every session, Claude reads this file and already knows your preferences.',
        he: '\u05E7\u05D5\u05D1\u05E5 \u05E9\u05DE\u05DE\u05E7\u05DE\u05D9\u05DD \u05D1\u05EA\u05D9\u05E7\u05D9\u05D9\u05EA \u05D4\u05E4\u05E8\u05D5\u05D9\u05E7\u05D8 \u05E9\u05E0\u05D5\u05EA\u05DF \u05DC\u05E7\u05DC\u05D5\u05D3 \u05D4\u05D5\u05E8\u05D0\u05D5\u05EA \u05E7\u05D1\u05D5\u05E2\u05D5\u05EA. \u05D1\u05DE\u05E7\u05D5\u05DD \u05DC\u05D7\u05D6\u05D5\u05E8 \u05E2\u05DC \u05E2\u05E6\u05DE\u05DA \u05D1\u05DB\u05DC \u05E1\u05E9\u05DF, Claude \u05E7\u05D5\u05E8\u05D0 \u05D0\u05EA \u05D4\u05E7\u05D5\u05D1\u05E5 \u05D5\u05DB\u05D1\u05E8 \u05DE\u05DB\u05D9\u05E8 \u05D0\u05EA \u05D4\u05D4\u05E2\u05D3\u05E4\u05D5\u05EA \u05E9\u05DC\u05DA.',
        detail_en: 'Like an employee handbook for your AI. Put "always use TypeScript, never use var, test everything" in CLAUDE.md and Claude follows these rules automatically in every conversation. You can have a global CLAUDE.md (applies to everything) and project level ones (for specific projects). It is read at the start of every session.',
        detail_he: '\u05DB\u05DE\u05D5 \u05E1\u05E4\u05E8 \u05E0\u05D4\u05DC\u05D9\u05DD \u05DC\u05E2\u05D5\u05D1\u05D3 \u05D4\u05BEAI \u05E9\u05DC\u05DA. \u05E9\u05D9\u05DE\u05D5 "\u05EA\u05DE\u05D9\u05D3 \u05EA\u05E9\u05EA\u05DE\u05E9 \u05D1\u05BETypeScript, \u05DC\u05E2\u05D5\u05DC\u05DD \u05DC\u05D0 var, \u05EA\u05D1\u05D3\u05D5\u05E7 \u05D4\u05DB\u05DC" \u05D1\u05BEClaude.md \u05D5\u05E7\u05DC\u05D5\u05D3 \u05E2\u05D5\u05E7\u05D1 \u05D0\u05D7\u05E8\u05D9 \u05D4\u05DB\u05DC\u05DC\u05D9\u05DD \u05D4\u05D0\u05DC\u05D4 \u05D0\u05D5\u05D8\u05D5\u05DE\u05D8\u05D9\u05EA \u05D1\u05DB\u05DC \u05E9\u05D9\u05D7\u05D4. \u05D0\u05E4\u05E9\u05E8 \u05DC\u05D4\u05D7\u05D6\u05D9\u05E7 CLAUDE.md \u05D2\u05DC\u05D5\u05D1\u05DC\u05D9 (\u05D7\u05DC \u05E2\u05DC \u05D4\u05DB\u05DC) \u05D5\u05D1\u05E8\u05DE\u05EA \u05E4\u05E8\u05D5\u05D9\u05E7\u05D8 (\u05DC\u05E4\u05E8\u05D5\u05D9\u05E7\u05D8\u05D9\u05DD \u05E1\u05E4\u05E6\u05D9\u05E4\u05D9\u05D9\u05DD). \u05E0\u05E7\u05E8\u05D0 \u05D1\u05EA\u05D7\u05D9\u05DC\u05EA \u05DB\u05DC \u05E1\u05E9\u05DF.',
        example_en: 'Your CLAUDE.md says: "Always use TypeScript. Prefer Tailwind for styling. Write tests for every new function. My brand colors are #1a1a2e and #f97316." Now every Claude Code session automatically follows these rules without you repeating them.',
        links: [{label: 'Covered in Daily Claude Hack #29', url: 'https://jaygptpro.com/claude/claude-dictionary.html'}, {label: 'Claude Code Docs: CLAUDE.md', url: 'https://docs.anthropic.com/en/docs/claude-code/memory'}] },
      { term: 'Skills',
        en: 'Reusable instruction sets saved as files. Once you create a skill, Claude can use it in any project without you explaining the same workflow again.',
        he: '\u05E7\u05D1\u05E6\u05D9 \u05D4\u05D5\u05E8\u05D0\u05D5\u05EA \u05DC\u05E9\u05D9\u05DE\u05D5\u05E9 \u05D7\u05D5\u05D6\u05E8. \u05D1\u05E8\u05D2\u05E2 \u05E9\u05D9\u05D5\u05E6\u05E8\u05D9\u05DD \u05E1\u05E7\u05D9\u05DC, Claude \u05D9\u05DB\u05D5\u05DC \u05DC\u05D4\u05E9\u05EA\u05DE\u05E9 \u05D1\u05D5 \u05D1\u05DB\u05DC \u05E4\u05E8\u05D5\u05D9\u05E7\u05D8 \u05D1\u05DC\u05D9 \u05E9\u05EA\u05E1\u05D1\u05D9\u05E8\u05D5 \u05D0\u05EA \u05D0\u05D5\u05EA\u05D5 \u05EA\u05D4\u05DC\u05D9\u05DA \u05E2\u05D1\u05D5\u05D3\u05D4 \u05E9\u05D5\u05D1.',
        detail_en: 'Create a "write product listing" skill and Claude follows your exact format every time. Skills are markdown files saved in a special folder. You can create them manually or ask Claude to save a workflow as a skill. They can be project specific or global (available in all projects). Think of them as templates for Claude\'s behavior.',
        detail_he: '\u05E6\u05E8\u05D5 \u05E1\u05E7\u05D9\u05DC "write product listing" \u05D5\u05E7\u05DC\u05D5\u05D3 \u05E2\u05D5\u05E7\u05D1 \u05D0\u05D7\u05E8\u05D9 \u05D4\u05E4\u05D5\u05E8\u05DE\u05D8 \u05D4\u05DE\u05D3\u05D5\u05D9\u05E7 \u05E9\u05DC\u05DB\u05DD \u05D1\u05DB\u05DC \u05E4\u05E2\u05DD. Skills \u05D4\u05DD \u05E7\u05D1\u05E6\u05D9 markdown \u05E9\u05E9\u05DE\u05D5\u05E8\u05D9\u05DD \u05D1\u05EA\u05D9\u05E7\u05D9\u05D4 \u05DE\u05D9\u05D5\u05D7\u05D3\u05EA. \u05D0\u05E4\u05E9\u05E8 \u05DC\u05D9\u05E6\u05D5\u05E8 \u05D0\u05D5\u05EA\u05DD \u05D9\u05D3\u05E0\u05D9\u05EA \u05D0\u05D5 \u05DC\u05D1\u05E7\u05E9 \u05DE\u05E7\u05DC\u05D5\u05D3 \u05DC\u05E9\u05DE\u05D5\u05E8 \u05EA\u05D4\u05DC\u05D9\u05DA \u05E2\u05D1\u05D5\u05D3\u05D4 \u05DB\u05E1\u05E7\u05D9\u05DC. \u05D4\u05DD \u05D9\u05DB\u05D5\u05DC\u05D9\u05DD \u05DC\u05D4\u05D9\u05D5\u05EA \u05E1\u05E4\u05E6\u05D9\u05E4\u05D9\u05D9\u05DD \u05DC\u05E4\u05E8\u05D5\u05D9\u05E7\u05D8 \u05D0\u05D5 \u05D2\u05DC\u05D5\u05D1\u05DC\u05D9\u05D9\u05DD (\u05D6\u05DE\u05D9\u05E0\u05D9\u05DD \u05D1\u05DB\u05DC \u05D4\u05E4\u05E8\u05D5\u05D9\u05E7\u05D8\u05D9\u05DD). \u05EA\u05D7\u05E9\u05D1\u05D5 \u05E2\u05DC \u05D6\u05D4 \u05DB\u05EA\u05D1\u05E0\u05D9\u05D5\u05EA \u05DC\u05D4\u05EA\u05E0\u05D4\u05D2\u05D5\u05EA \u05E9\u05DC \u05E7\u05DC\u05D5\u05D3.',
        example_en: 'You create a skill called "write-product-listing" that includes your brand voice, required fields, SEO keywords format, and character limits. Next time you say "/write-product-listing" Claude follows your exact template without any extra explanation needed.',
        links: [{label: 'Covered in Daily Claude Hack #5', url: 'https://jaygptpro.com/claude/claude-dictionary.html'}] },
      { term: 'Projects',
        en: 'Organized workspaces in claude.ai where you group related conversations, files, and instructions together. Like folders for different areas of your business.',
        he: '\u05E1\u05D1\u05D9\u05D1\u05D5\u05EA \u05E2\u05D1\u05D5\u05D3\u05D4 \u05DE\u05D0\u05D5\u05E8\u05D2\u05E0\u05D5\u05EA \u05D1\u05BEclaude.ai \u05E9\u05D1\u05D4\u05DF \u05DE\u05E7\u05D1\u05E6\u05D9\u05DD \u05E9\u05D9\u05D7\u05D5\u05EA, \u05E7\u05D1\u05E6\u05D9\u05DD \u05D5\u05D4\u05D5\u05E8\u05D0\u05D5\u05EA \u05E7\u05E9\u05D5\u05E8\u05D9\u05DD \u05D9\u05D7\u05D3. \u05DB\u05DE\u05D5 \u05EA\u05D9\u05E7\u05D9\u05D5\u05EA \u05DC\u05EA\u05D7\u05D5\u05DE\u05D9\u05DD \u05E9\u05D5\u05E0\u05D9\u05DD \u05D1\u05E2\u05E1\u05E7.',
        detail_en: 'Create a "Q2 Marketing" project. Every conversation inside it already knows your brand guidelines and campaign goals. Upload files, add custom instructions, and keep everything organized. Each project remembers its own settings separately from others. Available on Pro plan and above.',
        detail_he: '\u05E6\u05E8\u05D5 \u05E4\u05E8\u05D5\u05D9\u05E7\u05D8 "\u05E9\u05D9\u05D5\u05D5\u05E7 Q2". \u05DB\u05DC \u05E9\u05D9\u05D7\u05D4 \u05D1\u05EA\u05D5\u05DB\u05D5 \u05DB\u05D1\u05E8 \u05DE\u05DB\u05D9\u05E8\u05D4 \u05D0\u05EA \u05D4\u05E0\u05D7\u05D9\u05D5\u05EA \u05D4\u05DE\u05D5\u05EA\u05D2 \u05D5\u05D9\u05E2\u05D3\u05D9 \u05D4\u05E7\u05DE\u05E4\u05D9\u05D9\u05DF. \u05D4\u05E2\u05DC\u05D5 \u05E7\u05D1\u05E6\u05D9\u05DD, \u05D4\u05D5\u05E1\u05D9\u05E4\u05D5 \u05D4\u05D5\u05E8\u05D0\u05D5\u05EA \u05DE\u05D5\u05EA\u05D0\u05DE\u05D5\u05EA, \u05D5\u05E9\u05DE\u05E8\u05D5 \u05E2\u05DC \u05D4\u05DB\u05DC \u05DE\u05E1\u05D5\u05D3\u05E8. \u05DB\u05DC \u05E4\u05E8\u05D5\u05D9\u05E7\u05D8 \u05D6\u05D5\u05DB\u05E8 \u05D0\u05EA \u05D4\u05D4\u05D2\u05D3\u05E8\u05D5\u05EA \u05E9\u05DC\u05D5 \u05D1\u05E0\u05E4\u05E8\u05D3 \u05DE\u05D0\u05D7\u05E8\u05D9\u05DD. \u05D6\u05DE\u05D9\u05DF \u05DE\u05DE\u05E1\u05DC\u05D5\u05DC Pro \u05D5\u05DE\u05E2\u05DC\u05D4.',
        example_en: 'Create a project called "Q2 Marketing" on claude.ai. Upload your brand guidelines PDF and set custom instructions like "Always suggest A/B test variations." Every new conversation in this project already knows your brand.',
        links: [{label: 'Anthropic Projects Guide', url: 'https://support.anthropic.com/en/articles/9517075-what-are-projects'}] },
      { term: 'Dispatch',
        en: 'A Cowork feature that lets you send tasks to Claude Desktop from your phone. Pair once, then send instructions from anywhere. Claude runs them on your computer using all your files and connectors.',
        he: '\u05EA\u05DB\u05D5\u05E0\u05EA Cowork \u05E9\u05DE\u05D0\u05E4\u05E9\u05E8\u05EA \u05DC\u05E9\u05DC\u05D5\u05D7 \u05DE\u05E9\u05D9\u05DE\u05D5\u05EA \u05DC\u05BEClaude Desktop \u05DE\u05D4\u05D8\u05DC\u05E4\u05D5\u05DF. \u05DE\u05E6\u05DE\u05D9\u05D3\u05D9\u05DD \u05E4\u05E2\u05DD \u05D0\u05D7\u05EA, \u05D5\u05D0\u05D6 \u05E9\u05D5\u05DC\u05D7\u05D9\u05DD \u05D4\u05D5\u05E8\u05D0\u05D5\u05EA \u05DE\u05DB\u05DC \u05DE\u05E7\u05D5\u05DD. \u05E7\u05DC\u05D5\u05D3 \u05DE\u05E8\u05D9\u05E5 \u05D0\u05D5\u05EA\u05DF \u05E2\u05DC \u05D4\u05DE\u05D7\u05E9\u05D1 \u05E2\u05DD \u05DB\u05DC \u05D4\u05E7\u05D1\u05E6\u05D9\u05DD \u05D5\u05D4\u05D7\u05D9\u05D1\u05D5\u05E8\u05D9\u05DD \u05E9\u05DC\u05DA.',
        detail_en: 'You are at a coffee shop. Send from your phone: "Search my email for messages from the supplier this week and prepare a summary." Come back to your desk, the summary is waiting. Dispatch works through the Claude mobile app. Pair your phone to your desktop once, then send tasks from anywhere. Claude uses all your Connectors and files.',
        detail_he: '\u05D0\u05EA\u05DD \u05D1\u05D1\u05D9\u05EA \u05E7\u05E4\u05D4. \u05E9\u05DC\u05D7\u05D5 \u05DE\u05D4\u05D8\u05DC\u05E4\u05D5\u05DF: "\u05D7\u05E4\u05E9 \u05D1\u05DE\u05D9\u05D9\u05DC \u05E9\u05DC\u05D9 \u05D4\u05D5\u05D3\u05E2\u05D5\u05EA \u05DE\u05D4\u05E1\u05E4\u05E7 \u05D4\u05E9\u05D1\u05D5\u05E2 \u05D5\u05D4\u05DB\u05DF \u05E1\u05D9\u05DB\u05D5\u05DD." \u05D7\u05D5\u05D6\u05E8\u05D9\u05DD \u05DC\u05E9\u05D5\u05DC\u05D7\u05DF, \u05D4\u05E1\u05D9\u05DB\u05D5\u05DD \u05DE\u05D7\u05DB\u05D4. Dispatch \u05E2\u05D5\u05D1\u05D3 \u05D3\u05E8\u05DA \u05D0\u05E4\u05DC\u05D9\u05E7\u05E6\u05D9\u05D9\u05EA Claude \u05D4\u05E0\u05D9\u05D9\u05D3\u05D9\u05EA. \u05DE\u05E6\u05DE\u05D9\u05D3\u05D9\u05DD \u05D0\u05EA \u05D4\u05D8\u05DC\u05E4\u05D5\u05DF \u05DC\u05DE\u05D7\u05E9\u05D1 \u05E4\u05E2\u05DD \u05D0\u05D7\u05EA, \u05D5\u05E9\u05D5\u05DC\u05D7\u05D9\u05DD \u05DE\u05E9\u05D9\u05DE\u05D5\u05EA \u05DE\u05DB\u05DC \u05DE\u05E7\u05D5\u05DD. \u05E7\u05DC\u05D5\u05D3 \u05DE\u05E9\u05EA\u05DE\u05E9 \u05D1\u05DB\u05DC \u05D4\u05BEConnectors \u05D5\u05D4\u05E7\u05D1\u05E6\u05D9\u05DD \u05E9\u05DC\u05DA.',
        example_en: 'Sitting in a taxi on the way to a meeting. Open the Claude app on your phone, tap Dispatch, and send: "Search my email for the quarterly report from finance and put the key numbers in a new Notion page." By the time you arrive, it is done.',
        links: [{label: 'Covered in Daily Claude Hack #10', url: 'https://jaygptpro.com/claude/claude-dictionary.html'}] },
      { term: 'Remote Control',
        en: 'Using Claude Code from anywhere through a web browser. You connect to your computer remotely and Claude works on your projects even when you are away.',
        he: '\u05E9\u05D9\u05DE\u05D5\u05E9 \u05D1\u05BEClaude Code \u05DE\u05DB\u05DC \u05DE\u05E7\u05D5\u05DD \u05D3\u05E8\u05DA \u05D3\u05E4\u05D3\u05E4\u05DF. \u05D0\u05EA\u05D4 \u05DE\u05EA\u05D7\u05D1\u05E8 \u05DC\u05DE\u05D7\u05E9\u05D1 \u05DE\u05E8\u05D7\u05D5\u05E7 \u05D5\u05E7\u05DC\u05D5\u05D3 \u05E2\u05D5\u05D1\u05D3 \u05E2\u05DC \u05D4\u05E4\u05E8\u05D5\u05D9\u05E7\u05D8\u05D9\u05DD \u05E9\u05DC\u05DA \u05D2\u05DD \u05DB\u05E9\u05D0\u05EA\u05D4 \u05DC\u05D0 \u05E9\u05DD.',
        detail_en: 'Type /rc in Claude Code, scan a QR code with your phone, and control your terminal session from anywhere. Same session, same files, same history. Start a long build on your office computer, walk to a meeting, and monitor progress from your phone. No setup required beyond scanning the code.',
        detail_he: '\u05D4\u05E7\u05DC\u05D9\u05D3\u05D5 /rc \u05D1\u05BEClaude Code, \u05E1\u05E8\u05E7\u05D5 \u05E7\u05D5\u05D3 QR \u05E2\u05DD \u05D4\u05D8\u05DC\u05E4\u05D5\u05DF, \u05D5\u05E9\u05DC\u05D8\u05D5 \u05D1\u05E1\u05E9\u05DF \u05D4\u05D8\u05E8\u05DE\u05D9\u05E0\u05DC \u05DE\u05DB\u05DC \u05DE\u05E7\u05D5\u05DD. \u05D0\u05D5\u05EA\u05D5 \u05E1\u05E9\u05DF, \u05D0\u05D5\u05EA\u05DD \u05E7\u05D1\u05E6\u05D9\u05DD, \u05D0\u05D5\u05EA\u05D5 \u05D4\u05D9\u05E1\u05D8\u05D5\u05E8\u05D9\u05D4. \u05D4\u05EA\u05D7\u05D9\u05DC\u05D5 build \u05D0\u05E8\u05D5\u05DA \u05E2\u05DC \u05D4\u05DE\u05D7\u05E9\u05D1 \u05D1\u05DE\u05E9\u05E8\u05D3, \u05DC\u05DB\u05D5 \u05DC\u05E4\u05D2\u05D9\u05E9\u05D4, \u05D5\u05E2\u05E7\u05D1\u05D5 \u05D0\u05D7\u05E8\u05D9 \u05D4\u05D4\u05EA\u05E7\u05D3\u05DE\u05D5\u05EA \u05DE\u05D4\u05D8\u05DC\u05E4\u05D5\u05DF. \u05DC\u05D0 \u05E6\u05E8\u05D9\u05DA \u05D4\u05D2\u05D3\u05E8\u05D4 \u05DE\u05E2\u05D1\u05E8 \u05DC\u05E1\u05E8\u05D9\u05E7\u05EA \u05D4\u05E7\u05D5\u05D3.',
        example_en: 'Type /rc in Claude Code at work. A QR code appears. Scan it with your phone. Now you are walking to lunch and can see Claude finishing the build you started. Send a message: "Also run the test suite when the build finishes."',
        links: [{label: 'Covered in Daily Claude Hack #11', url: 'https://jaygptpro.com/claude/claude-dictionary.html'}] },
      { term: 'Scheduled Tasks',
        en: 'Tasks you set up to run automatically at specific times. Claude Code can check your email every morning, generate reports weekly, or any recurring task.',
        he: '\u05DE\u05E9\u05D9\u05DE\u05D5\u05EA \u05E9\u05DE\u05D2\u05D3\u05D9\u05E8\u05D9\u05DD \u05DC\u05E8\u05D5\u05E5 \u05D0\u05D5\u05D8\u05D5\u05DE\u05D8\u05D9\u05EA \u05D1\u05D6\u05DE\u05E0\u05D9\u05DD \u05DE\u05E1\u05D5\u05D9\u05DE\u05D9\u05DD. Claude Code \u05D9\u05DB\u05D5\u05DC \u05DC\u05D1\u05D3\u05D5\u05E7 \u05D0\u05EA \u05D4\u05DE\u05D9\u05D9\u05DC \u05DB\u05DC \u05D1\u05D5\u05E7\u05E8, \u05DC\u05D4\u05E4\u05D9\u05E7 \u05D3\u05D5\u05D7\u05D5\u05EA \u05E9\u05D1\u05D5\u05E2\u05D9\u05D9\u05DD, \u05D0\u05D5 \u05DB\u05DC \u05DE\u05E9\u05D9\u05DE\u05D4 \u05D7\u05D5\u05D6\u05E8\u05EA.',
        detail_en: 'Set Claude to check your email every morning at 9am, summarize the important ones, and prepare draft replies. Or generate a weekly sales report every Monday. Scheduled tasks run in the background on your computer, using cron style scheduling. You define the task once and Claude handles it repeatedly.',
        detail_he: '\u05D4\u05D2\u05D3\u05D9\u05E8\u05D5 \u05DC\u05E7\u05DC\u05D5\u05D3 \u05DC\u05D1\u05D3\u05D5\u05E7 \u05D0\u05EA \u05D4\u05DE\u05D9\u05D9\u05DC \u05DB\u05DC \u05D1\u05D5\u05E7\u05E8 \u05D19, \u05DC\u05E1\u05DB\u05DD \u05D0\u05EA \u05D4\u05D7\u05E9\u05D5\u05D1\u05D9\u05DD, \u05D5\u05DC\u05D4\u05DB\u05D9\u05DF \u05D8\u05D9\u05D5\u05D8\u05D5\u05EA \u05EA\u05E9\u05D5\u05D1\u05D4. \u05D0\u05D5 \u05DC\u05D4\u05E4\u05D9\u05E7 \u05D3\u05D5\u05D7 \u05DE\u05DB\u05D9\u05E8\u05D5\u05EA \u05E9\u05D1\u05D5\u05E2\u05D9 \u05DB\u05DC \u05D9\u05D5\u05DD \u05E9\u05E0\u05D9. \u05DE\u05E9\u05D9\u05DE\u05D5\u05EA \u05DE\u05EA\u05D5\u05D6\u05DE\u05E0\u05D5\u05EA \u05E8\u05E6\u05D5\u05EA \u05D1\u05E8\u05E7\u05E2 \u05E2\u05DC \u05D4\u05DE\u05D7\u05E9\u05D1, \u05D1\u05E1\u05D2\u05E0\u05D5\u05DF \u05EA\u05D6\u05DE\u05D5\u05DF cron. \u05DE\u05D2\u05D3\u05D9\u05E8\u05D9\u05DD \u05D0\u05EA \u05D4\u05DE\u05E9\u05D9\u05DE\u05D4 \u05E4\u05E2\u05DD \u05D0\u05D7\u05EA \u05D5\u05E7\u05DC\u05D5\u05D3 \u05DE\u05D8\u05E4\u05DC \u05D1\u05D4 \u05E9\u05D5\u05D1 \u05D5\u05E9\u05D5\u05D1.',
        example_en: 'You set up a scheduled task: Every Monday at 8am, Claude checks your GitHub repos for any new issues, summarizes them, and creates a prioritized list in your Notion workspace. You arrive at work with your task list ready.',
        links: [{label: 'Covered in Daily Claude Hack #2', url: 'https://jaygptpro.com/claude/claude-dictionary.html'}] },
      { term: 'Memory',
        en: 'Claude\'s ability to remember things about you across conversations. It stores preferences, facts, and context so you do not have to repeat yourself.',
        he: '\u05D4\u05D9\u05DB\u05D5\u05DC\u05EA \u05E9\u05DC Claude \u05DC\u05D6\u05DB\u05D5\u05E8 \u05D3\u05D1\u05E8\u05D9\u05DD \u05E2\u05DC\u05D9\u05DA \u05D1\u05D9\u05DF \u05E9\u05D9\u05D7\u05D5\u05EA. \u05D4\u05D5\u05D0 \u05E9\u05D5\u05DE\u05E8 \u05D4\u05E2\u05D3\u05E4\u05D5\u05EA, \u05E2\u05D5\u05D1\u05D3\u05D5\u05EA \u05D5\u05D4\u05E7\u05E9\u05E8 \u05DB\u05D3\u05D9 \u05E9\u05DC\u05D0 \u05EA\u05E6\u05D8\u05E8\u05DA \u05DC\u05D7\u05D6\u05D5\u05E8 \u05E2\u05DC \u05E2\u05E6\u05DE\u05DA.',
        detail_en: 'Claude saves things it learns about you: your name, preferences, projects, and decisions. In Claude Code, this is stored in memory files that persist across sessions. On claude.ai, Claude uses its built in memory feature. You can ask Claude what it remembers about you, and tell it to forget specific things if needed.',
        detail_he: '\u05E7\u05DC\u05D5\u05D3 \u05E9\u05D5\u05DE\u05E8 \u05D3\u05D1\u05E8\u05D9\u05DD \u05E9\u05D4\u05D5\u05D0 \u05DC\u05D5\u05DE\u05D3 \u05E2\u05DC\u05D9\u05DB\u05DD: \u05D4\u05E9\u05DD, \u05D4\u05E2\u05D3\u05E4\u05D5\u05EA, \u05E4\u05E8\u05D5\u05D9\u05E7\u05D8\u05D9\u05DD \u05D5\u05D4\u05D7\u05DC\u05D8\u05D5\u05EA. \u05D1\u05BEClaude Code, \u05D6\u05D4 \u05E0\u05E9\u05DE\u05E8 \u05D1\u05E7\u05D1\u05E6\u05D9 \u05D6\u05D9\u05DB\u05E8\u05D5\u05DF \u05E9\u05E0\u05E9\u05DE\u05E8\u05D9\u05DD \u05D1\u05D9\u05DF \u05E1\u05E9\u05E0\u05D9\u05DD. \u05D1\u05BEclaude.ai, \u05E7\u05DC\u05D5\u05D3 \u05DE\u05E9\u05EA\u05DE\u05E9 \u05D1\u05EA\u05DB\u05D5\u05E0\u05EA \u05D4\u05D6\u05D9\u05DB\u05E8\u05D5\u05DF \u05D4\u05DE\u05D5\u05D1\u05E0\u05D9\u05EA. \u05D0\u05E4\u05E9\u05E8 \u05DC\u05E9\u05D0\u05D5\u05DC \u05D0\u05EA \u05E7\u05DC\u05D5\u05D3 \u05DE\u05D4 \u05D4\u05D5\u05D0 \u05D6\u05D5\u05DB\u05E8 \u05E2\u05DC\u05D9\u05DB\u05DD, \u05D5\u05DC\u05D1\u05E7\u05E9 \u05DE\u05DE\u05E0\u05D5 \u05DC\u05E9\u05DB\u05D5\u05D7 \u05D3\u05D1\u05E8\u05D9\u05DD \u05DE\u05E1\u05D5\u05D9\u05DE\u05D9\u05DD \u05D0\u05DD \u05E6\u05E8\u05D9\u05DA.',
        example_en: 'You tell Claude "I prefer Hebrew for communication but English for code and variable names." Claude saves this to memory. Next week, in a new session, Claude automatically writes to you in Hebrew and codes in English.',
        links: [{label: 'Claude Code Docs: Memory', url: 'https://docs.anthropic.com/en/docs/claude-code/memory'}] },
      { term: 'Code Review',
        en: 'Multiple AI agents automatically review your GitHub pull requests for bugs, security issues, and compliance with your rules.',
        he: 'סוכני AI מרובים בודקים אוטומטית את הקוד שלכם בגיטהאב, מחפשים באגים, בעיות אבטחה ותאימות לכללים.',
        detail_en: 'Push code to GitHub. Within minutes, AI agents post comments highlighting potential security vulnerabilities, bugs, or edge cases you missed. They also check compliance with your CLAUDE.md rules. This works automatically on pull requests. Multiple agents review from different angles for thorough coverage.',
        detail_he: '\u05D3\u05D7\u05E4\u05D5 \u05E7\u05D5\u05D3 \u05DC\u05D2\u05D9\u05D8\u05D4\u05D0\u05D1. \u05EA\u05D5\u05DA \u05D3\u05E7\u05D5\u05EA, \u05E1\u05D5\u05DB\u05E0\u05D9 AI \u05DE\u05E4\u05E8\u05E1\u05DE\u05D9\u05DD \u05D4\u05E2\u05E8\u05D5\u05EA \u05E9\u05DE\u05D3\u05D2\u05D9\u05E9\u05D5\u05EA \u05E4\u05E8\u05E6\u05D5\u05EA \u05D0\u05D1\u05D8\u05D7\u05D4 \u05E4\u05D5\u05D8\u05E0\u05E6\u05D9\u05D0\u05DC\u05D9\u05D5\u05EA, \u05D1\u05D0\u05D2\u05D9\u05DD, \u05D0\u05D5 \u05DE\u05E7\u05E8\u05D9 \u05E7\u05E6\u05D4 \u05E9\u05E4\u05D9\u05E1\u05E4\u05E1\u05EA\u05DD. \u05D4\u05DD \u05D2\u05DD \u05D1\u05D5\u05D3\u05E7\u05D9\u05DD \u05EA\u05D0\u05D9\u05DE\u05D5\u05EA \u05DC\u05DB\u05DC\u05DC\u05D9 \u05D4\u05BEClaude.md \u05E9\u05DC\u05DB\u05DD. \u05D6\u05D4 \u05E2\u05D5\u05D1\u05D3 \u05D0\u05D5\u05D8\u05D5\u05DE\u05D8\u05D9\u05EA \u05E2\u05DC pull requests. \u05DE\u05E1\u05E4\u05E8 \u05E1\u05D5\u05DB\u05E0\u05D9\u05DD \u05D1\u05D5\u05D3\u05E7\u05D9\u05DD \u05DE\u05D6\u05D5\u05D5\u05D9\u05D5\u05EA \u05E9\u05D5\u05E0\u05D5\u05EA \u05DC\u05DB\u05D9\u05E1\u05D5\u05D9 \u05D9\u05E1\u05D5\u05D3\u05D9.',
        example_en: 'A developer on your team pushes code to GitHub. Within minutes, Claude automatically posts a review comment: "This function does not handle the case where the user has no email address. Consider adding a null check on line 47." No one had to ask for the review.',
        links: [{label: 'Covered in Daily Claude Hack #6', url: 'https://jaygptpro.com/claude/claude-dictionary.html'}] }
    ]
  },
  {
    id: 'plans', icon: '\u{1F4B3}', css: 'cat-plans',
    name: { en: 'Plans & Pricing', he: '\u05DE\u05E1\u05DC\u05D5\u05DC\u05D9\u05DD \u05D5\u05EA\u05DE\u05D7\u05D5\u05E8' },
    terms: [
      { term: 'Free Plan',
        en: 'Basic access to Claude with limited messages per day. Great for trying it out. Uses the Sonnet model.',
        he: '\u05D2\u05D9\u05E9\u05D4 \u05D1\u05E1\u05D9\u05E1\u05D9\u05EA \u05DC\u05E7\u05DC\u05D5\u05D3 \u05E2\u05DD \u05DE\u05E1\u05E4\u05E8 \u05DE\u05D5\u05D2\u05D1\u05DC \u05E9\u05DC \u05D4\u05D5\u05D3\u05E2\u05D5\u05EA \u05D1\u05D9\u05D5\u05DD. \u05DE\u05E2\u05D5\u05DC\u05D4 \u05DC\u05D4\u05EA\u05E0\u05E1\u05D5\u05EA. \u05DE\u05E9\u05EA\u05DE\u05E9 \u05D1\u05DE\u05D5\u05D3\u05DC Sonnet.',
        detail_en: 'About 30 to 50 messages per day depending on length. Uses Sonnet model only. Good for trying Claude out and seeing if it fits your workflow. You will hit limits quickly if you use it for real work. No access to Opus, no Projects, no extended features.',
        detail_he: '\u05D1\u05E2\u05E8\u05DA 30 \u05E2\u05D3 50 \u05D4\u05D5\u05D3\u05E2\u05D5\u05EA \u05D1\u05D9\u05D5\u05DD \u05D1\u05D4\u05EA\u05D0\u05DD \u05DC\u05D0\u05D5\u05E8\u05DA. \u05DE\u05E9\u05EA\u05DE\u05E9 \u05D1\u05DE\u05D5\u05D3\u05DC Sonnet \u05D1\u05DC\u05D1\u05D3. \u05D8\u05D5\u05D1 \u05DC\u05E0\u05E1\u05D5\u05EA \u05D0\u05EA \u05E7\u05DC\u05D5\u05D3 \u05D5\u05DC\u05E8\u05D0\u05D5\u05EA \u05D0\u05DD \u05D6\u05D4 \u05DE\u05EA\u05D0\u05D9\u05DD \u05DC\u05EA\u05D4\u05DC\u05D9\u05DA \u05D4\u05E2\u05D1\u05D5\u05D3\u05D4. \u05EA\u05D2\u05D9\u05E2\u05D5 \u05DC\u05DE\u05D2\u05D1\u05DC\u05D5\u05EA \u05DE\u05D4\u05E8 \u05D0\u05DD \u05DE\u05E9\u05EA\u05DE\u05E9\u05D9\u05DD \u05DC\u05E2\u05D1\u05D5\u05D3\u05D4 \u05D0\u05DE\u05D9\u05EA\u05D9\u05EA. \u05D0\u05D9\u05DF \u05D2\u05D9\u05E9\u05D4 \u05DC\u05BEOpus, \u05D0\u05D9\u05DF Projects, \u05D0\u05D9\u05DF \u05EA\u05DB\u05D5\u05E0\u05D5\u05EA \u05DE\u05D5\u05E8\u05D7\u05D1\u05D5\u05EA.',
        example_en: 'Sign up at claude.ai with your email. You get about 30 to 50 messages per day. Perfect for testing Claude with a few tasks before committing to a paid plan.',
        links: [{label: 'Claude Pricing', url: 'https://www.anthropic.com/pricing'}] },
      { term: 'Pro Plan ($20/month)',
        en: 'More messages, access to all models including Opus, and priority access during busy times. The most popular plan for individual users.',
        he: '\u05D9\u05D5\u05EA\u05E8 \u05D4\u05D5\u05D3\u05E2\u05D5\u05EA, \u05D2\u05D9\u05E9\u05D4 \u05DC\u05DB\u05DC \u05D4\u05DE\u05D5\u05D3\u05DC\u05D9\u05DD \u05DB\u05D5\u05DC\u05DC Opus, \u05D5\u05E2\u05D3\u05D9\u05E4\u05D5\u05EA \u05D1\u05D6\u05DE\u05E0\u05D9\u05DD \u05E2\u05DE\u05D5\u05E1\u05D9\u05DD. \u05D4\u05DE\u05E1\u05DC\u05D5\u05DC \u05D4\u05E4\u05D5\u05E4\u05D5\u05DC\u05E8\u05D9 \u05D1\u05D9\u05D5\u05EA\u05E8 \u05DC\u05DE\u05E9\u05EA\u05DE\u05E9\u05D9\u05DD \u05D9\u05D7\u05D9\u05D3\u05D9\u05DD.',
        detail_en: 'Roughly 5x the usage of Free, plus access to Opus and Sonnet. Includes Projects for organizing your work, extended thinking, and priority access when servers are busy. The sweet spot for most individual users who use Claude regularly. $20/month, cancel anytime.',
        detail_he: '\u05D1\u05E2\u05E8\u05DA \u05E4\u05D9 5 \u05DE\u05D4\u05E9\u05D9\u05DE\u05D5\u05E9 \u05E9\u05DC Free, \u05E4\u05DC\u05D5\u05E1 \u05D2\u05D9\u05E9\u05D4 \u05DC\u05BEOpus \u05D5\u05BESonnet. \u05DB\u05D5\u05DC\u05DC Projects \u05DC\u05D0\u05E8\u05D2\u05D5\u05DF \u05D4\u05E2\u05D1\u05D5\u05D3\u05D4, \u05D7\u05E9\u05D9\u05D1\u05D4 \u05DE\u05D5\u05E8\u05D7\u05D1\u05EA, \u05D5\u05E2\u05D3\u05D9\u05E4\u05D5\u05EA \u05DB\u05E9\u05D4\u05E9\u05E8\u05EA\u05D9\u05DD \u05E2\u05DE\u05D5\u05E1\u05D9\u05DD. \u05D4\u05E0\u05E7\u05D5\u05D3\u05D4 \u05D4\u05D0\u05D9\u05D3\u05D9\u05D0\u05DC\u05D9\u05EA \u05DC\u05E8\u05D5\u05D1 \u05D4\u05DE\u05E9\u05EA\u05DE\u05E9\u05D9\u05DD \u05D4\u05D9\u05D7\u05D9\u05D3\u05D9\u05DD \u05E9\u05DE\u05E9\u05EA\u05DE\u05E9\u05D9\u05DD \u05D1\u05E7\u05DC\u05D5\u05D3 \u05D1\u05D0\u05D5\u05E4\u05DF \u05E7\u05D1\u05D5\u05E2. $20 \u05DC\u05D7\u05D5\u05D3\u05E9, \u05D1\u05D9\u05D8\u05D5\u05DC \u05D1\u05DB\u05DC \u05E2\u05EA.',
        example_en: 'You use Claude daily for writing emails, creating content, and analyzing data. The free plan runs out by noon. Pro gives you roughly 5x the usage, access to the powerful Opus model, and organized Projects for your different work areas.',
        links: [{label: 'Claude Pricing', url: 'https://www.anthropic.com/pricing'}] },
      { term: 'Max Plan ($100/$200/month)',
        en: 'The highest individual tier. Massive usage limits and 1M token context window. Built for power users who use Claude all day, every day.',
        he: '\u05D4\u05DE\u05E1\u05DC\u05D5\u05DC \u05D4\u05D0\u05D9\u05E9\u05D9 \u05D4\u05D2\u05D1\u05D5\u05D4 \u05D1\u05D9\u05D5\u05EA\u05E8. \u05DE\u05DB\u05E1\u05D5\u05EA \u05E9\u05D9\u05DE\u05D5\u05E9 \u05E2\u05E0\u05E7\u05D9\u05D5\u05EA \u05D5\u05D7\u05DC\u05D5\u05DF \u05D4\u05E7\u05E9\u05E8 \u05E9\u05DC \u05DE\u05D9\u05DC\u05D9\u05D5\u05DF \u05D8\u05D5\u05E7\u05E0\u05D9\u05DD. \u05E0\u05D1\u05E0\u05D4 \u05DC\u05DE\u05E9\u05EA\u05DE\u05E9\u05D9\u05DD \u05DB\u05D1\u05D3\u05D9\u05DD \u05E9\u05DE\u05E9\u05EA\u05DE\u05E9\u05D9\u05DD \u05D1\u05E7\u05DC\u05D5\u05D3 \u05DB\u05DC \u05D4\u05D9\u05D5\u05DD.',
        detail_en: 'Two tiers: $100/month or $200/month. Connect Gmail, Drive, Calendar, and Slack with Connectors, and let Claude be your AI chief of staff. Includes Cowork, 1M token context window (5x standard), and massive usage limits. The $200 tier gives even more Opus usage. Best for people who use Claude as their primary work tool.',
        detail_he: '\u05E9\u05EA\u05D9 \u05E8\u05DE\u05D5\u05EA: $100 \u05DC\u05D7\u05D5\u05D3\u05E9 \u05D0\u05D5 $200 \u05DC\u05D7\u05D5\u05D3\u05E9. \u05D7\u05D1\u05E8\u05D5 Gmail, Drive, Calendar \u05D5\u05BESlack \u05E2\u05DD Connectors, \u05D5\u05EA\u05E0\u05D5 \u05DC\u05E7\u05DC\u05D5\u05D3 \u05DC\u05D4\u05D9\u05D5\u05EA \u05D4\u05BEchief of staff \u05D4\u05BEai \u05E9\u05DC\u05DB\u05DD. \u05DB\u05D5\u05DC\u05DC Cowork, \u05D7\u05DC\u05D5\u05DF \u05D4\u05E7\u05E9\u05E8 \u05E9\u05DC \u05DE\u05D9\u05DC\u05D9\u05D5\u05DF \u05D8\u05D5\u05E7\u05E0\u05D9\u05DD (\u05E4\u05D9 5 \u05DE\u05D4\u05E1\u05D8\u05E0\u05D3\u05E8\u05D8), \u05D5\u05DE\u05DB\u05E1\u05D5\u05EA \u05E9\u05D9\u05DE\u05D5\u05E9 \u05E2\u05E0\u05E7\u05D9\u05D5\u05EA. \u05E8\u05DE\u05EA \u05D4\u05BE$200 \u05E0\u05D5\u05EA\u05E0\u05EA \u05E2\u05D5\u05D3 \u05D9\u05D5\u05EA\u05E8 \u05E9\u05D9\u05DE\u05D5\u05E9 \u05D1\u05BEOpus. \u05D4\u05DB\u05D9 \u05D8\u05D5\u05D1 \u05DC\u05DE\u05D9 \u05E9\u05DE\u05E9\u05EA\u05DE\u05E9 \u05D1\u05E7\u05DC\u05D5\u05D3 \u05DB\u05DB\u05DC\u05D9 \u05D4\u05E2\u05D1\u05D5\u05D3\u05D4 \u05D4\u05E2\u05D9\u05E7\u05E8\u05D9.',
        example_en: 'You run your entire business through Claude. Morning: check emails and calendar with Connectors. Afternoon: build features with Claude Code. Evening: analyze sales data. Max gives you the volume and context window to do it all without hitting limits.',
        links: [{label: 'Claude Pricing', url: 'https://www.anthropic.com/pricing'}] },
      { term: 'Team Plan',
        en: 'Designed for small teams. Shared billing, admin controls, and higher limits. Everyone on the team gets Pro level access.',

let currentLang = 'en';

// ── BUILD HTML ──
function buildCategories() {
  const container = document.getElementById('categoriesContainer');
  container.innerHTML = '';
  let totalTerms = 0;

  CATEGORIES.forEach((cat, catIdx) => {
    totalTerms += cat.terms.length;
    const card = document.createElement('div');
    card.className = `category-card ${cat.css}`;
    card.dataset.catId = cat.id;

    let termsHtml = '';
    cat.terms.forEach((t, tIdx) => {
      const desc = currentLang === 'he' ? t.he : t.en;
      const detail = currentLang === 'he' ? (t.detail_he || '') : (t.detail_en || '');
      const detailEn = (t.detail_en || '').toLowerCase();
      const detailHe = t.detail_he || '';
      const learnMoreText = currentLang === 'he' ? '\u05E7\u05E8\u05D0\u05D5 \u05E2\u05D5\u05D3' : 'Learn more';
      let linksHtml = '';
      if (t.links && t.links.length > 0) {
        linksHtml = '<div class="term-links">' + t.links.map(l =>
          `<a href="${l.url}" target="_blank" rel="noopener" class="term-link">${l.label} \u2197</a>`
        ).join('') + '</div>';
      }
      const example = currentLang === 'he' ? (t.example_he || t.example_en || '') : (t.example_en || '');
      const exampleLabel = currentLang === 'he' ? '\u05D3\u05D5\u05D2\u05DE\u05D4 \u05DE\u05E2\u05E9\u05D9\u05EA' : 'Practical example';
      const exampleHtml = example ? '<div class="term-example"><span class="term-example-label">' + exampleLabel + '</span>' + example + '</div>' : '';
      const detailSection = detail ? `
            <button class="learn-more-btn" onclick="toggleDetail(this, event)"><span class="arrow">\u25B8</span> ${learnMoreText}</button>
            <div class="term-detail"><div class="term-detail-text">${detail}</div>${exampleHtml}${linksHtml}</div>` : '';
      termsHtml += `
        <li class="accordion-item" data-term="${t.term.toLowerCase()}" data-desc-en="${t.en.toLowerCase()}" data-desc-he="${t.he}" data-detail-en="${detailEn}" data-detail-he="${detailHe}" data-example-en="${(t.example_en || String()).toLowerCase()}">
          <button class="accordion-trigger" onclick="toggleAccordion(this)">
            <span class="accordion-trigger-left">
              <span class="term-badge">${t.term}</span>
            </span>
            <span class="accordion-icon">&#9654;</span>
          </button>
          <div class="accordion-body">
            <div class="accordion-body-inner">${desc}${detailSection}</div>
          </div>
        </li>`;
    });

    const catName = currentLang === 'he' ? cat.name.he : cat.name.en;
    const termsWord = currentLang === 'he' ? '\u05DE\u05D5\u05E9\u05D2\u05D9\u05DD' : 'terms';

    card.innerHTML = `
      <div class="category-color-bar"></div>
      <div class="category-header">
        <span class="category-icon">${cat.icon}</span>
        <div class="category-info">
          <h2>${catName}</h2>
          <span class="category-count">${cat.terms.length} ${termsWord}</span>
        </div>
      </div>
      <ul class="accordion-list">${termsHtml}</ul>`;

    container.appendChild(card);

    // Stagger animation
    setTimeout(() => card.classList.add('visible'), 80 * catIdx);
  });

  // Update stats
  const termsLabel = currentLang === 'he' ? '\u05DE\u05D5\u05E9\u05D2\u05D9\u05DD' : 'terms';
  const catsLabel = currentLang === 'he' ? '\u05E7\u05D8\u05D2\u05D5\u05E8\u05D9\u05D5\u05EA' : 'categories';
  document.getElementById('totalTerms').innerHTML = `<strong>${totalTerms}</strong> ${termsLabel}`;
  document.getElementById('totalCats').innerHTML = `<strong>${CATEGORIES.length}</strong> ${catsLabel}`;
}

// ── ACCORDION ──
function toggleAccordion(btn) {
  const item = btn.closest('.accordion-item');
  const wasOpen = item.classList.contains('open');
  // Close siblings and their details
  item.closest('.accordion-list').querySelectorAll('.accordion-item.open').forEach(el => {
    el.classList.remove('open');
    const detail = el.querySelector('.term-detail');
    if (detail) detail.classList.remove('open');
    const lmBtn = el.querySelector('.learn-more-btn');
    if (lmBtn) lmBtn.classList.remove('open');
  });
  if (!wasOpen) item.classList.add('open');
}

// ── LEARN MORE TOGGLE ──
function toggleDetail(btn, e) {
  e.stopPropagation();
  const detail = btn.nextElementSibling;
  const isOpen = detail.classList.contains('open');
  detail.classList.toggle('open');
  btn.classList.toggle('open');
}

// ── SEARCH ──
const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');
const searchCount = document.getElementById('searchCount');

searchInput.addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  searchClear.style.display = q ? 'flex' : 'none';

  if (!q) {
    document.querySelectorAll('.category-card').forEach(c => c.classList.remove('hidden-by-search'));
    document.querySelectorAll('.accordion-item').forEach(i => {
      i.classList.remove('hidden-by-search');
      // Remove highlights
      const body = i.querySelector('.accordion-body-inner');
      const badge = i.querySelector('.term-badge');
      badge.innerHTML = badge.textContent;
      body.innerHTML = body.textContent;
    });
    searchCount.style.display = 'none';
    return;
  }

  let matchCount = 0;
  document.querySelectorAll('.category-card').forEach(card => {
    let catMatches = 0;
    card.querySelectorAll('.accordion-item').forEach(item => {
      const termText = item.dataset.term;
      const descText = currentLang === 'he' ? item.dataset.descHe : item.dataset.descEn;
      const detailText = (currentLang === 'he' ? (item.dataset.detailHe || '') : (item.dataset.detailEn || '')) + ' ' + (item.dataset.exampleEn || '');
      const match = termText.includes(q) || descText.includes(q) || detailText.includes(q);
      item.classList.toggle('hidden-by-search', !match);
      if (match) {
        catMatches++;
        matchCount++;
      }
    });
    card.classList.toggle('hidden-by-search', catMatches === 0);
  });

  const foundLabel = currentLang === 'he' ? '\u05EA\u05D5\u05E6\u05D0\u05D5\u05EA \u05E0\u05DE\u05E6\u05D0\u05D5' : 'results found';
  searchCount.innerHTML = `<strong>${matchCount}</strong> ${foundLabel}`;
  searchCount.style.display = 'block';
});

function clearSearch() {
  searchInput.value = '';
  searchInput.dispatchEvent(new Event('input'));
  searchInput.focus();
}

// ── LANGUAGE ──
function setLang(lang) {
  currentLang = lang;
  document.documentElement.lang = lang === 'he' ? 'he' : 'en';
  document.documentElement.dir = lang === 'he' ? 'rtl' : 'ltr';

  // Toggle buttons
  document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelectorAll('.lang-btn')[lang === 'he' ? 1 : 0].classList.add('active');

  // Update translatable elements
  document.querySelectorAll('[data-' + lang + ']').forEach(el => {
    const val = el.getAttribute('data-' + lang);
    if (val) el.innerHTML = val;
  });

  // Update placeholder
  const ph = searchInput.getAttribute('data-placeholder-' + lang);
  if (ph) searchInput.placeholder = ph;

  // Rebuild categories
  buildCategories();

  // Re-run search if active
  if (searchInput.value.trim()) {
    searchInput.dispatchEvent(new Event('input'));
  }
}

// ── SCROLL TO TOP ──
const scrollTopBtn = document.getElementById('scrollTop');
window.addEventListener('scroll', () => {
  scrollTopBtn.classList.toggle('visible', window.scrollY > 400);
});

// ── INIT ──
buildCategories();
</script>
