<script>
// ── DATA ──
const CATEGORIES = [
  {
    id: 'core', icon: '\u{1F9E0}', css: 'cat-core',
    name: { en: 'Core Concepts', he: '\u05DE\u05D5\u05E9\u05D2\u05D9 \u05D9\u05E1\u05D5\u05D3' },
    terms: [
      { term: 'LLM (Large Language Model)',
        en: 'The type of AI that powers Claude. A massive system trained on text that can understand and generate human language.',
        he: '\u05E1\u05D5\u05D2 \u05D4\u05D1\u05D9\u05E0\u05D4 \u05D4\u05DE\u05DC\u05D0\u05DB\u05D5\u05EA\u05D9\u05EA \u05E9\u05DE\u05E4\u05E2\u05D9\u05DC \u05D0\u05EA Claude. \u05DE\u05E2\u05E8\u05DB\u05EA \u05E2\u05E0\u05E7\u05D9\u05EA \u05E9\u05D0\u05D5\u05DE\u05E0\u05D4 \u05E2\u05DC \u05D8\u05E7\u05E1\u05D8 \u05D5\u05D9\u05D5\u05D3\u05E2\u05EA \u05DC\u05D4\u05D1\u05D9\u05DF \u05D5\u05DC\u05D9\u05D9\u05E6\u05E8 \u05E9\u05E4\u05D4 \u05D0\u05E0\u05D5\u05E9\u05D9\u05EA.',
        detail_en: 'LLM stands for Large Language Model. These are AI systems trained on massive amounts of text from the internet, books, and other sources. Claude, ChatGPT, and Gemini are all LLMs. They predict the most likely next word based on patterns they learned during training, which is why they can write, analyze, and reason.',
        detail_he: 'LLM \u05D6\u05D4 \u05E8\u05D0\u05E9\u05D9 \u05EA\u05D9\u05D1\u05D5\u05EA \u05E9\u05DC Large Language Model (\u05DE\u05D5\u05D3\u05DC \u05E9\u05E4\u05D4 \u05D2\u05D3\u05D5\u05DC). \u05D0\u05DC\u05D4 \u05DE\u05E2\u05E8\u05DB\u05D5\u05EA AI \u05E9\u05D0\u05D5\u05DE\u05E0\u05D5 \u05E2\u05DC \u05DB\u05DE\u05D5\u05D9\u05D5\u05EA \u05E2\u05E6\u05D5\u05DE\u05D5\u05EA \u05E9\u05DC \u05D8\u05E7\u05E1\u05D8 \u05DE\u05D4\u05D0\u05D9\u05E0\u05D8\u05E8\u05E0\u05D8, \u05E1\u05E4\u05E8\u05D9\u05DD \u05D5\u05DE\u05E7\u05D5\u05E8\u05D5\u05EA \u05D0\u05D7\u05E8\u05D9\u05DD. Claude, ChatGPT \u05D5\u05BEGemini \u05D4\u05DD \u05DB\u05D5\u05DC\u05DD LLMs. \u05D4\u05DD \u05D7\u05D5\u05D6\u05D9\u05DD \u05D0\u05EA \u05D4\u05DE\u05D9\u05DC\u05D4 \u05D4\u05D1\u05D0\u05D4 \u05D4\u05E1\u05D1\u05D9\u05E8\u05D4 \u05D1\u05D9\u05D5\u05EA\u05E8 \u05DC\u05E4\u05D9 \u05D3\u05E4\u05D5\u05E1\u05D9\u05DD \u05E9\u05DC\u05DE\u05D3\u05D5 \u05D1\u05D0\u05D9\u05DE\u05D5\u05DF, \u05D5\u05DC\u05DB\u05DF \u05D4\u05DD \u05D9\u05DB\u05D5\u05DC\u05D9\u05DD \u05DC\u05DB\u05EA\u05D5\u05D1, \u05DC\u05E0\u05EA\u05D7 \u05D5\u05DC\u05E0\u05DE\u05E7.',
        example_en: 'When someone says "I asked ChatGPT" or "I used Claude," they are using an LLM. It is the technology behind all modern AI chatbots and writing assistants.',
        links: [{label: 'Anthropic Research', url: 'https://www.anthropic.com/research'}] },
      { term: 'Prompt',
        en: 'The text you type to ask Claude something. Think of it as the instruction or question you give the AI.',
        he: '\u05D4\u05D8\u05E7\u05E1\u05D8 \u05E9\u05D0\u05EA\u05D4 \u05DB\u05D5\u05EA\u05D1 \u05DB\u05D3\u05D9 \u05DC\u05E9\u05D0\u05D5\u05DC \u05D0\u05EA Claude \u05DE\u05E9\u05D4\u05D5. \u05EA\u05D7\u05E9\u05D1\u05D5 \u05E2\u05DC \u05D6\u05D4 \u05DB\u05D4\u05D5\u05E8\u05D0\u05D4 \u05D0\u05D5 \u05E9\u05D0\u05DC\u05D4 \u05E9\u05D0\u05EA\u05D4 \u05E0\u05D5\u05EA\u05E0\u05D9\u05DD \u05DC\u05D1\u05D9\u05E0\u05D4 \u05DE\u05DC\u05D0\u05DB\u05D5\u05EA\u05D9\u05EA.',
        detail_en: 'The quality of your prompt determines the quality of Claude\'s response. A vague prompt gets a vague answer. A specific prompt with context, examples, and clear instructions gets exactly what you need. Think of it like giving directions: \'go somewhere nice\' vs \'take me to the Italian restaurant on 5th street.\'',
        detail_he: '\u05D0\u05D9\u05DB\u05D5\u05EA \u05D4\u05E4\u05E8\u05D5\u05DE\u05E4\u05D8 \u05E7\u05D5\u05D1\u05E2\u05EA \u05D0\u05EA \u05D0\u05D9\u05DB\u05D5\u05EA \u05D4\u05EA\u05E9\u05D5\u05D1\u05D4 \u05E9\u05DC \u05E7\u05DC\u05D5\u05D3. \u05E4\u05E8\u05D5\u05DE\u05E4\u05D8 \u05DE\u05E2\u05D5\u05E8\u05E4\u05DC \u05DE\u05E7\u05D1\u05DC \u05EA\u05E9\u05D5\u05D1\u05D4 \u05DE\u05E2\u05D5\u05E8\u05E4\u05DC\u05EA. \u05E4\u05E8\u05D5\u05DE\u05E4\u05D8 \u05E1\u05E4\u05E6\u05D9\u05E4\u05D9 \u05E2\u05DD \u05D4\u05E7\u05E9\u05E8, \u05D3\u05D5\u05D2\u05DE\u05D0\u05D5\u05EA \u05D5\u05D4\u05D5\u05E8\u05D0\u05D5\u05EA \u05D1\u05E8\u05D5\u05E8\u05D5\u05EA \u05DE\u05E7\u05D1\u05DC \u05D1\u05D3\u05D9\u05D5\u05E7 \u05DE\u05D4 \u05E9\u05E6\u05E8\u05D9\u05DA. \u05EA\u05D7\u05E9\u05D1\u05D5 \u05E2\u05DC \u05D6\u05D4 \u05DB\u05DE\u05D5 \u05D4\u05D5\u05E8\u05D0\u05D5\u05EA \u05E0\u05E1\u05D9\u05E2\u05D4: \'\u05EA\u05D9\u05E7\u05D7 \u05D0\u05D5\u05EA\u05D9 \u05DC\u05DE\u05E7\u05D5\u05DD \u05E0\u05D7\u05DE\u05D3\' \u05DC\u05E2\u05D5\u05DE\u05EA \'\u05EA\u05D9\u05E7\u05D7 \u05D0\u05D5\u05EA\u05D9 \u05DC\u05DE\u05E1\u05E2\u05D3\u05D4 \u05D4\u05D0\u05D9\u05D8\u05DC\u05E7\u05D9\u05EA \u05D1\u05E8\u05D7\u05D5\u05D1 \u05D4\u05D7\u05DE\u05D9\u05E9\u05D9.\'',
        example_en: 'Instead of: "Write something about marketing." Try: "Write a 200 word LinkedIn post about why small eCommerce brands should use AI for product descriptions. Tone: professional but approachable."',
        links: [{label: 'Anthropic Prompt Engineering Guide', url: 'https://docs.anthropic.com/en/docs/build-with-claude/prompt-engineering/overview'}] },
      { term: 'System Prompt',
        en: 'Hidden instructions that shape how Claude behaves before you even start talking. Like giving an employee a job description before their first day.',
        he: '\u05D4\u05D5\u05E8\u05D0\u05D5\u05EA \u05DE\u05D5\u05E1\u05EA\u05E8\u05D5\u05EA \u05E9\u05DE\u05E2\u05E6\u05D1\u05D5\u05EA \u05D0\u05EA \u05D4\u05D4\u05EA\u05E0\u05D4\u05D2\u05D5\u05EA \u05E9\u05DC Claude \u05DC\u05E4\u05E0\u05D9 \u05E9\u05D0\u05EA\u05D4 \u05DE\u05EA\u05D7\u05D9\u05DC \u05DC\u05D3\u05D1\u05E8. \u05DB\u05DE\u05D5 \u05DC\u05EA\u05EA \u05DC\u05E2\u05D5\u05D1\u05D3 \u05EA\u05D9\u05D0\u05D5\u05E8 \u05EA\u05E4\u05E7\u05D9\u05D3 \u05DC\u05E4\u05E0\u05D9 \u05D4\u05D9\u05D5\u05DD \u05D4\u05E8\u05D0\u05E9\u05D5\u05DF.',
        detail_en: 'System prompts are set by developers building apps with Claude. Regular users on claude.ai don\'t write system prompts directly, but custom instructions and CLAUDE.md files work in a similar way. They tell Claude things like your preferred language, tone, or role before the conversation begins.',
        detail_he: '\u05E4\u05E8\u05D5\u05DE\u05E4\u05D8\u05D9\u05DD \u05E9\u05DC \u05DE\u05E2\u05E8\u05DB\u05EA \u05DE\u05D5\u05D2\u05D3\u05E8\u05D9\u05DD \u05E2\u05DC \u05D9\u05D3\u05D9 \u05DE\u05E4\u05EA\u05D7\u05D9\u05DD \u05E9\u05D1\u05D5\u05E0\u05D9\u05DD \u05D0\u05E4\u05DC\u05D9\u05E7\u05E6\u05D9\u05D5\u05EA \u05E2\u05DD \u05E7\u05DC\u05D5\u05D3. \u05DE\u05E9\u05EA\u05DE\u05E9\u05D9\u05DD \u05E8\u05D2\u05D9\u05DC\u05D9\u05DD \u05D1\u05BEclaude.ai \u05DC\u05D0 \u05DB\u05D5\u05EA\u05D1\u05D9\u05DD \u05E4\u05E8\u05D5\u05DE\u05E4\u05D8\u05D9\u05DD \u05E9\u05DC \u05DE\u05E2\u05E8\u05DB\u05EA \u05D9\u05E9\u05D9\u05E8\u05D5\u05EA, \u05D0\u05D1\u05DC \u05D4\u05D5\u05E8\u05D0\u05D5\u05EA \u05DE\u05D5\u05EA\u05D0\u05DE\u05D5\u05EA \u05D0\u05D9\u05E9\u05D9\u05EA \u05D5\u05E7\u05D1\u05E6\u05D9 CLAUDE.md \u05E2\u05D5\u05D1\u05D3\u05D9\u05DD \u05D1\u05E6\u05D5\u05E8\u05D4 \u05D3\u05D5\u05DE\u05D4. \u05D4\u05DD \u05D0\u05D5\u05DE\u05E8\u05D9\u05DD \u05DC\u05E7\u05DC\u05D5\u05D3 \u05D3\u05D1\u05E8\u05D9\u05DD \u05DB\u05DE\u05D5 \u05D4\u05E9\u05E4\u05D4 \u05D4\u05DE\u05D5\u05E2\u05D3\u05E4\u05EA, \u05D4\u05D8\u05D5\u05DF \u05D0\u05D5 \u05D4\u05EA\u05E4\u05E7\u05D9\u05D3 \u05DC\u05E4\u05E0\u05D9 \u05E9\u05D4\u05E9\u05D9\u05D7\u05D4 \u05DE\u05EA\u05D7\u05D9\u05DC\u05D4.',
        example_en: 'A customer service chatbot might have a system prompt like: "You are a helpful support agent for an online shoe store. Always be polite, suggest alternatives when items are out of stock, and never discuss competitor products."',
        links: [{label: 'Anthropic Docs: System Prompts', url: 'https://docs.anthropic.com/en/docs/build-with-claude/prompt-engineering/system-prompts'}] },
      { term: 'Tokens',
        en: 'The way AI measures text. Roughly 1 token = 3/4 of a word. This is how usage and pricing are calculated.',
        he: '\u05D4\u05D3\u05E8\u05DA \u05E9\u05D1\u05D4 \u05D4\u05D1\u05D9\u05E0\u05D4 \u05D4\u05DE\u05DC\u05D0\u05DB\u05D5\u05EA\u05D9\u05EA \u05DE\u05D5\u05D3\u05D3\u05EA \u05D8\u05E7\u05E1\u05D8. \u05D1\u05E2\u05E8\u05DA \u05D8\u05D5\u05E7\u05DF \u05D0\u05D7\u05D3 \u05E9\u05D5\u05D5\u05D4 \u05DC\u05E8\u05D1\u05E2 \u05DE\u05D9\u05DC\u05D4. \u05DB\u05DA \u05DE\u05D7\u05E9\u05D1\u05D9\u05DD \u05E9\u05D9\u05DE\u05D5\u05E9 \u05D5\u05EA\u05DE\u05D7\u05D5\u05E8.',
        detail_en: 'Everything Claude reads and writes is measured in tokens. A short email might be 200 tokens. A full conversation can use thousands. Your plan\'s usage limit is based on tokens. When people say Claude\'s context window is \'200K tokens,\' that means it can handle roughly 150,000 words in a single conversation.',
        detail_he: '\u05DB\u05DC \u05DE\u05D4 \u05E9\u05E7\u05DC\u05D5\u05D3 \u05E7\u05D5\u05E8\u05D0 \u05D5\u05DB\u05D5\u05EA\u05D1 \u05E0\u05DE\u05D3\u05D3 \u05D1\u05D8\u05D5\u05E7\u05E0\u05D9\u05DD. \u05DE\u05D9\u05D9\u05DC \u05E7\u05E6\u05E8 \u05D6\u05D4 \u05D1\u05E2\u05E8\u05DA 200 \u05D8\u05D5\u05E7\u05E0\u05D9\u05DD. \u05E9\u05D9\u05D7\u05D4 \u05DE\u05DC\u05D0\u05D4 \u05D9\u05DB\u05D5\u05DC\u05D4 \u05DC\u05D4\u05E9\u05EA\u05DE\u05E9 \u05D1\u05D0\u05DC\u05E4\u05D9\u05DD. \u05DE\u05D2\u05D1\u05DC\u05EA \u05D4\u05E9\u05D9\u05DE\u05D5\u05E9 \u05E9\u05DC \u05D4\u05EA\u05D5\u05DB\u05E0\u05D9\u05EA \u05E9\u05DC\u05DA \u05DE\u05D1\u05D5\u05E1\u05E1\u05EA \u05E2\u05DC \u05D8\u05D5\u05E7\u05E0\u05D9\u05DD. \u05DB\u05E9\u05D0\u05D5\u05DE\u05E8\u05D9\u05DD \u05E9\u05D7\u05DC\u05D5\u05DF \u05D4\u05D4\u05E7\u05E9\u05E8 \u05E9\u05DC \u05E7\u05DC\u05D5\u05D3 \u05D4\u05D5\u05D0 \'200K \u05D8\u05D5\u05E7\u05E0\u05D9\u05DD,\' \u05D4\u05DB\u05D5\u05D5\u05E0\u05D4 \u05E9\u05D4\u05D5\u05D0 \u05D9\u05DB\u05D5\u05DC \u05DC\u05D8\u05E4\u05DC \u05D1\u05DB\u05BE150,000 \u05DE\u05D9\u05DC\u05D9\u05DD \u05D1\u05E9\u05D9\u05D7\u05D4 \u05D0\u05D7\u05EA.',
        example_en: 'The sentence "Hello, how are you today?" is about 7 tokens. A full page of text is roughly 500 tokens. When you hit your usage limit, it means you have used all the tokens included in your plan.',
        links: [{label: 'Anthropic Docs: Tokens', url: 'https://docs.anthropic.com/en/docs/build-with-claude/prompt-engineering/use-prompts-and-variables#token-count'}] },
      { term: 'Context Window',
        en: 'How much text Claude can "see" at once during a conversation. A bigger window means it can handle longer documents and remember more.',
        he: '\u05DB\u05DE\u05D4 \u05D8\u05E7\u05E1\u05D8 Claude \u05D9\u05DB\u05D5\u05DC "\u05DC\u05E8\u05D0\u05D5\u05EA" \u05D1\u05D5 \u05D6\u05DE\u05E0\u05D9\u05EA \u05D1\u05DE\u05D4\u05DC\u05DA \u05E9\u05D9\u05D7\u05D4. \u05D7\u05DC\u05D5\u05DF \u05D2\u05D3\u05D5\u05DC \u05D9\u05D5\u05EA\u05E8 \u05D0\u05D5\u05DE\u05E8 \u05E9\u05D4\u05D5\u05D0 \u05D9\u05DB\u05D5\u05DC \u05DC\u05D8\u05E4\u05DC \u05D1\u05DE\u05E1\u05DE\u05DB\u05D9\u05DD \u05D0\u05E8\u05D5\u05DB\u05D9\u05DD \u05D9\u05D5\u05EA\u05E8 \u05D5\u05DC\u05D6\u05DB\u05D5\u05E8 \u05D9\u05D5\u05EA\u05E8.',
        detail_en: 'Think of the context window as Claude\'s desk. The bigger the desk, the more papers you can spread out. When it fills up, Claude starts forgetting the middle of the conversation (it remembers the start and end best). That\'s why the /compact command exists: it clears the desk while keeping the important notes. Claude\'s standard window is 200K tokens. Max plan users get 1M tokens.',
        detail_he: '\u05EA\u05D7\u05E9\u05D1\u05D5 \u05E2\u05DC \u05D7\u05DC\u05D5\u05DF \u05D4\u05D4\u05E7\u05E9\u05E8 \u05DB\u05E9\u05D5\u05DC\u05D7\u05DF \u05D4\u05E2\u05D1\u05D5\u05D3\u05D4 \u05E9\u05DC \u05E7\u05DC\u05D5\u05D3. \u05DB\u05DB\u05DC \u05E9\u05D4\u05E9\u05D5\u05DC\u05D7\u05DF \u05D2\u05D3\u05D5\u05DC \u05D9\u05D5\u05EA\u05E8, \u05D9\u05D5\u05EA\u05E8 \u05D3\u05E4\u05D9\u05DD \u05D0\u05E4\u05E9\u05E8 \u05DC\u05E4\u05E8\u05D5\u05E1. \u05DB\u05E9\u05D4\u05D5\u05D0 \u05DE\u05EA\u05DE\u05DC\u05D0, \u05E7\u05DC\u05D5\u05D3 \u05DE\u05EA\u05D7\u05D9\u05DC \u05DC\u05E9\u05DB\u05D5\u05D7 \u05D0\u05EA \u05D0\u05DE\u05E6\u05E2 \u05D4\u05E9\u05D9\u05D7\u05D4 (\u05D4\u05D5\u05D0 \u05D6\u05D5\u05DB\u05E8 \u05D0\u05EA \u05D4\u05D4\u05EA\u05D7\u05DC\u05D4 \u05D5\u05D4\u05E1\u05D5\u05E3 \u05D4\u05DB\u05D9 \u05D8\u05D5\u05D1). \u05D1\u05E9\u05D1\u05D9\u05DC \u05D6\u05D4 \u05D9\u05E9 \u05D0\u05EA \u05D4\u05E4\u05E7\u05D5\u05D3\u05D4 /compact: \u05DE\u05E0\u05E7\u05D4 \u05D0\u05EA \u05D4\u05E9\u05D5\u05DC\u05D7\u05DF \u05D0\u05D1\u05DC \u05E9\u05D5\u05DE\u05E8\u05EA \u05D0\u05EA \u05D4\u05E8\u05E9\u05D9\u05DE\u05D5\u05EA \u05D4\u05D7\u05E9\u05D5\u05D1\u05D5\u05EA. \u05D4\u05D7\u05DC\u05D5\u05DF \u05D4\u05E1\u05D8\u05E0\u05D3\u05E8\u05D8\u05D9 \u05E9\u05DC \u05E7\u05DC\u05D5\u05D3 \u05D4\u05D5\u05D0 200K \u05D8\u05D5\u05E7\u05E0\u05D9\u05DD. \u05DE\u05E9\u05EA\u05DE\u05E9\u05D9 Max \u05DE\u05E7\u05D1\u05DC\u05D9\u05DD \u05DE\u05D9\u05DC\u05D9\u05D5\u05DF.',
        example_en: 'You paste a 50 page contract and ask Claude to review it. If the context window is large enough, Claude can read the whole thing at once. If not, you need to break it into sections. On Max plan with 1M tokens, that is roughly 750,000 words in one conversation.',
        links: [{label: 'Covered in Daily Claude Hack #7', url: 'https://jaygptpro.com/claude/claude-dictionary.html'}] },
      { term: 'Temperature',
        en: 'Controls how creative or predictable Claude\'s answers are. Low temperature = more consistent. High temperature = more creative and varied.',
        he: '\u05E9\u05D5\u05DC\u05D8 \u05DB\u05DE\u05D4 \u05D9\u05E6\u05D9\u05E8\u05EA\u05D9\u05D5\u05EA \u05D0\u05D5 \u05E6\u05E4\u05D5\u05D9\u05D5\u05EA \u05D4\u05EA\u05E9\u05D5\u05D1\u05D5\u05EA \u05E9\u05DC Claude. \u05D8\u05DE\u05E4\u05E8\u05D8\u05D5\u05E8\u05D4 \u05E0\u05DE\u05D5\u05DB\u05D4 = \u05E2\u05E7\u05D1\u05D9\u05D5\u05EA \u05D9\u05D5\u05EA\u05E8. \u05D8\u05DE\u05E4\u05E8\u05D8\u05D5\u05E8\u05D4 \u05D2\u05D1\u05D5\u05D4\u05D4 = \u05D9\u05E6\u05D9\u05E8\u05EA\u05D9\u05D5\u05EA \u05D5\u05DE\u05D2\u05D5\u05D5\u05DF \u05E8\u05D7\u05D1 \u05D9\u05D5\u05EA\u05E8.',
        detail_en: 'Most users never need to change this setting. It is mainly used by developers working with the API. On claude.ai, Claude automatically chooses the right level of creativity for each task. Low temperature (close to 0) gives consistent, predictable answers. High temperature (close to 1) gives more varied, creative responses.',
        detail_he: '\u05E8\u05D5\u05D1 \u05D4\u05DE\u05E9\u05EA\u05DE\u05E9\u05D9\u05DD \u05DC\u05E2\u05D5\u05DC\u05DD \u05DC\u05D0 \u05E6\u05E8\u05D9\u05DB\u05D9\u05DD \u05DC\u05E9\u05E0\u05D5\u05EA \u05D0\u05EA \u05D4\u05D4\u05D2\u05D3\u05E8\u05D4 \u05D4\u05D6\u05D5. \u05D4\u05D9\u05D0 \u05DE\u05E9\u05DE\u05E9\u05EA \u05D1\u05E2\u05D9\u05E7\u05E8 \u05DE\u05E4\u05EA\u05D7\u05D9\u05DD \u05E9\u05E2\u05D5\u05D1\u05D3\u05D9\u05DD \u05E2\u05DD \u05D4\u05BEAPI. \u05D1\u05BEclaude.ai, \u05E7\u05DC\u05D5\u05D3 \u05D1\u05D5\u05D7\u05E8 \u05D0\u05D5\u05D8\u05D5\u05DE\u05D8\u05D9\u05EA \u05D0\u05EA \u05E8\u05DE\u05EA \u05D4\u05D9\u05E6\u05D9\u05E8\u05EA\u05D9\u05D5\u05EA \u05D4\u05E0\u05DB\u05D5\u05E0\u05D4 \u05DC\u05DB\u05DC \u05DE\u05E9\u05D9\u05DE\u05D4. \u05D8\u05DE\u05E4\u05E8\u05D8\u05D5\u05E8\u05D4 \u05E0\u05DE\u05D5\u05DB\u05D4 (\u05E7\u05E8\u05D5\u05D1 \u05DC\u05BE0) \u05E0\u05D5\u05EA\u05E0\u05EA \u05EA\u05E9\u05D5\u05D1\u05D5\u05EA \u05E2\u05E7\u05D1\u05D9\u05D5\u05EA \u05D5\u05E6\u05E4\u05D5\u05D9\u05D5\u05EA. \u05D8\u05DE\u05E4\u05E8\u05D8\u05D5\u05E8\u05D4 \u05D2\u05D1\u05D5\u05D4\u05D4 (\u05E7\u05E8\u05D5\u05D1 \u05DC\u05BE1) \u05E0\u05D5\u05EA\u05E0\u05EA \u05EA\u05E9\u05D5\u05D1\u05D5\u05EA \u05DE\u05D2\u05D5\u05D5\u05E0\u05D5\u05EA \u05D5\u05D9\u05E6\u05D9\u05E8\u05EA\u05D9\u05D5\u05EA \u05D9\u05D5\u05EA\u05E8.',
        example_en: 'For writing product descriptions, you want low temperature so every listing follows the same professional tone. For brainstorming campaign ideas, higher temperature gives you wilder and more creative suggestions.',
        links: [] },
      { term: 'Hallucination',
        en: 'When the AI confidently says something that is incorrect or made up. It sounds real but it is not based on facts.',
        he: '\u05DB\u05E9\u05D4\u05D1\u05D9\u05E0\u05D4 \u05D4\u05DE\u05DC\u05D0\u05DB\u05D5\u05EA\u05D9\u05EA \u05D0\u05D5\u05DE\u05E8\u05EA \u05DE\u05E9\u05D4\u05D5 \u05D1\u05D1\u05D9\u05D8\u05D7\u05D5\u05DF \u05D0\u05D1\u05DC \u05D4\u05D5\u05D0 \u05DC\u05D0 \u05E0\u05DB\u05D5\u05DF \u05D0\u05D5 \u05D1\u05D3\u05D5\u05D9. \u05D6\u05D4 \u05E0\u05E9\u05DE\u05E2 \u05D0\u05DE\u05D9\u05EA\u05D9 \u05D0\u05D1\u05DC \u05DC\u05D0 \u05DE\u05D1\u05D5\u05E1\u05E1 \u05E2\u05DC \u05E2\u05D5\u05D1\u05D3\u05D5\u05EA.',
        detail_en: 'This is one of the biggest challenges with AI today. Claude might state a fake statistic, cite a paper that does not exist, or confidently explain something incorrectly. Always verify important facts, especially numbers, dates, and quotes. Claude is getting better at this with each version, and it will often tell you when it is not sure.',
        example_en: 'You ask Claude for a list of studies about eCommerce conversion rates. It gives you three citations that sound real but one of them is a paper that does not exist. Always double check specific citations, statistics, and links.',
        detail_he: '\u05D6\u05D4 \u05D0\u05D7\u05D3 \u05D4\u05D0\u05EA\u05D2\u05E8\u05D9\u05DD \u05D4\u05D2\u05D3\u05D5\u05DC\u05D9\u05DD \u05D1\u05D9\u05D5\u05EA\u05E8 \u05E2\u05DD AI \u05D4\u05D9\u05D5\u05DD. \u05E7\u05DC\u05D5\u05D3 \u05E2\u05DC\u05D5\u05DC \u05DC\u05E6\u05D9\u05D9\u05DF \u05E1\u05D8\u05D8\u05D9\u05E1\u05D8\u05D9\u05E7\u05D4 \u05DE\u05D6\u05D5\u05D9\u05E4\u05EA, \u05DC\u05D4\u05E4\u05E0\u05D5\u05EA \u05DC\u05DE\u05D0\u05DE\u05E8 \u05E9\u05DC\u05D0 \u05E7\u05D9\u05D9\u05DD, \u05D0\u05D5 \u05DC\u05D4\u05E1\u05D1\u05D9\u05E8 \u05D1\u05D1\u05D9\u05D8\u05D7\u05D5\u05DF \u05DE\u05E9\u05D4\u05D5 \u05E9\u05D2\u05D5\u05D9. \u05EA\u05DE\u05D9\u05D3 \u05EA\u05D0\u05DE\u05EA\u05D5 \u05E2\u05D5\u05D1\u05D3\u05D5\u05EA \u05D7\u05E9\u05D5\u05D1\u05D5\u05EA, \u05D1\u05DE\u05D9\u05D5\u05D7\u05D3 \u05DE\u05E1\u05E4\u05E8\u05D9\u05DD, \u05EA\u05D0\u05E8\u05D9\u05DB\u05D9\u05DD \u05D5\u05E6\u05D9\u05D8\u05D5\u05D8\u05D9\u05DD. \u05E7\u05DC\u05D5\u05D3 \u05DE\u05E9\u05EA\u05E4\u05E8 \u05D1\u05D6\u05D4 \u05E2\u05DD \u05DB\u05DC \u05D2\u05E8\u05E1\u05D4, \u05D5\u05DC\u05E2\u05EA\u05D9\u05DD \u05E7\u05E8\u05D5\u05D1\u05D5\u05EA \u05D4\u05D5\u05D0 \u05D9\u05D2\u05D9\u05D3 \u05DC\u05DB\u05DD \u05DB\u05E9\u05D4\u05D5\u05D0 \u05DC\u05D0 \u05D1\u05D8\u05D5\u05D7.',
        links: [] },
      { term: 'Fine-tuning',
        en: 'Training an AI model on your own specific data so it learns your style, terminology, or industry. Like teaching a new employee your company\'s way of doing things.',
        he: '\u05D0\u05D9\u05DE\u05D5\u05DF \u05DE\u05D5\u05D3\u05DC AI \u05E2\u05DC \u05D4\u05E0\u05EA\u05D5\u05E0\u05D9\u05DD \u05D4\u05E1\u05E4\u05E6\u05D9\u05E4\u05D9\u05D9\u05DD \u05E9\u05DC\u05DA \u05DB\u05D3\u05D9 \u05E9\u05D9\u05DC\u05DE\u05D3 \u05D0\u05EA \u05D4\u05E1\u05D2\u05E0\u05D5\u05DF, \u05D4\u05DE\u05D5\u05E0\u05D7\u05D9\u05DD \u05D0\u05D5 \u05D4\u05EA\u05D7\u05D5\u05DD \u05E9\u05DC\u05DA. \u05DB\u05DE\u05D5 \u05DC\u05DC\u05DE\u05D3 \u05E2\u05D5\u05D1\u05D3 \u05D7\u05D3\u05E9 \u05D0\u05EA \u05D3\u05E8\u05DA \u05D4\u05E2\u05D1\u05D5\u05D3\u05D4 \u05E9\u05DC \u05D4\u05D7\u05D1\u05E8\u05D4 \u05E9\u05DC\u05DA.',
        detail_en: 'Claude does not currently support fine-tuning for regular users. Instead, you can customize Claude\'s behavior using system prompts, CLAUDE.md files, or Projects with custom instructions. These approaches give you most of the benefits of fine-tuning without the technical complexity.',
        detail_he: '\u05E7\u05DC\u05D5\u05D3 \u05DC\u05D0 \u05EA\u05D5\u05DE\u05DA \u05DB\u05E8\u05D2\u05E2 \u05D1\u05DB\u05D9\u05D5\u05D5\u05E0\u05D5\u05DF \u05E2\u05D3\u05D9\u05DF \u05DC\u05DE\u05E9\u05EA\u05DE\u05E9\u05D9\u05DD \u05E8\u05D2\u05D9\u05DC\u05D9\u05DD. \u05D1\u05DE\u05E7\u05D5\u05DD \u05D6\u05D0\u05EA, \u05D0\u05E4\u05E9\u05E8 \u05DC\u05D4\u05EA\u05D0\u05D9\u05DD \u05D0\u05EA \u05D4\u05D4\u05EA\u05E0\u05D4\u05D2\u05D5\u05EA \u05E9\u05DC \u05E7\u05DC\u05D5\u05D3 \u05D1\u05D0\u05DE\u05E6\u05E2\u05D5\u05EA \u05E4\u05E8\u05D5\u05DE\u05E4\u05D8\u05D9\u05DD \u05E9\u05DC \u05DE\u05E2\u05E8\u05DB\u05EA, \u05E7\u05D1\u05E6\u05D9 CLAUDE.md, \u05D0\u05D5 \u05E4\u05E8\u05D5\u05D9\u05E7\u05D8\u05D9\u05DD \u05E2\u05DD \u05D4\u05D5\u05E8\u05D0\u05D5\u05EA \u05DE\u05D5\u05EA\u05D0\u05DE\u05D5\u05EA. \u05D2\u05D9\u05E9\u05D5\u05EA \u05D0\u05DC\u05D4 \u05E0\u05D5\u05EA\u05E0\u05D5\u05EA \u05D0\u05EA \u05E8\u05D5\u05D1 \u05D4\u05D9\u05EA\u05E8\u05D5\u05E0\u05D5\u05EA \u05E9\u05DC \u05DB\u05D9\u05D5\u05D5\u05E0\u05D5\u05DF \u05E2\u05D3\u05D9\u05DF \u05D1\u05DC\u05D9 \u05D4\u05DE\u05D5\u05E8\u05DB\u05D1\u05D5\u05EA \u05D4\u05D8\u05DB\u05E0\u05D9\u05EA.',
        example_en: 'Instead of fine-tuning, create a CLAUDE.md file with your brand voice guidelines, preferred terminology, and writing rules. Claude follows these instructions in every conversation without needing model training.',
        links: [] }
    ]
  },
  {
    id: 'models', icon: '\u{1F916}', css: 'cat-models',
    name: { en: 'Claude Models', he: '\u05DE\u05D5\u05D3\u05DC\u05D9 Claude' },
    terms: [
      { term: 'Opus',
        en: 'Claude\'s most powerful model. Best for complex reasoning, coding, and deep analysis. Slower and more expensive but delivers the highest quality results.',
        he: '\u05D4\u05DE\u05D5\u05D3\u05DC \u05D4\u05D7\u05D6\u05E7 \u05D1\u05D9\u05D5\u05EA\u05E8 \u05E9\u05DC Claude. \u05DE\u05E6\u05D8\u05D9\u05D9\u05DF \u05DC\u05D7\u05E9\u05D9\u05D1\u05D4 \u05DE\u05D5\u05E8\u05DB\u05D1\u05EA, \u05EA\u05DB\u05E0\u05D5\u05EA \u05D5\u05E0\u05D9\u05EA\u05D5\u05D7 \u05DE\u05E2\u05DE\u05D9\u05E7. \u05D0\u05D9\u05D8\u05D9 \u05D9\u05D5\u05EA\u05E8 \u05D5\u05D9\u05E7\u05E8 \u05D9\u05D5\u05EA\u05E8 \u05D0\u05D1\u05DC \u05E0\u05D5\u05EA\u05DF \u05D0\u05EA \u05D4\u05EA\u05D5\u05E6\u05D0\u05D5\u05EA \u05D4\u05D0\u05D9\u05DB\u05D5\u05EA\u05D9\u05D5\u05EA \u05D1\u05D9\u05D5\u05EA\u05E8.',
        detail_en: 'Opus is the model you use when the task really matters. Complex analysis, detailed code review, creative writing that needs depth. It takes longer and uses more of your usage quota, but the quality difference is noticeable. On the Pro plan, you get limited Opus messages. On Max, you get many more.',
        detail_he: 'Opus \u05D4\u05D5\u05D0 \u05D4\u05DE\u05D5\u05D3\u05DC \u05E9\u05DE\u05E9\u05EA\u05DE\u05E9\u05D9\u05DD \u05D1\u05D5 \u05DB\u05E9\u05D4\u05DE\u05E9\u05D9\u05DE\u05D4 \u05D1\u05D0\u05DE\u05EA \u05D7\u05E9\u05D5\u05D1\u05D4. \u05E0\u05D9\u05EA\u05D5\u05D7 \u05DE\u05D5\u05E8\u05DB\u05D1, \u05E1\u05E7\u05D9\u05E8\u05EA \u05E7\u05D5\u05D3 \u05DE\u05E4\u05D5\u05E8\u05D8\u05EA, \u05DB\u05EA\u05D9\u05D1\u05D4 \u05D9\u05E6\u05D9\u05E8\u05EA\u05D9\u05EA \u05E9\u05D3\u05D5\u05E8\u05E9\u05EA \u05E2\u05D5\u05DE\u05E7. \u05DC\u05D5\u05E7\u05D7 \u05D9\u05D5\u05EA\u05E8 \u05D6\u05DE\u05DF \u05D5\u05E6\u05D5\u05E8\u05DA \u05D9\u05D5\u05EA\u05E8 \u05DE\u05DE\u05DB\u05E1\u05EA \u05D4\u05E9\u05D9\u05DE\u05D5\u05E9, \u05D0\u05D1\u05DC \u05D4\u05D4\u05D1\u05D3\u05DC \u05D1\u05D0\u05D9\u05DB\u05D5\u05EA \u05DE\u05D5\u05E8\u05D2\u05E9. \u05D1\u05EA\u05D5\u05DB\u05E0\u05D9\u05EA Pro \u05DE\u05E7\u05D1\u05DC\u05D9\u05DD \u05DE\u05E1\u05E4\u05E8 \u05DE\u05D5\u05D2\u05D1\u05DC \u05E9\u05DC \u05D4\u05D5\u05D3\u05E2\u05D5\u05EA Opus. \u05D1\u05BEMax \u05DE\u05E7\u05D1\u05DC\u05D9\u05DD \u05D4\u05E8\u05D1\u05D4 \u05D9\u05D5\u05EA\u05E8.',
        example_en: 'You need to review a complex legal contract and identify potential risks. Switch to Opus for this task because it catches nuances that faster models might miss.',
        links: [{label: 'Anthropic Models Overview', url: 'https://docs.anthropic.com/en/docs/about-claude/models'}] },
      { term: 'Sonnet',
        en: 'Claude\'s balanced model. Great mix of speed, quality, and cost. The go to choice for most business tasks.',
        he: '\u05D4\u05DE\u05D5\u05D3\u05DC \u05D4\u05DE\u05D0\u05D5\u05D6\u05DF \u05E9\u05DC Claude. \u05E9\u05D9\u05DC\u05D5\u05D1 \u05DE\u05E2\u05D5\u05DC\u05D4 \u05E9\u05DC \u05DE\u05D4\u05D9\u05E8\u05D5\u05EA, \u05D0\u05D9\u05DB\u05D5\u05EA \u05D5\u05E2\u05DC\u05D5\u05EA. \u05D4\u05D1\u05D7\u05D9\u05E8\u05D4 \u05D4\u05DE\u05D5\u05DE\u05DC\u05E6\u05EA \u05DC\u05E8\u05D5\u05D1 \u05D4\u05DE\u05E9\u05D9\u05DE\u05D5\u05EA \u05D4\u05E2\u05E1\u05E7\u05D9\u05D5\u05EA.',
        detail_en: 'For 90% of tasks, Sonnet is all you need. It is fast, capable, and uses less of your quota than Opus. Most people use Sonnet as their daily driver and only switch to Opus for complex tasks. It is the default model on claude.ai.',
        detail_he: '\u05DC\u05BE90% \u05DE\u05D4\u05DE\u05E9\u05D9\u05DE\u05D5\u05EA, Sonnet \u05D6\u05D4 \u05DB\u05DC \u05DE\u05D4 \u05E9\u05E6\u05E8\u05D9\u05DA. \u05D4\u05D5\u05D0 \u05DE\u05D4\u05D9\u05E8, \u05DE\u05E1\u05D5\u05D2\u05DC, \u05D5\u05E6\u05D5\u05E8\u05DA \u05E4\u05D7\u05D5\u05EA \u05DE\u05DE\u05DB\u05E1\u05EA \u05D4\u05E9\u05D9\u05DE\u05D5\u05E9 \u05DE\u05BEOpus. \u05E8\u05D5\u05D1 \u05D4\u05D0\u05E0\u05E9\u05D9\u05DD \u05DE\u05E9\u05EA\u05DE\u05E9\u05D9\u05DD \u05D1\u05BESonnet \u05DB\u05DE\u05D5\u05D3\u05DC \u05D9\u05D5\u05DE\u05D9\u05D5\u05DE\u05D9 \u05D5\u05E2\u05D5\u05D1\u05E8\u05D9\u05DD \u05DC\u05BEOpus \u05E8\u05E7 \u05DC\u05DE\u05E9\u05D9\u05DE\u05D5\u05EA \u05DE\u05D5\u05E8\u05DB\u05D1\u05D5\u05EA. \u05D4\u05D5\u05D0 \u05DE\u05D5\u05D3\u05DC \u05D1\u05E8\u05D9\u05E8\u05EA \u05D4\u05DE\u05D7\u05D3\u05DC \u05D1\u05BEclaude.ai.',
        example_en: 'Writing emails, summarizing meeting notes, creating social media posts, drafting product descriptions. Sonnet handles all of these quickly and well. Save Opus for when you truly need deeper analysis.',
        links: [{label: 'Anthropic Models Overview', url: 'https://docs.anthropic.com/en/docs/about-claude/models'}] },
      { term: 'Haiku',
        en: 'Claude\'s fastest and cheapest model. Perfect for simple tasks like sorting, summarizing, and quick answers where speed matters most.',
        he: '\u05D4\u05DE\u05D5\u05D3\u05DC \u05D4\u05DE\u05D4\u05D9\u05E8 \u05D5\u05D4\u05D6\u05D5\u05DC \u05D1\u05D9\u05D5\u05EA\u05E8 \u05E9\u05DC Claude. \u05DE\u05D5\u05E9\u05DC\u05DD \u05DC\u05DE\u05E9\u05D9\u05DE\u05D5\u05EA \u05E4\u05E9\u05D5\u05D8\u05D5\u05EA \u05DB\u05DE\u05D5 \u05DE\u05D9\u05D5\u05DF, \u05E1\u05D9\u05DB\u05D5\u05DD \u05D5\u05EA\u05E9\u05D5\u05D1\u05D5\u05EA \u05DE\u05D4\u05D9\u05E8\u05D5\u05EA \u05DB\u05E9\u05DE\u05D4\u05D9\u05E8\u05D5\u05EA \u05D7\u05E9\u05D5\u05D1\u05D4 \u05D1\u05D9\u05D5\u05EA\u05E8.',
        detail_en: 'Haiku is mainly used by developers through the API where speed and cost matter. On claude.ai, you rarely need to select Haiku manually since Sonnet handles most tasks well. But for apps that need to process thousands of requests quickly (like chatbots or data sorting), Haiku is the go to choice.',
        detail_he: 'Haiku \u05DE\u05E9\u05DE\u05E9 \u05D1\u05E2\u05D9\u05E7\u05E8 \u05DE\u05E4\u05EA\u05D7\u05D9\u05DD \u05D3\u05E8\u05DA \u05D4\u05BEAPI \u05E9\u05DD \u05DE\u05D4\u05D9\u05E8\u05D5\u05EA \u05D5\u05E2\u05DC\u05D5\u05EA \u05D7\u05E9\u05D5\u05D1\u05D9\u05DD. \u05D1\u05BEclaude.ai, \u05DC\u05E2\u05EA\u05D9\u05DD \u05E8\u05D7\u05D5\u05E7\u05D5\u05EA \u05E6\u05E8\u05D9\u05DA \u05DC\u05D1\u05D7\u05D5\u05E8 Haiku \u05D9\u05D3\u05E0\u05D9\u05EA \u05DB\u05D9 Sonnet \u05DE\u05D8\u05E4\u05DC \u05D1\u05E8\u05D5\u05D1 \u05D4\u05DE\u05E9\u05D9\u05DE\u05D5\u05EA \u05D4\u05D9\u05D8\u05D1. \u05D0\u05D1\u05DC \u05DC\u05D0\u05E4\u05DC\u05D9\u05E7\u05E6\u05D9\u05D5\u05EA \u05E9\u05E6\u05E8\u05D9\u05DB\u05D5\u05EA \u05DC\u05E2\u05D1\u05D3 \u05D0\u05DC\u05E4\u05D9 \u05D1\u05E7\u05E9\u05D5\u05EA \u05D1\u05DE\u05D4\u05D9\u05E8\u05D5\u05EA (\u05DB\u05DE\u05D5 \u05E6\u05F3\u05D0\u05D8\u05D1\u05D5\u05D8\u05D9\u05DD \u05D0\u05D5 \u05DE\u05D9\u05D5\u05DF \u05E0\u05EA\u05D5\u05E0\u05D9\u05DD), Haiku \u05D4\u05D5\u05D0 \u05D4\u05D1\u05D7\u05D9\u05E8\u05D4 \u05D4\u05DE\u05D5\u05E2\u05D3\u05E4\u05EA.',
        example_en: 'A chatbot on your website answering simple FAQs like "What are your shipping times?" or "How do I return an item?" Haiku gives instant answers and costs very little per response.',
        links: [{label: 'Anthropic Models Overview', url: 'https://docs.anthropic.com/en/docs/about-claude/models'}] },
      { term: 'Claude 4 / 4.5 / 4.6',
        en: 'Version numbers for Claude models. Higher versions are newer and more capable. Claude 4.6 is the latest version with the best performance.',
        he: '\u05DE\u05E1\u05E4\u05E8\u05D9 \u05D2\u05E8\u05E1\u05D4 \u05E9\u05DC \u05DE\u05D5\u05D3\u05DC\u05D9 Claude. \u05D2\u05E8\u05E1\u05D0\u05D5\u05EA \u05D2\u05D1\u05D5\u05D4\u05D5\u05EA \u05D9\u05D5\u05EA\u05E8 \u05D4\u05DF \u05D7\u05D3\u05E9\u05D5\u05EA \u05D5\u05D9\u05DB\u05D5\u05DC\u05D5\u05EA \u05D9\u05D5\u05EA\u05E8. Claude 4.6 \u05D4\u05D9\u05D0 \u05D4\u05D2\u05E8\u05E1\u05D4 \u05D4\u05D0\u05D7\u05E8\u05D5\u05E0\u05D4 \u05E2\u05DD \u05D4\u05D1\u05D9\u05E6\u05D5\u05E2\u05D9\u05DD \u05D4\u05D8\u05D5\u05D1\u05D9\u05DD \u05D1\u05D9\u05D5\u05EA\u05E8.',
        detail_en: 'Claude\'s version numbers work like phone models. Claude 4.6 is the latest and most capable. Each new version brings better reasoning, fewer hallucinations, and new features. When Anthropic releases a new version, it becomes available on all plans (though some plans get access earlier).',
        detail_he: '\u05DE\u05E1\u05E4\u05E8\u05D9 \u05D4\u05D2\u05E8\u05E1\u05D0\u05D5\u05EA \u05E9\u05DC \u05E7\u05DC\u05D5\u05D3 \u05E2\u05D5\u05D1\u05D3\u05D9\u05DD \u05DB\u05DE\u05D5 \u05D3\u05D2\u05DE\u05D9 \u05D8\u05DC\u05E4\u05D5\u05E0\u05D9\u05DD. Claude 4.6 \u05D4\u05D5\u05D0 \u05D4\u05D0\u05D7\u05E8\u05D5\u05DF \u05D5\u05D4\u05DE\u05E1\u05D5\u05D2\u05DC \u05D1\u05D9\u05D5\u05EA\u05E8. \u05DB\u05DC \u05D2\u05E8\u05E1\u05D4 \u05D7\u05D3\u05E9\u05D4 \u05DE\u05D1\u05D9\u05D0\u05D4 \u05D7\u05E9\u05D9\u05D1\u05D4 \u05D8\u05D5\u05D1\u05D4 \u05D9\u05D5\u05EA\u05E8, \u05E4\u05D7\u05D5\u05EA \u05D4\u05D6\u05D9\u05D5\u05EA \u05D5\u05EA\u05DB\u05D5\u05E0\u05D5\u05EA \u05D7\u05D3\u05E9\u05D5\u05EA. \u05DB\u05E9\u05BEAnthropic \u05DE\u05E9\u05D7\u05E8\u05E8\u05EA \u05D2\u05E8\u05E1\u05D4 \u05D7\u05D3\u05E9\u05D4, \u05D4\u05D9\u05D0 \u05D6\u05DE\u05D9\u05E0\u05D4 \u05D1\u05DB\u05DC \u05D4\u05EA\u05D5\u05DB\u05E0\u05D9\u05D5\u05EA (\u05D0\u05DD \u05DB\u05D9 \u05D7\u05DC\u05E7 \u05DE\u05D4\u05EA\u05D5\u05DB\u05E0\u05D9\u05D5\u05EA \u05DE\u05E7\u05D1\u05DC\u05D5\u05EA \u05D2\u05D9\u05E9\u05D4 \u05DE\u05D5\u05E7\u05D3\u05DD \u05D9\u05D5\u05EA\u05E8).',
        example_en: 'When claude.ai shows "Claude 4.6 Sonnet" in the model selector, the "4.6" is the version and "Sonnet" is the model tier. A newer version (4.6 vs 4.5) means better quality within the same tier.',
        links: [{label: 'Anthropic News', url: 'https://www.anthropic.com/news'}] },
      { term: 'Extended Thinking',
        en: 'A mode where Claude takes extra time to reason through complex problems step by step before answering. Like giving someone time to think before speaking.',
        he: '\u05DE\u05E6\u05D1 \u05E9\u05D1\u05D5 Claude \u05DC\u05D5\u05E7\u05D7 \u05D6\u05DE\u05DF \u05E0\u05D5\u05E1\u05E3 \u05DC\u05D7\u05E9\u05D5\u05D1 \u05E2\u05DC \u05D1\u05E2\u05D9\u05D5\u05EA \u05DE\u05D5\u05E8\u05DB\u05D1\u05D5\u05EA \u05E6\u05E2\u05D3 \u05D0\u05D7\u05E8 \u05E6\u05E2\u05D3 \u05DC\u05E4\u05E0\u05D9 \u05E9\u05D4\u05D5\u05D0 \u05E2\u05D5\u05E0\u05D4. \u05DB\u05DE\u05D5 \u05DC\u05EA\u05EA \u05DC\u05DE\u05D9\u05E9\u05D4\u05D5 \u05D6\u05DE\u05DF \u05DC\u05D7\u05E9\u05D5\u05D1 \u05DC\u05E4\u05E0\u05D9 \u05E9\u05D4\u05D5\u05D0 \u05DE\u05D3\u05D1\u05E8.',
        detail_en: 'When turned on, you can actually see Claude\'s thought process in a collapsible section above its answer. It shows how Claude broke down the problem, what options it considered, and why it chose its approach. In Claude Code, you can trigger the deepest level of thinking by adding the word \'ultrathink\' to your prompt.',
        detail_he: '\u05DB\u05E9\u05DE\u05D5\u05E4\u05E2\u05DC, \u05D0\u05E4\u05E9\u05E8 \u05DC\u05E8\u05D0\u05D5\u05EA \u05D0\u05EA \u05EA\u05D4\u05DC\u05D9\u05DA \u05D4\u05D7\u05E9\u05D9\u05D1\u05D4 \u05E9\u05DC \u05E7\u05DC\u05D5\u05D3 \u05D1\u05D7\u05DC\u05E7 \u05DE\u05EA\u05E7\u05E4\u05DC \u05DE\u05E2\u05DC \u05D4\u05EA\u05E9\u05D5\u05D1\u05D4. \u05D4\u05D5\u05D0 \u05DE\u05E8\u05D0\u05D4 \u05D0\u05D9\u05DA \u05E7\u05DC\u05D5\u05D3 \u05E4\u05D9\u05E8\u05E7 \u05D0\u05EA \u05D4\u05D1\u05E2\u05D9\u05D4, \u05D0\u05D9\u05DC\u05D5 \u05D0\u05E4\u05E9\u05E8\u05D5\u05D9\u05D5\u05EA \u05E9\u05E7\u05DC, \u05D5\u05DC\u05DE\u05D4 \u05D1\u05D7\u05E8 \u05D1\u05D2\u05D9\u05E9\u05D4 \u05E9\u05DC\u05D5. \u05D1\u05BEClaude Code, \u05D0\u05E4\u05E9\u05E8 \u05DC\u05D4\u05E4\u05E2\u05D9\u05DC \u05D0\u05EA \u05D4\u05E8\u05DE\u05D4 \u05D4\u05E2\u05DE\u05D5\u05E7\u05D4 \u05D1\u05D9\u05D5\u05EA\u05E8 \u05E9\u05DC \u05D7\u05E9\u05D9\u05D1\u05D4 \u05E2\u05DC \u05D9\u05D3\u05D9 \u05D4\u05D5\u05E1\u05E4\u05EA \u05D4\u05DE\u05D9\u05DC\u05D4 \'ultrathink\' \u05DC\u05E4\u05E8\u05D5\u05DE\u05E4\u05D8.',
        example_en: 'Ask Claude to analyze your pricing strategy with extended thinking turned on. You will see it reason through market positioning, competitor analysis, and margin calculations step by step before giving you a final recommendation.',
        links: [{label: 'Covered in Daily Claude Hack #15', url: 'https://jaygptpro.com/claude/claude-dictionary.html'}] }
    ]
  },
  {
    id: 'products', icon: '\u{1F4E6}', css: 'cat-products',
    name: { en: 'Claude Products', he: '\u05DE\u05D5\u05E6\u05E8\u05D9 Claude' },
    terms: [
      { term: 'claude.ai',
        en: 'The website where you chat with Claude directly in your browser. The simplest way to start using Claude for conversations, writing, and analysis.',
        he: '\u05D4\u05D0\u05EA\u05E8 \u05E9\u05D1\u05D5 \u05D0\u05EA\u05D4 \u05DE\u05E9\u05D5\u05D7\u05D7 \u05E2\u05DD Claude \u05D9\u05E9\u05D9\u05E8\u05D5\u05EA \u05D1\u05D3\u05E4\u05D3\u05E4\u05DF. \u05D4\u05D3\u05E8\u05DA \u05D4\u05E4\u05E9\u05D5\u05D8\u05D4 \u05D1\u05D9\u05D5\u05EA\u05E8 \u05DC\u05D4\u05EA\u05D7\u05D9\u05DC \u05DC\u05D4\u05E9\u05EA\u05DE\u05E9 \u05D1\u05E9\u05D9\u05D7\u05D5\u05EA, \u05DB\u05EA\u05D9\u05D1\u05D4 \u05D5\u05E0\u05D9\u05EA\u05D5\u05D7.',
        detail_en: 'Go to claude.ai, create a free account, and start chatting immediately. The free plan gives you limited daily messages with Sonnet. Upgrade to Pro or Max for more usage and access to all models. Everything happens in your browser, no installation needed.',
        detail_he: '\u05D2\u05DC\u05E9\u05D5 \u05DC\u05BEclaude.ai, \u05E6\u05E8\u05D5 \u05D7\u05E9\u05D1\u05D5\u05DF \u05D7\u05D9\u05E0\u05DE\u05D9, \u05D5\u05D4\u05EA\u05D7\u05D9\u05DC\u05D5 \u05DC\u05E9\u05D5\u05D7\u05D7 \u05DE\u05D9\u05D3. \u05D4\u05EA\u05D5\u05DB\u05E0\u05D9\u05EA \u05D4\u05D7\u05D9\u05E0\u05DE\u05D9\u05EA \u05E0\u05D5\u05EA\u05E0\u05EA \u05DE\u05E1\u05E4\u05E8 \u05DE\u05D5\u05D2\u05D1\u05DC \u05E9\u05DC \u05D4\u05D5\u05D3\u05E2\u05D5\u05EA \u05D9\u05D5\u05DE\u05D9\u05D5\u05EA \u05E2\u05DD Sonnet. \u05E9\u05D3\u05E8\u05D2\u05D5 \u05DC\u05BEPro \u05D0\u05D5 Max \u05DC\u05E9\u05D9\u05DE\u05D5\u05E9 \u05E0\u05D5\u05E1\u05E3 \u05D5\u05D2\u05D9\u05E9\u05D4 \u05DC\u05DB\u05DC \u05D4\u05DE\u05D5\u05D3\u05DC\u05D9\u05DD. \u05D4\u05DB\u05DC \u05E7\u05D5\u05E8\u05D4 \u05D1\u05D3\u05E4\u05D3\u05E4\u05DF, \u05D1\u05DC\u05D9 \u05E6\u05D5\u05E8\u05DA \u05D1\u05D4\u05EA\u05E7\u05E0\u05D4.',
        example_en: 'Open claude.ai in your browser, type "Write me 5 Instagram captions for a new product launch" and Claude gives you ready to use captions instantly. No installation, no setup.',
        links: [{label: 'Open Claude', url: 'https://claude.ai'}] },
      { term: 'Cowork (Claude Cowork)',
        en: 'A feature where Claude works on tasks in the background while you continue your day. Like delegating work to a virtual assistant who sends you the results when done.',
        he: '\u05EA\u05DB\u05D5\u05E0\u05D4 \u05E9\u05D1\u05D4 Claude \u05E2\u05D5\u05D1\u05D3 \u05E2\u05DC \u05DE\u05E9\u05D9\u05DE\u05D5\u05EA \u05D1\u05E8\u05E7\u05E2 \u05D1\u05D6\u05DE\u05DF \u05E9\u05D0\u05EA\u05D4 \u05DE\u05DE\u05E9\u05D9\u05DA \u05D1\u05D9\u05D5\u05DE\u05DA. \u05DB\u05DE\u05D5 \u05DC\u05D4\u05D0\u05E6\u05D9\u05DC \u05E2\u05D1\u05D5\u05D3\u05D4 \u05DC\u05E2\u05D5\u05D6\u05E8 \u05D5\u05D9\u05E8\u05D8\u05D5\u05D0\u05DC\u05D9 \u05E9\u05E9\u05D5\u05DC\u05D7 \u05DC\u05DA \u05D0\u05EA \u05D4\u05EA\u05D5\u05E6\u05D0\u05D5\u05EA \u05DB\u05E9\u05D4\u05D5\u05D0 \u05DE\u05E1\u05D9\u05D9\u05DD.',
        detail_en: 'Cowork is Claude\'s desktop mode with superpowers. It connects to your files, apps, and tools. Ask it to check your email, update a spreadsheet, and create a calendar event, all in one conversation. Available on Max plan and requires Claude Desktop app. Think of it as Claude sitting at your desk with access to everything you work with.',
        detail_he: 'Cowork \u05D4\u05D5\u05D0 \u05DE\u05E6\u05D1 \u05E9\u05D5\u05DC\u05D7\u05DF \u05E2\u05D1\u05D5\u05D3\u05D4 \u05E9\u05DC \u05E7\u05DC\u05D5\u05D3 \u05E2\u05DD \u05DB\u05D5\u05D7\u05D5\u05EA\u05BF\u05E2\u05DC. \u05D4\u05D5\u05D0 \u05DE\u05EA\u05D7\u05D1\u05E8 \u05DC\u05E7\u05D1\u05E6\u05D9\u05DD, \u05D0\u05E4\u05DC\u05D9\u05E7\u05E6\u05D9\u05D5\u05EA \u05D5\u05DB\u05DC\u05D9\u05DD \u05E9\u05DC\u05DA. \u05EA\u05D1\u05E7\u05E9\u05D5 \u05DE\u05DE\u05E0\u05D5 \u05DC\u05D1\u05D3\u05D5\u05E7 \u05D0\u05EA \u05D4\u05DE\u05D9\u05D9\u05DC, \u05DC\u05E2\u05D3\u05DB\u05DF \u05D2\u05D9\u05DC\u05D9\u05D5\u05DF \u05D5\u05DC\u05D9\u05E6\u05D5\u05E8 \u05D0\u05D9\u05E8\u05D5\u05E2 \u05D1\u05D9\u05D5\u05DE\u05DF, \u05D4\u05DB\u05DC \u05D1\u05E9\u05D9\u05D7\u05D4 \u05D0\u05D7\u05EA. \u05D6\u05DE\u05D9\u05DF \u05D1\u05DE\u05E1\u05DC\u05D5\u05DC Max \u05D5\u05D3\u05D5\u05E8\u05E9 \u05D0\u05EA \u05D0\u05E4\u05DC\u05D9\u05E7\u05E6\u05D9\u05D9\u05EA Claude Desktop. \u05EA\u05D7\u05E9\u05D1\u05D5 \u05E2\u05DC \u05D6\u05D4 \u05DB\u05E7\u05DC\u05D5\u05D3 \u05E9\u05D9\u05D5\u05E9\u05D1 \u05DC\u05D9\u05D3\u05DB\u05DD \u05E2\u05DC \u05D4\u05E9\u05D5\u05DC\u05D7\u05DF \u05E2\u05DD \u05D2\u05D9\u05E9\u05D4 \u05DC\u05DB\u05DC \u05DE\u05D4 \u05E9\u05D0\u05EA\u05DD \u05E2\u05D5\u05D1\u05D3\u05D9\u05DD \u05D0\u05D9\u05EA\u05D5.',
        example_en: 'Tell Cowork: "Check my Gmail for any invoices from this week, add the amounts to my expenses spreadsheet in Google Drive, and block 30 minutes on my calendar tomorrow to review them." Claude does all three tasks in sequence.',
        links: [] },
      { term: 'Claude Code',
        en: 'A command line tool for developers and power users. Claude works directly with your files, writes code, runs commands, and builds projects.',
        he: '\u05DB\u05DC\u05D9 \u05E9\u05D5\u05E8\u05EA \u05E4\u05E7\u05D5\u05D3\u05D4 \u05DC\u05DE\u05E4\u05EA\u05D7\u05D9\u05DD \u05D5\u05DE\u05E9\u05EA\u05DE\u05E9\u05D9\u05DD \u05DE\u05EA\u05E7\u05D3\u05DE\u05D9\u05DD. Claude \u05E2\u05D5\u05D1\u05D3 \u05D9\u05E9\u05D9\u05E8\u05D5\u05EA \u05E2\u05DD \u05D4\u05E7\u05D1\u05E6\u05D9\u05DD \u05E9\u05DC\u05DA, \u05DB\u05D5\u05EA\u05D1 \u05E7\u05D5\u05D3, \u05DE\u05E8\u05D9\u05E5 \u05E4\u05E7\u05D5\u05D3\u05D5\u05EA \u05D5\u05D1\u05D5\u05E0\u05D4 \u05E4\u05E8\u05D5\u05D9\u05E7\u05D8\u05D9\u05DD.',
        detail_en: 'Claude Code runs in your terminal (command line). You type a task description and Claude reads your entire codebase, writes code, creates files, and runs tests automatically. It supports CLAUDE.md for project rules, Skills for reusable workflows, and MCP for connecting to external tools. You need a Max plan or a separate Claude Code subscription.',
        detail_he: 'Claude Code \u05E8\u05E5 \u05D1\u05D8\u05E8\u05DE\u05D9\u05E0\u05DC (\u05E9\u05D5\u05E8\u05EA \u05D4\u05E4\u05E7\u05D5\u05D3\u05D4). \u05DE\u05E7\u05DC\u05D9\u05D3\u05D9\u05DD \u05EA\u05D9\u05D0\u05D5\u05E8 \u05DE\u05E9\u05D9\u05DE\u05D4 \u05D5\u05E7\u05DC\u05D5\u05D3 \u05E7\u05D5\u05E8\u05D0 \u05D0\u05EA \u05DB\u05DC \u05D4\u05E7\u05D5\u05D3, \u05DB\u05D5\u05EA\u05D1 \u05E7\u05D1\u05E6\u05D9\u05DD, \u05D9\u05D5\u05E6\u05E8 \u05E7\u05D1\u05E6\u05D9\u05DD \u05D7\u05D3\u05E9\u05D9\u05DD \u05D5\u05DE\u05E8\u05D9\u05E5 \u05D1\u05D3\u05D9\u05E7\u05D5\u05EA \u05D0\u05D5\u05D8\u05D5\u05DE\u05D8\u05D9\u05EA. \u05EA\u05D5\u05DE\u05DA \u05D1\u05BEClaude.md \u05DC\u05DB\u05DC\u05DC\u05D9 \u05E4\u05E8\u05D5\u05D9\u05E7\u05D8, Skills \u05DC\u05EA\u05D4\u05DC\u05D9\u05DB\u05D9 \u05E2\u05D1\u05D5\u05D3\u05D4 \u05D7\u05D5\u05D6\u05E8\u05D9\u05DD, \u05D5\u05BEMcp \u05DC\u05D7\u05D9\u05D1\u05D5\u05E8 \u05DC\u05DB\u05DC\u05D9\u05DD \u05D7\u05D9\u05E6\u05D5\u05E0\u05D9\u05D9\u05DD. \u05E6\u05E8\u05D9\u05DA \u05DE\u05E1\u05DC\u05D5\u05DC Max \u05D0\u05D5 \u05DE\u05E0\u05D5\u05D9 Claude Code \u05E0\u05E4\u05E8\u05D3.',
        example_en: 'Open your terminal, navigate to a project folder, type "claude" to start, then say: "Build me a landing page with a hero section, features grid, and contact form using Next.js and Tailwind." Claude creates all the files and you can preview immediately.',
        links: [{label: 'Claude Code Docs', url: 'https://docs.anthropic.com/en/docs/claude-code'}] },
      { term: 'Claude Desktop',
        en: 'The app you install on your Mac or PC. Same as claude.ai but runs as a standalone application on your computer.',
        he: '\u05D4\u05D0\u05E4\u05DC\u05D9\u05E7\u05E6\u05D9\u05D4 \u05E9\u05D0\u05EA\u05D4 \u05DE\u05EA\u05E7\u05D9\u05DF \u05E2\u05DC \u05D4\u05DE\u05D7\u05E9\u05D1 (Mac \u05D0\u05D5 PC). \u05D0\u05D5\u05EA\u05D5 \u05D3\u05D1\u05E8 \u05DB\u05DE\u05D5 claude.ai \u05D0\u05D1\u05DC \u05E8\u05E5 \u05DB\u05D0\u05E4\u05DC\u05D9\u05E7\u05E6\u05D9\u05D4 \u05E2\u05E6\u05DE\u05D0\u05D9\u05EA \u05E2\u05DC \u05D4\u05DE\u05D7\u05E9\u05D1.',
        detail_en: 'Download from anthropic.com and install. You get the same features as claude.ai plus Cowork capabilities. The app works even when your browser is closed and gives you quick access via keyboard shortcuts. Available for Mac and Windows.',
        detail_he: '\u05D4\u05D5\u05E8\u05D9\u05D3\u05D5 \u05DE\u05BEanthropic.com \u05D5\u05D4\u05EA\u05E7\u05D9\u05E0\u05D5. \u05DE\u05E7\u05D1\u05DC\u05D9\u05DD \u05D0\u05EA \u05D0\u05D5\u05EA\u05DD \u05D4\u05EA\u05DB\u05D5\u05E0\u05D5\u05EA \u05DB\u05DE\u05D5 \u05D1\u05BEclaude.ai \u05E4\u05DC\u05D5\u05E1 \u05D9\u05DB\u05D5\u05DC\u05D5\u05EA Cowork. \u05D4\u05D0\u05E4\u05DC\u05D9\u05E7\u05E6\u05D9\u05D4 \u05E2\u05D5\u05D1\u05D3\u05EA \u05D2\u05DD \u05DB\u05E9\u05D4\u05D3\u05E4\u05D3\u05E4\u05DF \u05E1\u05D2\u05D5\u05E8 \u05D5\u05E0\u05D5\u05EA\u05E0\u05EA \u05D2\u05D9\u05E9\u05D4 \u05DE\u05D4\u05D9\u05E8\u05D4 \u05D3\u05E8\u05DA \u05E7\u05D9\u05E6\u05D5\u05E8\u05D9 \u05DE\u05E7\u05DC\u05D3\u05EA. \u05D6\u05DE\u05D9\u05E0\u05D4 \u05DC\u05BEMac \u05D5\u05BEWindows.',
        example_en: 'Download from anthropic.com, install it, and press Cmd+Space (Mac) or a keyboard shortcut to bring up Claude instantly. Ask a quick question without opening your browser.',
        links: [{label: 'Download Claude Desktop', url: 'https://claude.ai/download'}] },
      { term: 'Artifacts',
        en: 'Pieces of content Claude creates for you during a conversation, like documents, code, charts, or interactive tools. They appear in a separate panel so you can use them directly.',
        he: '\u05EA\u05D5\u05DB\u05DF \u05E9\u05E7\u05DC\u05D5\u05D3 \u05D9\u05D5\u05E6\u05E8 \u05E2\u05D1\u05D5\u05E8\u05DA \u05D1\u05DE\u05D4\u05DC\u05DA \u05E9\u05D9\u05D7\u05D4, \u05DB\u05DE\u05D5 \u05DE\u05E1\u05DE\u05DB\u05D9\u05DD, \u05E7\u05D5\u05D3, \u05D2\u05E8\u05E4\u05D9\u05DD \u05D0\u05D5 \u05DB\u05DC\u05D9\u05DD \u05D0\u05D9\u05E0\u05D8\u05E8\u05D0\u05E7\u05D8\u05D9\u05D1\u05D9\u05D9\u05DD. \u05D4\u05DD \u05DE\u05D5\u05E4\u05D9\u05E2\u05D9\u05DD \u05D1\u05E4\u05D0\u05E0\u05DC \u05E0\u05E4\u05E8\u05D3 \u05DB\u05D3\u05D9 \u05E9\u05EA\u05D5\u05DB\u05DC \u05DC\u05D4\u05E9\u05EA\u05DE\u05E9 \u05D1\u05D4\u05DD \u05D9\u05E9\u05D9\u05E8\u05D5\u05EA.',
        detail_en: 'Ask Claude to create a calculator, a chart, a landing page, or a mini app, and it builds a working version you can use right in the chat. Artifacts appear in a panel next to the conversation. You can copy, download, or share them. They are interactive, so a calculator actually calculates and a chart actually displays your data.',
        detail_he: '\u05D1\u05E7\u05E9\u05D5 \u05DE\u05E7\u05DC\u05D5\u05D3 \u05DC\u05D9\u05E6\u05D5\u05E8 \u05DE\u05D7\u05E9\u05D1\u05D5\u05DF, \u05D2\u05E8\u05E3, \u05D3\u05E3 \u05E0\u05D7\u05D9\u05EA\u05D4 \u05D0\u05D5 \u05D0\u05E4\u05DC\u05D9\u05E7\u05E6\u05D9\u05D4 \u05E7\u05D8\u05E0\u05D4, \u05D5\u05D4\u05D5\u05D0 \u05D1\u05D5\u05E0\u05D4 \u05D2\u05E8\u05E1\u05D4 \u05E2\u05D5\u05D1\u05D3\u05EA \u05E9\u05D0\u05E4\u05E9\u05E8 \u05DC\u05D4\u05E9\u05EA\u05DE\u05E9 \u05D1\u05D4 \u05D9\u05E9\u05D9\u05E8\u05D5\u05EA \u05D1\u05E6\u05F3\u05D0\u05D8. Artifacts \u05DE\u05D5\u05E4\u05D9\u05E2\u05D9\u05DD \u05D1\u05E4\u05D0\u05E0\u05DC \u05DC\u05D9\u05D3 \u05D4\u05E9\u05D9\u05D7\u05D4. \u05D0\u05E4\u05E9\u05E8 \u05DC\u05D4\u05E2\u05EA\u05D9\u05E7, \u05DC\u05D4\u05D5\u05E8\u05D9\u05D3 \u05D0\u05D5 \u05DC\u05E9\u05EA\u05E3. \u05D4\u05DD \u05D0\u05D9\u05E0\u05D8\u05E8\u05D0\u05E7\u05D8\u05D9\u05D1\u05D9\u05D9\u05DD, \u05D0\u05D6 \u05DE\u05D7\u05E9\u05D1\u05D5\u05DF \u05D1\u05D0\u05DE\u05EA \u05DE\u05D7\u05E9\u05D1 \u05D5\u05D2\u05E8\u05E3 \u05D1\u05D0\u05DE\u05EA \u05DE\u05E6\u05D9\u05D2 \u05D0\u05EA \u05D4\u05E0\u05EA\u05D5\u05E0\u05D9\u05DD.',
        example_en: 'Ask Claude: "Create an interactive ROI calculator where I input my ad spend, conversion rate, and average order value." Claude builds a working calculator you can use right in the chat, then download or share.',
        links: [{label: 'Anthropic Artifacts Guide', url: 'https://support.anthropic.com/en/articles/9487310-what-are-artifacts-and-how-do-i-use-them'}] },
      { term: 'Claude in Chrome',
        en: 'A browser extension that lets Claude see and interact with web pages. It can click, fill forms, and navigate sites on your behalf.',
        he: 'תוסף דפדפן שמאפשר לקלוד לראות ולתקשר עם דפי אינטרנט. הוא יכול ללחוץ, למלא טפסים ולנווט באתרים.',
        detail_en: 'Install the Claude in Chrome extension and Claude can see what is on your screen. Open your inbox and ask Claude to go through your last 20 emails and tell you which need a reply. Open a spreadsheet and ask Claude to analyze the data. It can click buttons, fill forms, navigate between pages, and read any content on the screen.',
        detail_he: '\u05D4\u05EA\u05E7\u05D9\u05E0\u05D5 \u05D0\u05EA \u05EA\u05D5\u05E1\u05E3 Claude in Chrome \u05D5\u05E7\u05DC\u05D5\u05D3 \u05D9\u05D5\u05DB\u05DC \u05DC\u05E8\u05D0\u05D5\u05EA \u05DE\u05D4 \u05E9\u05E2\u05DC \u05D4\u05DE\u05E1\u05DA. \u05E4\u05EA\u05D7\u05D5 \u05D0\u05EA \u05EA\u05D9\u05D1\u05EA \u05D4\u05D3\u05D5\u05D0\u05E8 \u05D5\u05D1\u05E7\u05E9\u05D5 \u05DE\u05E7\u05DC\u05D5\u05D3 \u05DC\u05E2\u05D1\u05D5\u05E8 \u05E2\u05DC 20 \u05D4\u05DE\u05D9\u05D9\u05DC\u05D9\u05DD \u05D4\u05D0\u05D7\u05E8\u05D5\u05E0\u05D9\u05DD \u05D5\u05DC\u05D4\u05D2\u05D9\u05D3 \u05D0\u05D9\u05DC\u05D5 \u05D3\u05D5\u05E8\u05E9\u05D9\u05DD \u05EA\u05E9\u05D5\u05D1\u05D4. \u05D4\u05D5\u05D0 \u05D9\u05DB\u05D5\u05DC \u05DC\u05DC\u05D7\u05D5\u05E5 \u05E2\u05DC \u05DB\u05E4\u05EA\u05D5\u05E8\u05D9\u05DD, \u05DC\u05DE\u05DC\u05D0 \u05D8\u05E4\u05E1\u05D9\u05DD, \u05DC\u05E0\u05D5\u05D5\u05D8 \u05D1\u05D9\u05DF \u05D3\u05E4\u05D9\u05DD \u05D5\u05DC\u05E7\u05E8\u05D5\u05D0 \u05DB\u05DC \u05EA\u05D5\u05DB\u05DF \u05E9\u05E2\u05DC \u05D4\u05DE\u05E1\u05DA.',
        example_en: 'You are on a competitor\'s website. Ask Claude in Chrome: "Analyze this page. What are they doing well in terms of UX? What could be improved?" Claude reads the entire page and gives you a detailed breakdown.',
        links: [{label: 'Covered in Daily Claude Hack #4', url: 'https://jaygptpro.com/claude/claude-dictionary.html'}] }
    ]
  },
  {
    id: 'commands', icon: '\u{2328}\uFE0F', css: 'cat-commands',
    name: { en: 'Commands & Shortcuts', he: '\u05E4\u05E7\u05D5\u05D3\u05D5\u05EA \u05D5\u05E7\u05D9\u05E6\u05D5\u05E8\u05D9\u05DD' },
    terms: [
      { term: '/compact',
        en: 'A Claude Code command that compresses your conversation to save context space. Use it when the chat gets long so Claude keeps remembering everything important.',
        he: '\u05E4\u05E7\u05D5\u05D3\u05D4 \u05D1\u05BEClaude Code \u05E9\u05D3\u05D5\u05D7\u05E1\u05EA \u05D0\u05EA \u05D4\u05E9\u05D9\u05D7\u05D4 \u05DB\u05D3\u05D9 \u05DC\u05D7\u05E1\u05D5\u05DA \u05DE\u05E7\u05D5\u05DD \u05D1\u05D7\u05DC\u05D5\u05DF \u05D4\u05D4\u05E7\u05E9\u05E8. \u05EA\u05E9\u05EA\u05DE\u05E9\u05D5 \u05D1\u05D6\u05D4 \u05DB\u05E9\u05D4\u05E9\u05D9\u05D7\u05D4 \u05DE\u05EA\u05D0\u05E8\u05DB\u05EA \u05DB\u05D3\u05D9 \u05E9\u05E7\u05DC\u05D5\u05D3 \u05D9\u05DE\u05E9\u05D9\u05DA \u05DC\u05D6\u05DB\u05D5\u05E8 \u05D0\u05EA \u05DB\u05DC \u05DE\u05D4 \u05E9\u05D7\u05E9\u05D5\u05D1.',
        detail_en: 'After finishing a big task, type /compact to clear up most of your context window. Claude summarizes the conversation into key points and frees up space for new work. It keeps all important decisions and code changes. Use /context first to see how full your window is, then /compact when it is getting crowded.',
        detail_he: '\u05D0\u05D7\u05E8\u05D9 \u05E9\u05E1\u05D9\u05D9\u05DE\u05EA\u05DD \u05DE\u05E9\u05D9\u05DE\u05D4 \u05D2\u05D3\u05D5\u05DC\u05D4, \u05D4\u05E7\u05DC\u05D9\u05D3\u05D5 /compact \u05DB\u05D3\u05D9 \u05DC\u05E4\u05E0\u05D5\u05EA \u05D0\u05EA \u05E8\u05D5\u05D1 \u05D7\u05DC\u05D5\u05DF \u05D4\u05D4\u05E7\u05E9\u05E8. \u05E7\u05DC\u05D5\u05D3 \u05DE\u05E1\u05DB\u05DD \u05D0\u05EA \u05D4\u05E9\u05D9\u05D7\u05D4 \u05DC\u05E0\u05E7\u05D5\u05D3\u05D5\u05EA \u05DE\u05E4\u05EA\u05D7 \u05D5\u05DE\u05E4\u05E0\u05D4 \u05DE\u05E7\u05D5\u05DD \u05DC\u05E2\u05D1\u05D5\u05D3\u05D4 \u05D7\u05D3\u05E9\u05D4. \u05D4\u05D5\u05D0 \u05E9\u05D5\u05DE\u05E8 \u05D0\u05EA \u05DB\u05DC \u05D4\u05D4\u05D7\u05DC\u05D8\u05D5\u05EA \u05D4\u05D7\u05E9\u05D5\u05D1\u05D5\u05EA \u05D5\u05E9\u05D9\u05E0\u05D5\u05D9\u05D9 \u05D4\u05E7\u05D5\u05D3. \u05D4\u05E9\u05EA\u05DE\u05E9\u05D5 \u05D1\u05BF/context \u05E7\u05D5\u05D3\u05DD \u05DB\u05D3\u05D9 \u05DC\u05E8\u05D0\u05D5\u05EA \u05DB\u05DE\u05D4 \u05D4\u05D7\u05DC\u05D5\u05DF \u05DE\u05DC\u05D0, \u05D5\u05D0\u05D6 /compact \u05DB\u05E9\u05D4\u05D5\u05D0 \u05DE\u05EA\u05DE\u05DC\u05D0.',
        example_en: 'You have been working with Claude Code for an hour building a feature. Claude starts forgetting earlier instructions. Type /compact. Claude summarizes everything important and frees up 70% of the context window. Now it remembers your requirements again.',
        links: [{label: 'Covered in Daily Claude Hack #7', url: 'https://jaygptpro.com/claude/claude-dictionary.html'}] },
      { term: '/clear',
        en: 'Starts a completely fresh conversation. Claude forgets everything from the current chat. Good for switching to a new topic.',
        he: '\u05DE\u05EA\u05D7\u05D9\u05DC \u05E9\u05D9\u05D7\u05D4 \u05D7\u05D3\u05E9\u05D4 \u05DC\u05D2\u05DE\u05E8\u05D9. Claude \u05E9\u05D5\u05DB\u05D7 \u05D4\u05DB\u05DC \u05DE\u05D4\u05E6\u05F3\u05D0\u05D8 \u05D4\u05E0\u05D5\u05DB\u05D7\u05D9. \u05D8\u05D5\u05D1 \u05DB\u05E9\u05E8\u05D5\u05E6\u05D9\u05DD \u05DC\u05E2\u05D1\u05D5\u05E8 \u05DC\u05E0\u05D5\u05E9\u05D0 \u05D7\u05D3\u05E9.',
        detail_en: 'Wipes the entire conversation. Fresh start. Claude still reads your CLAUDE.md but forgets everything you discussed. Use this when switching to a completely different project or topic. Different from /compact: /compact keeps a summary, /clear erases everything.',
        detail_he: '\u05DE\u05D5\u05D7\u05E7 \u05D0\u05EA \u05DB\u05DC \u05D4\u05E9\u05D9\u05D7\u05D4. \u05D4\u05EA\u05D7\u05DC\u05D4 \u05D7\u05D3\u05E9\u05D4. \u05E7\u05DC\u05D5\u05D3 \u05E2\u05D3\u05D9\u05D9\u05DF \u05E7\u05D5\u05E8\u05D0 \u05D0\u05EA \u05D4\u05BEClaude.md \u05D0\u05D1\u05DC \u05E9\u05D5\u05DB\u05D7 \u05D0\u05EA \u05DB\u05DC \u05DE\u05D4 \u05E9\u05D3\u05D9\u05D1\u05E8\u05EA\u05DD. \u05D4\u05E9\u05EA\u05DE\u05E9\u05D5 \u05D1\u05D6\u05D4 \u05DB\u05E9\u05E2\u05D5\u05D1\u05E8\u05D9\u05DD \u05DC\u05E4\u05E8\u05D5\u05D9\u05E7\u05D8 \u05D0\u05D5 \u05E0\u05D5\u05E9\u05D0 \u05D0\u05D7\u05E8 \u05DC\u05D2\u05DE\u05E8\u05D9. \u05E9\u05D5\u05E0\u05D4 \u05DE\u05BF/compact: /compact \u05E9\u05D5\u05DE\u05E8 \u05E1\u05D9\u05DB\u05D5\u05DD, /clear \u05DE\u05D5\u05D7\u05E7 \u05D4\u05DB\u05DC.',
        example_en: 'You finished building a landing page and now want Claude to help with a completely different project. Type /clear so Claude starts fresh without any leftover context from the previous task.',
        links: [{label: 'Covered in Daily Claude Hack #7', url: 'https://jaygptpro.com/claude/claude-dictionary.html'}] },
      { term: '/model',
        en: 'Switch between Claude models mid conversation. For example, switch from Sonnet to Opus for a harder question, then back to save usage.',
        he: '\u05DE\u05D7\u05DC\u05D9\u05E3 \u05D1\u05D9\u05DF \u05DE\u05D5\u05D3\u05DC\u05D9 Claude \u05D1\u05D0\u05DE\u05E6\u05E2 \u05D4\u05E9\u05D9\u05D7\u05D4. \u05DC\u05D3\u05D5\u05D2\u05DE\u05D4, \u05E2\u05D5\u05D1\u05E8\u05D9\u05DD \u05DE\u05BESonnet \u05DC\u05BEOpus \u05DC\u05E9\u05D0\u05DC\u05D4 \u05E7\u05E9\u05D4, \u05D5\u05D7\u05D5\u05D6\u05E8\u05D9\u05DD \u05DB\u05D3\u05D9 \u05DC\u05D7\u05E1\u05D5\u05DA.',
        detail_en: 'No restart needed. Pick the right model for the right task. Start with Sonnet for everyday work, switch to Opus when you hit a complex problem, then back to Haiku for simple formatting. The conversation context carries over between model switches.',
        detail_he: '\u05DC\u05D0 \u05E6\u05E8\u05D9\u05DA \u05D4\u05E4\u05E2\u05DC\u05D4 \u05DE\u05D7\u05D3\u05E9. \u05D1\u05D7\u05E8\u05D5 \u05D0\u05EA \u05D4\u05DE\u05D5\u05D3\u05DC \u05D4\u05E0\u05DB\u05D5\u05DF \u05DC\u05DE\u05E9\u05D9\u05DE\u05D4 \u05D4\u05E0\u05DB\u05D5\u05E0\u05D4. \u05D4\u05EA\u05D7\u05D9\u05DC\u05D5 \u05E2\u05DD Sonnet \u05DC\u05E2\u05D1\u05D5\u05D3\u05D4 \u05D9\u05D5\u05DE\u05D9\u05D5\u05DE\u05D9\u05EA, \u05E2\u05D1\u05E8\u05D5 \u05DC\u05BEOpus \u05DB\u05E9\u05E0\u05EA\u05E7\u05DC\u05D9\u05DD \u05D1\u05D1\u05E2\u05D9\u05D4 \u05DE\u05D5\u05E8\u05DB\u05D1\u05EA, \u05D5\u05D7\u05D6\u05E8\u05D5 \u05DC\u05BEHaiku \u05DC\u05E2\u05D9\u05E6\u05D5\u05D1 \u05E4\u05E9\u05D5\u05D8. \u05D4\u05E7\u05E9\u05E8 \u05E9\u05DC \u05D4\u05E9\u05D9\u05D7\u05D4 \u05E2\u05D5\u05D1\u05E8 \u05D1\u05D9\u05DF \u05D4\u05D7\u05DC\u05E4\u05D5\u05EA \u05DE\u05D5\u05D3\u05DC.',
        example_en: 'You are writing product descriptions (use Sonnet). Then you hit a complex pricing algorithm bug. Type /model and switch to Opus. After fixing it, /model back to Sonnet for the rest of the work.',
        links: [{label: 'Covered in Daily Claude Hack #14', url: 'https://jaygptpro.com/claude/claude-dictionary.html'}] },
      { term: '/cost',
        en: 'Shows how much the current Claude Code session has cost you so far. Helps you keep track of your spending.',
        he: '\u05DE\u05E8\u05D0\u05D4 \u05DB\u05DE\u05D4 \u05D4\u05E1\u05E9\u05DF \u05D4\u05E0\u05D5\u05DB\u05D7\u05D9 \u05D1\u05BEClaude Code \u05E2\u05DC\u05D4 \u05DC\u05DA \u05E2\u05D3 \u05DB\u05D4. \u05E2\u05D5\u05D6\u05E8 \u05DC\u05E2\u05E7\u05D5\u05D1 \u05D0\u05D7\u05E8\u05D9 \u05D4\u05D4\u05D5\u05E6\u05D0\u05D5\u05EA \u05E9\u05DC\u05DA.',
        detail_en: 'Type /cost after a big session to see your spending breakdown. It shows input tokens, output tokens, and total cost in dollars. Only relevant for Claude Code users who pay per API usage (not for Pro/Max plan users on claude.ai who pay a flat monthly fee).',
        detail_he: '\u05D4\u05E7\u05DC\u05D9\u05D3\u05D5 /cost \u05D0\u05D7\u05E8\u05D9 \u05E1\u05E9\u05DF \u05D2\u05D3\u05D5\u05DC \u05DB\u05D3\u05D9 \u05DC\u05E8\u05D0\u05D5\u05EA \u05E4\u05D9\u05E8\u05D5\u05D8 \u05D4\u05D4\u05D5\u05E6\u05D0\u05D5\u05EA. \u05D4\u05D5\u05D0 \u05DE\u05E8\u05D0\u05D4 \u05D8\u05D5\u05E7\u05E0\u05D9 \u05E7\u05DC\u05D8, \u05D8\u05D5\u05E7\u05E0\u05D9 \u05E4\u05DC\u05D8, \u05D5\u05E2\u05DC\u05D5\u05EA \u05DB\u05D5\u05DC\u05DC\u05EA \u05D1\u05D3\u05D5\u05DC\u05E8\u05D9\u05DD. \u05E8\u05DC\u05D5\u05D5\u05E0\u05D8\u05D9 \u05E8\u05E7 \u05DC\u05DE\u05E9\u05EA\u05DE\u05E9\u05D9 Claude Code \u05E9\u05DE\u05E9\u05DC\u05DE\u05D9\u05DD \u05DC\u05E4\u05D9 \u05E9\u05D9\u05DE\u05D5\u05E9 API (\u05DC\u05D0 \u05DC\u05DE\u05E9\u05EA\u05DE\u05E9\u05D9 Pro/Max \u05D1\u05BEclaude.ai \u05E9\u05DE\u05E9\u05DC\u05DE\u05D9\u05DD \u05DE\u05D7\u05D9\u05E8 \u05D7\u05D5\u05D3\u05E9\u05D9 \u05E7\u05D1\u05D5\u05E2).',
        example_en: 'After a long coding session, type /cost. It shows: Input: 150K tokens ($0.45), Output: 30K tokens ($0.60), Total: $1.05. Now you know exactly what that feature cost to build.',
        links: [] },
      { term: '/context',
        en: 'Shows how much of Claude\'s context window you have used. When it gets full, Claude starts forgetting earlier parts of the conversation.',
        he: '\u05DE\u05E8\u05D0\u05D4 \u05DB\u05DE\u05D4 \u05DE\u05D7\u05DC\u05D5\u05DF \u05D4\u05D4\u05E7\u05E9\u05E8 \u05E9\u05DC Claude \u05DB\u05D1\u05E8 \u05E0\u05D9\u05E6\u05DC. \u05DB\u05E9\u05D4\u05D5\u05D0 \u05DE\u05EA\u05DE\u05DC\u05D0, Claude \u05DE\u05EA\u05D7\u05D9\u05DC \u05DC\u05E9\u05DB\u05D5\u05D7 \u05D7\u05DC\u05E7\u05D9\u05DD \u05DE\u05D5\u05E7\u05D3\u05DE\u05D9\u05DD \u05D9\u05D5\u05EA\u05E8 \u05D1\u05E9\u05D9\u05D7\u05D4.',
        detail_en: 'Like a fuel gauge for your conversation. /context shows something like "67% used", meaning you have about a third of your capacity left. When you are above 70%, consider using /compact to free up space. This helps prevent Claude from losing track of earlier instructions or decisions.',
        detail_he: '\u05DB\u05DE\u05D5 \u05DE\u05D3 \u05D3\u05DC\u05E7 \u05DC\u05E9\u05D9\u05D7\u05D4. /context \u05DE\u05E8\u05D0\u05D4 \u05DE\u05E9\u05D4\u05D5 \u05DB\u05DE\u05D5 "67% \u05D1\u05E9\u05D9\u05DE\u05D5\u05E9", \u05DB\u05DC\u05D5\u05DE\u05E8 \u05E0\u05E9\u05D0\u05E8 \u05DC\u05DB\u05DD \u05DB\u05E9\u05DC\u05D9\u05E9 \u05DE\u05D4\u05E7\u05D9\u05D1\u05D5\u05DC\u05EA. \u05DB\u05E9\u05D0\u05EA\u05DD \u05DE\u05E2\u05DC 70%, \u05E9\u05E7\u05DC\u05D5 \u05DC\u05D4\u05E9\u05EA\u05DE\u05E9 \u05D1\u05BF/compact \u05DC\u05E4\u05E0\u05D5\u05EA \u05DE\u05E7\u05D5\u05DD. \u05D6\u05D4 \u05E2\u05D5\u05D6\u05E8 \u05DC\u05DE\u05E0\u05D5\u05E2 \u05DE\u05E7\u05DC\u05D5\u05D3 \u05DC\u05D0\u05D1\u05D3 \u05D0\u05EA \u05D4\u05D4\u05D5\u05E8\u05D0\u05D5\u05EA \u05D0\u05D5 \u05D4\u05D4\u05D7\u05DC\u05D8\u05D5\u05EA \u05D4\u05DE\u05D5\u05E7\u05D3\u05DE\u05D5\u05EA.',
        example_en: 'You are deep into a project. Type /context and see "82% used." That is your signal to run /compact before Claude starts dropping earlier instructions.',
        links: [{label: 'Covered in Daily Claude Hack #7', url: 'https://jaygptpro.com/claude/claude-dictionary.html'}] },
      { term: 'ultrathink',
        en: 'A keyword you add to your prompt to activate the deepest level of extended thinking. Claude will reason very carefully through complex problems.',
        he: '\u05DE\u05D9\u05DC\u05EA \u05DE\u05E4\u05EA\u05D7 \u05E9\u05DE\u05D5\u05E1\u05D9\u05E4\u05D9\u05DD \u05DC\u05E4\u05E8\u05D5\u05DE\u05E4\u05D8 \u05DB\u05D3\u05D9 \u05DC\u05D4\u05E4\u05E2\u05D9\u05DC \u05D0\u05EA \u05D4\u05E8\u05DE\u05D4 \u05D4\u05E2\u05DE\u05D5\u05E7\u05D4 \u05D1\u05D9\u05D5\u05EA\u05E8 \u05E9\u05DC \u05D7\u05E9\u05D9\u05D1\u05D4 \u05DE\u05D5\u05E8\u05D7\u05D1\u05EA. Claude \u05D9\u05D7\u05E9\u05D5\u05D1 \u05D1\u05D6\u05D4\u05D9\u05E8\u05D5\u05EA \u05E8\u05D1\u05D4 \u05DE\u05D0\u05D5\u05D3 \u05E2\u05DC \u05D1\u05E2\u05D9\u05D5\u05EA \u05DE\u05D5\u05E8\u05DB\u05D1\u05D5\u05EA.',
        detail_en: 'Type "ultrathink" anywhere in your prompt to activate maximum thinking mode. Claude spends more time analyzing before responding. Results are dramatically better for complex tasks. For example: "ultrathink. Analyze my competitor\'s pricing strategy and suggest three counter moves." Works in Claude Code. Uses more tokens but the quality improvement is significant.',
        detail_he: '\u05D4\u05E7\u05DC\u05D9\u05D3\u05D5 "ultrathink" \u05D1\u05DB\u05DC \u05DE\u05E7\u05D5\u05DD \u05D1\u05E4\u05E8\u05D5\u05DE\u05E4\u05D8 \u05DB\u05D3\u05D9 \u05DC\u05D4\u05E4\u05E2\u05D9\u05DC \u05D0\u05EA \u05DE\u05E6\u05D1 \u05D4\u05D7\u05E9\u05D9\u05D1\u05D4 \u05D4\u05DE\u05E7\u05E1\u05D9\u05DE\u05DC\u05D9. \u05E7\u05DC\u05D5\u05D3 \u05DE\u05E9\u05E7\u05D9\u05E2 \u05D9\u05D5\u05EA\u05E8 \u05D6\u05DE\u05DF \u05D1\u05E0\u05D9\u05EA\u05D5\u05D7 \u05DC\u05E4\u05E0\u05D9 \u05E9\u05D4\u05D5\u05D0 \u05E2\u05D5\u05E0\u05D4. \u05D4\u05EA\u05D5\u05E6\u05D0\u05D5\u05EA \u05D8\u05D5\u05D1\u05D5\u05EA \u05DE\u05E9\u05DE\u05E2\u05D5\u05EA\u05D9\u05EA \u05D9\u05D5\u05EA\u05E8 \u05DC\u05DE\u05E9\u05D9\u05DE\u05D5\u05EA \u05DE\u05D5\u05E8\u05DB\u05D1\u05D5\u05EA. \u05DC\u05D3\u05D5\u05D2\u05DE\u05D4: "ultrathink. \u05E0\u05EA\u05D7 \u05D0\u05EA \u05D0\u05E1\u05D8\u05E8\u05D8\u05D2\u05D9\u05D9\u05EA \u05D4\u05EA\u05DE\u05D7\u05D5\u05E8 \u05E9\u05DC \u05D4\u05DE\u05EA\u05D7\u05E8\u05D4 \u05D5\u05D4\u05E6\u05E2 \u05E9\u05DC\u05D5\u05E9 \u05DE\u05D4\u05DC\u05DB\u05D9\u05DD \u05E0\u05D2\u05D3\u05D9\u05DD." \u05E2\u05D5\u05D1\u05D3 \u05D1\u05BEClaude Code. \u05E6\u05D5\u05E8\u05DA \u05D9\u05D5\u05EA\u05E8 \u05D8\u05D5\u05E7\u05E0\u05D9\u05DD \u05D0\u05D1\u05DC \u05E9\u05D9\u05E4\u05D5\u05E8 \u05D4\u05D0\u05D9\u05DB\u05D5\u05EA \u05DE\u05E9\u05DE\u05E2\u05D5\u05EA\u05D9.',
        example_en: 'You need Claude to plan your entire Q3 marketing strategy. Type: "ultrathink. Create a comprehensive Q3 marketing plan for my eCommerce store selling organic skincare. Include channels, budget allocation, and KPIs." Claude thinks deeply before responding with a thorough plan.',
        links: [{label: 'Covered in Daily Claude Hack #15', url: 'https://jaygptpro.com/claude/claude-dictionary.html'}] },
      { term: 'Rewind',
        en: 'Press Escape twice or type /rewind to go back to any previous step in your conversation. Restores code, conversation, or both.',
        he: 'לוחצים Escape פעמיים או מקלידים /rewind כדי לחזור לכל שלב קודם בשיחה. משחזר קוד, שיחה, או שניהם.',
        detail_en: 'Like a time machine for your Claude Code session. Press Escape twice, pick a restore point from the list, and you are back to when everything worked. You can choose to restore just the conversation, just the code changes, or both. Essential when Claude breaks something and you need to undo.',
        detail_he: '\u05DB\u05DE\u05D5 \u05DE\u05DB\u05D5\u05E0\u05EA \u05D6\u05DE\u05DF \u05DC\u05E1\u05E9\u05DF \u05D4\u05BEClaude Code \u05E9\u05DC\u05DA. \u05DC\u05D7\u05E6\u05D5 Escape \u05E4\u05E2\u05DE\u05D9\u05D9\u05DD, \u05D1\u05D7\u05E8\u05D5 \u05E0\u05E7\u05D5\u05D3\u05EA \u05E9\u05D7\u05D6\u05D5\u05E8 \u05DE\u05D4\u05E8\u05E9\u05D9\u05DE\u05D4, \u05D5\u05D0\u05EA\u05DD \u05D7\u05D5\u05D6\u05E8\u05D9\u05DD \u05DC\u05E8\u05D2\u05E2 \u05E9\u05D1\u05D5 \u05D4\u05DB\u05DC \u05E2\u05D1\u05D3. \u05D0\u05E4\u05E9\u05E8 \u05DC\u05D1\u05D7\u05D5\u05E8 \u05DC\u05E9\u05D7\u05D6\u05E8 \u05E8\u05E7 \u05D0\u05EA \u05D4\u05E9\u05D9\u05D7\u05D4, \u05E8\u05E7 \u05D0\u05EA \u05E9\u05D9\u05E0\u05D5\u05D9\u05D9 \u05D4\u05E7\u05D5\u05D3, \u05D0\u05D5 \u05E9\u05E0\u05D9\u05D4\u05DD. \u05D7\u05D9\u05D5\u05E0\u05D9 \u05DB\u05E9\u05E7\u05DC\u05D5\u05D3 \u05E9\u05D5\u05D1\u05E8 \u05DE\u05E9\u05D4\u05D5 \u05D5\u05E6\u05E8\u05D9\u05DA \u05DC\u05D1\u05D8\u05DC.',
        example_en: 'Claude just rewrote a function and broke your login page. Press Escape twice, select the checkpoint from before the edit, choose "Restore code and conversation," and everything goes back to working. Crisis averted.',
        links: [{label: 'Covered in Daily Claude Hack #12', url: 'https://jaygptpro.com/claude/claude-dictionary.html'}] }
    ]
  },
  {
    id: 'connect', icon: '\u{1F50C}', css: 'cat-connect',
    name: { en: 'Connections & Integrations', he: '\u05D7\u05D9\u05D1\u05D5\u05E8\u05D9\u05DD \u05D5\u05D0\u05D9\u05E0\u05D8\u05D2\u05E8\u05E6\u05D9\u05D5\u05EA' },
    terms: [
      { term: 'API',
        en: 'A way for apps and websites to connect to Claude behind the scenes. If you build a product that uses AI, you connect through the API.',
        he: '\u05D3\u05E8\u05DA \u05DC\u05D0\u05E4\u05DC\u05D9\u05E7\u05E6\u05D9\u05D5\u05EA \u05D5\u05D0\u05EA\u05E8\u05D9\u05DD \u05DC\u05D4\u05EA\u05D7\u05D1\u05E8 \u05DC\u05E7\u05DC\u05D5\u05D3 \u05DE\u05D0\u05D7\u05D5\u05E8\u05D9 \u05D4\u05E7\u05DC\u05E2\u05D9\u05DD. \u05D0\u05DD \u05D0\u05EA\u05D4 \u05D1\u05D5\u05E0\u05D4 \u05DE\u05D5\u05E6\u05E8 \u05E9\u05DE\u05E9\u05EA\u05DE\u05E9 \u05D1\u05D1\u05D9\u05E0\u05D4 \u05DE\u05DC\u05D0\u05DB\u05D5\u05EA\u05D9\u05EA, \u05D0\u05EA\u05D4 \u05DE\u05EA\u05D7\u05D1\u05E8 \u05D3\u05E8\u05DA \u05D4\u05BEAPI.',
        detail_en: 'API stands for Application Programming Interface. It is how developers send text to Claude and get responses back, programmatically. An eCommerce tool might use the API to automatically generate product descriptions for new listings. You pay per token used. Most non-technical users do not need the API directly since claude.ai and Claude Desktop cover regular use.',
        detail_he: 'API \u05D6\u05D4 \u05E8\u05D0\u05E9\u05D9 \u05EA\u05D9\u05D1\u05D5\u05EA \u05E9\u05DC Application Programming Interface. \u05D6\u05D5 \u05D4\u05D3\u05E8\u05DA \u05E9\u05D1\u05D4 \u05DE\u05E4\u05EA\u05D7\u05D9\u05DD \u05E9\u05D5\u05DC\u05D7\u05D9\u05DD \u05D8\u05E7\u05E1\u05D8 \u05DC\u05E7\u05DC\u05D5\u05D3 \u05D5\u05DE\u05E7\u05D1\u05DC\u05D9\u05DD \u05EA\u05E9\u05D5\u05D1\u05D5\u05EA \u05D1\u05D0\u05D5\u05E4\u05DF \u05EA\u05DB\u05E0\u05D5\u05EA\u05D9. \u05DB\u05DC\u05D9 \u05D0\u05D9\u05E7\u05D5\u05DE\u05E8\u05E1 \u05D9\u05DB\u05D5\u05DC \u05DC\u05D4\u05E9\u05EA\u05DE\u05E9 \u05D1\u05BEapi \u05DB\u05D3\u05D9 \u05DC\u05D9\u05D9\u05E6\u05E8 \u05D0\u05D5\u05D8\u05D5\u05DE\u05D8\u05D9\u05EA \u05EA\u05D9\u05D0\u05D5\u05E8\u05D9 \u05DE\u05D5\u05E6\u05E8 \u05DC\u05E4\u05E8\u05D9\u05D8\u05D9\u05DD \u05D7\u05D3\u05E9\u05D9\u05DD. \u05DE\u05E9\u05DC\u05DE\u05D9\u05DD \u05DC\u05E4\u05D9 \u05D8\u05D5\u05E7\u05DF. \u05E8\u05D5\u05D1 \u05D4\u05DE\u05E9\u05EA\u05DE\u05E9\u05D9\u05DD \u05D4\u05DC\u05D0 \u05D8\u05DB\u05E0\u05D9\u05D9\u05DD \u05DC\u05D0 \u05E6\u05E8\u05D9\u05DB\u05D9\u05DD \u05D0\u05EA \u05D4\u05BEAPI \u05D9\u05E9\u05D9\u05E8\u05D5\u05EA \u05DB\u05D9 claude.ai \u05D5\u05BEClaude Desktop \u05DE\u05DB\u05E1\u05D9\u05DD \u05D0\u05EA \u05D4\u05E9\u05D9\u05DE\u05D5\u05E9 \u05D4\u05E8\u05D2\u05D9\u05DC.',
        example_en: 'You build a Shopify app that automatically writes product descriptions. When a merchant adds a new product, your app sends the product details to Claude\'s API and receives a polished description back, all without the merchant ever seeing Claude directly.',
        links: [{label: 'Anthropic API Docs', url: 'https://docs.anthropic.com/en/docs/api-reference'}] },
      { term: 'MCP (Model Context Protocol)',
        en: 'A universal connector that lets Claude talk to other apps like Gmail, Google Calendar, Notion, and more. Think of it as a USB port that plugs Claude into your tools.',
        he: '\u05DE\u05D7\u05D1\u05E8 \u05D0\u05D5\u05E0\u05D9\u05D1\u05E8\u05E1\u05DC\u05D9 \u05E9\u05DE\u05D0\u05E4\u05E9\u05E8 \u05DC\u05E7\u05DC\u05D5\u05D3 \u05DC\u05D3\u05D1\u05E8 \u05E2\u05DD \u05D0\u05E4\u05DC\u05D9\u05E7\u05E6\u05D9\u05D5\u05EA \u05D0\u05D7\u05E8\u05D5\u05EA \u05DB\u05DE\u05D5 Gmail, Google Calendar, Notion \u05D5\u05E2\u05D5\u05D3. \u05EA\u05D7\u05E9\u05D1\u05D5 \u05E2\u05DC \u05D6\u05D4 \u05DB\u05E9\u05E7\u05E2 USB \u05E9\u05DE\u05D7\u05D1\u05E8 \u05D0\u05EA Claude \u05DC\u05DB\u05DC\u05D9\u05DD \u05E9\u05DC\u05DA.',
        detail_en: 'MCP is an open standard created by Anthropic. An MCP server connects Claude to external data sources like databases, APIs, or file systems. For example, you can install an MCP server for your database so Claude can query customer data directly. Hundreds of community servers are available for tools like GitHub, Slack, Jira, and more.',
        detail_he: 'MCP \u05D4\u05D5\u05D0 \u05EA\u05E7\u05DF \u05E4\u05EA\u05D5\u05D7 \u05E9\u05E0\u05D5\u05E6\u05E8 \u05E2\u05DC \u05D9\u05D3\u05D9 Anthropic. \u05E9\u05E8\u05EA MCP \u05DE\u05D7\u05D1\u05E8 \u05D0\u05EA \u05E7\u05DC\u05D5\u05D3 \u05DC\u05DE\u05E7\u05D5\u05E8\u05D5\u05EA \u05E0\u05EA\u05D5\u05E0\u05D9\u05DD \u05D7\u05D9\u05E6\u05D5\u05E0\u05D9\u05D9\u05DD \u05DB\u05DE\u05D5 \u05D1\u05E1\u05D9\u05E1\u05D9 \u05E0\u05EA\u05D5\u05E0\u05D9\u05DD, \u05DE\u05DE\u05E9\u05E7\u05D9 API \u05D0\u05D5 \u05DE\u05E2\u05E8\u05DB\u05D5\u05EA \u05E7\u05D1\u05E6\u05D9\u05DD. \u05DC\u05D3\u05D5\u05D2\u05DE\u05D4, \u05D0\u05E4\u05E9\u05E8 \u05DC\u05D4\u05EA\u05E7\u05D9\u05DF \u05E9\u05E8\u05EA MCP \u05DC\u05D1\u05E1\u05D9\u05E1 \u05D4\u05E0\u05EA\u05D5\u05E0\u05D9\u05DD \u05E9\u05DC\u05DA \u05DB\u05DA \u05E9\u05E7\u05DC\u05D5\u05D3 \u05D9\u05D5\u05DB\u05DC \u05DC\u05E9\u05D0\u05D5\u05DC \u05D0\u05EA \u05E0\u05EA\u05D5\u05E0\u05D9 \u05D4\u05DC\u05E7\u05D5\u05D7\u05D5\u05EA \u05D9\u05E9\u05D9\u05E8\u05D5\u05EA. \u05DE\u05D0\u05D5\u05EA \u05E9\u05E8\u05EA\u05D9 \u05E7\u05D4\u05D9\u05DC\u05D4 \u05D6\u05DE\u05D9\u05E0\u05D9\u05DD \u05DC\u05DB\u05DC\u05D9\u05DD \u05DB\u05DE\u05D5 GitHub, Slack, Jira \u05D5\u05E2\u05D5\u05D3.',
        example_en: 'Install the Notion MCP server in Claude Code. Now you can say: "Check my Notion project tracker and tell me which tasks are overdue." Claude reads your actual Notion database and gives you a real answer.',
        links: [{label: 'MCP Docs', url: 'https://modelcontextprotocol.io'}] },
      { term: 'Connectors',
        en: 'Pre built integrations on claude.ai that connect Claude to services like Google Drive or Notion with one click. No setup or coding needed.',
        he: '\u05D0\u05D9\u05E0\u05D8\u05D2\u05E8\u05E6\u05D9\u05D5\u05EA \u05DE\u05D5\u05DB\u05E0\u05D5\u05EA \u05DE\u05E8\u05D0\u05E9 \u05D1\u05BEclaude.ai \u05E9\u05DE\u05D7\u05D1\u05E8\u05D5\u05EA \u05D0\u05EA Claude \u05DC\u05E9\u05D9\u05E8\u05D5\u05EA\u05D9\u05DD \u05DB\u05DE\u05D5 Google Drive \u05D0\u05D5 Notion \u05D1\u05DC\u05D7\u05D9\u05E6\u05D4 \u05D0\u05D7\u05EA. \u05D0\u05D9\u05DF \u05E6\u05D5\u05E8\u05DA \u05D1\u05D4\u05D2\u05D3\u05E8\u05D4 \u05D0\u05D5 \u05E7\u05D5\u05D3.',
        detail_en: 'Connectors are the no code version of MCP. Available in Cowork (Max plan). Connect Gmail and ask "check my email for anything urgent this week" and Claude reads your actual inbox. Connect Google Calendar and ask Claude to schedule a meeting. Connect Notion and let Claude update your project tracker. One click setup for each service.',
        detail_he: 'Connectors \u05D4\u05DD \u05D4\u05D2\u05E8\u05E1\u05D4 \u05DC\u05DC\u05D0 \u05E7\u05D5\u05D3 \u05E9\u05DC MCP. \u05D6\u05DE\u05D9\u05E0\u05D9\u05DD \u05D1\u05BECowork (\u05DE\u05E1\u05DC\u05D5\u05DC Max). \u05D7\u05D1\u05E8\u05D5 Gmail \u05D5\u05EA\u05E9\u05D0\u05DC\u05D5 "\u05EA\u05D1\u05D3\u05D5\u05E7 \u05D0\u05EA \u05D4\u05DE\u05D9\u05D9\u05DC \u05E9\u05DC\u05D9 \u05DC\u05DE\u05E9\u05D4\u05D5 \u05D3\u05D7\u05D5\u05E3 \u05D4\u05E9\u05D1\u05D5\u05E2" \u05D5\u05E7\u05DC\u05D5\u05D3 \u05E7\u05D5\u05E8\u05D0 \u05D0\u05EA \u05EA\u05D9\u05D1\u05EA \u05D4\u05D3\u05D5\u05D0\u05E8 \u05D4\u05D0\u05DE\u05D9\u05EA\u05D9\u05EA. \u05D7\u05D1\u05E8\u05D5 Google Calendar \u05D5\u05EA\u05D1\u05E7\u05E9\u05D5 \u05DE\u05E7\u05DC\u05D5\u05D3 \u05DC\u05E7\u05D1\u05D5\u05E2 \u05E4\u05D2\u05D9\u05E9\u05D4. \u05D7\u05D1\u05E8\u05D5 Notion \u05D5\u05EA\u05E0\u05D5 \u05DC\u05E7\u05DC\u05D5\u05D3 \u05DC\u05E2\u05D3\u05DB\u05DF \u05D0\u05EA \u05DC\u05D5\u05D7 \u05D4\u05DE\u05E9\u05D9\u05DE\u05D5\u05EA. \u05D4\u05D2\u05D3\u05E8\u05D4 \u05D1\u05DC\u05D7\u05D9\u05E6\u05D4 \u05D0\u05D7\u05EA \u05DC\u05DB\u05DC \u05E9\u05D9\u05E8\u05D5\u05EA.',
        example_en: 'In Cowork (Max plan), click "Connect" next to Gmail. Now ask Claude: "Check my email for anything urgent this week." Claude reads your actual inbox and summarizes what needs attention. One click setup, no coding.',
        links: [{label: 'Covered in Daily Claude Hack #10', url: 'https://jaygptpro.com/claude/claude-dictionary.html'}] },
      { term: 'Hooks',
        en: 'Automated actions that run before or after Claude does something in Claude Code. Like setting rules: "every time Claude creates a file, also run a check on it."',
        he: '\u05E4\u05E2\u05D5\u05DC\u05D5\u05EA \u05D0\u05D5\u05D8\u05D5\u05DE\u05D8\u05D9\u05D5\u05EA \u05E9\u05E8\u05E6\u05D5\u05EA \u05DC\u05E4\u05E0\u05D9 \u05D0\u05D5 \u05D0\u05D7\u05E8\u05D9 \u05E9\u05E7\u05DC\u05D5\u05D3 \u05E2\u05D5\u05E9\u05D4 \u05DE\u05E9\u05D4\u05D5 \u05D1\u05BEClaude Code. \u05DB\u05DE\u05D5 \u05DC\u05D4\u05D2\u05D3\u05D9\u05E8 \u05DB\u05DC\u05DC\u05D9\u05DD: "\u05DB\u05DC \u05E4\u05E2\u05DD \u05E9\u05E7\u05DC\u05D5\u05D3 \u05D9\u05D5\u05E6\u05E8 \u05E7\u05D5\u05D1\u05E5, \u05D2\u05DD \u05EA\u05E8\u05D9\u05E5 \u05E2\u05DC\u05D9\u05D5 \u05D1\u05D3\u05D9\u05E7\u05D4."',
        detail_en: 'A hook that automatically runs a linter every time Claude saves a code file, catching errors before they become problems. You can set hooks to run before file edits (to validate), after file edits (to format), or before commands (to add safety checks). They are defined in your settings and run silently in the background.',
        detail_he: '\u05D4\u05D5\u05E7 \u05E9\u05DE\u05E8\u05D9\u05E5 \u05D0\u05D5\u05D8\u05D5\u05DE\u05D8\u05D9\u05EA linter \u05D1\u05DB\u05DC \u05E4\u05E2\u05DD \u05E9\u05E7\u05DC\u05D5\u05D3 \u05E9\u05D5\u05DE\u05E8 \u05E7\u05D5\u05D1\u05E5 \u05E7\u05D5\u05D3, \u05EA\u05D5\u05E4\u05E1 \u05E9\u05D2\u05D9\u05D0\u05D5\u05EA \u05DC\u05E4\u05E0\u05D9 \u05E9\u05D4\u05DF \u05D4\u05D5\u05E4\u05DB\u05D5\u05EA \u05DC\u05D1\u05E2\u05D9\u05D5\u05EA. \u05D0\u05E4\u05E9\u05E8 \u05DC\u05D4\u05D2\u05D3\u05D9\u05E8 \u05D4\u05D5\u05E7\u05D9\u05DD \u05E9\u05D9\u05E8\u05D5\u05E6\u05D5 \u05DC\u05E4\u05E0\u05D9 \u05E2\u05E8\u05D9\u05DB\u05EA \u05E7\u05D1\u05E6\u05D9\u05DD (\u05DC\u05D0\u05D9\u05DE\u05D5\u05EA), \u05D0\u05D7\u05E8\u05D9 \u05E2\u05E8\u05D9\u05DB\u05D4 (\u05DC\u05E4\u05D5\u05E8\u05DE\u05D8), \u05D0\u05D5 \u05DC\u05E4\u05E0\u05D9 \u05E4\u05E7\u05D5\u05D3\u05D5\u05EA (\u05DC\u05D1\u05D3\u05D9\u05E7\u05D5\u05EA \u05D1\u05D8\u05D9\u05D7\u05D5\u05EA). \u05D4\u05DD \u05DE\u05D5\u05D2\u05D3\u05E8\u05D9\u05DD \u05D1\u05D4\u05D2\u05D3\u05E8\u05D5\u05EA \u05D5\u05E8\u05E6\u05D9\u05DD \u05D1\u05E9\u05E7\u05D8 \u05D1\u05E8\u05E7\u05E2.',
        example_en: 'You set a hook that runs ESLint every time Claude saves a .js file. Claude writes code, saves it, the hook catches a missing semicolon, and Claude fixes it automatically before moving on.',
        links: [{label: 'Claude Code Hooks Docs', url: 'https://docs.anthropic.com/en/docs/claude-code/hooks'}] },
      { term: 'Webhooks',
        en: 'Automatic notifications sent from one app to another when something happens. Like a doorbell that rings when a customer places an order.',
        he: '\u05D4\u05EA\u05E8\u05D0\u05D5\u05EA \u05D0\u05D5\u05D8\u05D5\u05DE\u05D8\u05D9\u05D5\u05EA \u05E9\u05E0\u05E9\u05DC\u05D7\u05D5\u05EA \u05DE\u05D0\u05E4\u05DC\u05D9\u05E7\u05E6\u05D9\u05D4 \u05D0\u05D7\u05EA \u05DC\u05D0\u05D7\u05E8\u05EA \u05DB\u05E9\u05DE\u05E9\u05D4\u05D5 \u05E7\u05D5\u05E8\u05D4. \u05DB\u05DE\u05D5 \u05E4\u05E2\u05DE\u05D5\u05DF \u05E9\u05DE\u05E6\u05DC\u05E6\u05DC \u05DB\u05E9\u05DC\u05E7\u05D5\u05D7 \u05DE\u05D1\u05E6\u05E2 \u05D4\u05D6\u05DE\u05E0\u05D4.',
        detail_en: 'Not specific to Claude but important to understand. Webhooks are how services talk to each other in real time. When a customer buys something on Shopify, a webhook can instantly notify your inventory system. When used with Claude, webhooks can trigger AI workflows automatically based on events in your business.',
        detail_he: '\u05DC\u05D0 \u05E1\u05E4\u05E6\u05D9\u05E4\u05D9 \u05DC\u05E7\u05DC\u05D5\u05D3 \u05D0\u05D1\u05DC \u05D7\u05E9\u05D5\u05D1 \u05DC\u05D4\u05D1\u05D9\u05DF. Webhooks \u05D4\u05DD \u05D0\u05D9\u05DA \u05E9\u05D9\u05E8\u05D5\u05EA\u05D9\u05DD \u05DE\u05D3\u05D1\u05E8\u05D9\u05DD \u05D0\u05D7\u05D3 \u05E2\u05DD \u05D4\u05E9\u05E0\u05D9 \u05D1\u05D6\u05DE\u05DF \u05D0\u05DE\u05EA. \u05DB\u05E9\u05DC\u05E7\u05D5\u05D7 \u05E7\u05D5\u05E0\u05D4 \u05DE\u05E9\u05D4\u05D5 \u05D1\u05BEShopify, \u05D5\u05D5\u05D1\u05D4\u05D5\u05E7 \u05D9\u05DB\u05D5\u05DC \u05DC\u05D4\u05D5\u05D3\u05D9\u05E2 \u05DE\u05D9\u05D3 \u05DC\u05DE\u05E2\u05E8\u05DB\u05EA \u05D4\u05DE\u05DC\u05D0\u05D9. \u05DB\u05E9\u05DE\u05E9\u05EA\u05DE\u05E9\u05D9\u05DD \u05E2\u05DD \u05E7\u05DC\u05D5\u05D3, \u05D5\u05D5\u05D1\u05D4\u05D5\u05E7\u05D9\u05DD \u05D9\u05DB\u05D5\u05DC\u05D9\u05DD \u05DC\u05D4\u05E4\u05E2\u05D9\u05DC \u05D0\u05D5\u05D8\u05D5\u05DE\u05D8\u05D9\u05EA \u05EA\u05D4\u05DC\u05D9\u05DB\u05D9 AI \u05DC\u05E4\u05D9 \u05D0\u05D9\u05E8\u05D5\u05E2\u05D9\u05DD \u05D1\u05E2\u05E1\u05E7.',
        example_en: 'A customer places an order on your Shopify store. A webhook fires and sends the order details to your fulfillment system, which then triggers a shipping label to be printed. No manual steps involved.',
        links: [] },
      { term: 'Channels',
        en: 'A feature that connects Claude Code to Telegram or Discord. Send tasks from your phone, Claude works on your computer.',
        he: 'פיצ\'ר שמחבר את Claude Code לטלגרם או דיסקורד. שולחים משימות מהטלפון, קלוד עובד על המחשב.',
        detail_en: 'You are at the park with your kids. Send a Telegram message: "Run the tests and fix whatever broke." Claude does it on your computer at home. Channels turn Telegram or Discord into a remote control for Claude Code. Set it up once and send tasks from anywhere like texting a friend.',
        detail_he: '\u05D0\u05EA\u05DD \u05D1\u05E4\u05D0\u05E8\u05E7 \u05E2\u05DD \u05D4\u05D9\u05DC\u05D3\u05D9\u05DD. \u05E9\u05DC\u05D7\u05D5 \u05D4\u05D5\u05D3\u05E2\u05D4 \u05D1\u05D8\u05DC\u05D2\u05E8\u05DD: "\u05EA\u05E8\u05D9\u05E5 \u05D0\u05EA \u05D4\u05D1\u05D3\u05D9\u05E7\u05D5\u05EA \u05D5\u05EA\u05EA\u05E7\u05DF \u05DE\u05D4 \u05E9\u05E0\u05E9\u05D1\u05E8." \u05E7\u05DC\u05D5\u05D3 \u05E2\u05D5\u05E9\u05D4 \u05D0\u05EA \u05D6\u05D4 \u05E2\u05DC \u05D4\u05DE\u05D7\u05E9\u05D1 \u05D1\u05D1\u05D9\u05EA. Channels \u05D4\u05D5\u05E4\u05DB\u05D9\u05DD \u05D0\u05EA \u05D8\u05DC\u05D2\u05E8\u05DD \u05D0\u05D5 \u05D3\u05D9\u05E1\u05E7\u05D5\u05E8\u05D3 \u05DC\u05E9\u05DC\u05D8 \u05E8\u05D7\u05D5\u05E7 \u05DC\u05BEClaude Code. \u05DE\u05D2\u05D3\u05D9\u05E8\u05D9\u05DD \u05E4\u05E2\u05DD \u05D0\u05D7\u05EA \u05D5\u05E9\u05D5\u05DC\u05D7\u05D9\u05DD \u05DE\u05E9\u05D9\u05DE\u05D5\u05EA \u05DE\u05DB\u05DC \u05DE\u05E7\u05D5\u05DD \u05DB\u05DE\u05D5 \u05DC\u05E9\u05DC\u05D5\u05D7 \u05D4\u05D5\u05D3\u05E2\u05D4 \u05DC\u05D7\u05D1\u05E8.',
        example_en: 'Set up Claude Code with the Telegram channel. You are out walking the dog and think of a bug fix. Open Telegram, send: "Fix the login redirect issue in auth.js and push to the staging branch." Claude does it on your computer at home.',
        links: [{label: 'Covered in Daily Claude Hack #13', url: 'https://jaygptpro.com/claude/claude-dictionary.html'}] }
    ]
